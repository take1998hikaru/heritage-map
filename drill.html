// Mobile adjustments injected at deploy time:
//   1. Replace window.open('popup') with a plain new-tab open so iOS

//   2. YouTube links continue to use the canonical youtube.com URL so
//      the mobile OS offers to open them in the YouTube app.
(function() {
  function isMobile() {
    return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
        || (window.matchMedia && window.matchMedia('(max-width: 900px)').matches);

  if (!isMobile()) return;
  var _open = window.open;
  window.open = function(url, name, features) {

})();

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界遺産検定 準一級 アウトプット模試</title>
<style>
  :root{
    --ink:#243033; --ink-soft:#54605f; --hint:#8a938f;
    --paper:#f4f1e9; --surface:#ffffff; --line:#e2ddd0; --line-strong:#cfc8b6;
    --ok:#2f7d5b; --ok-bg:#e6f1ea; --bad:#b23b3b; --bad-bg:#f7e6e3;
    --accent:#b06a1f; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.7;
    padding:18px 14px 60px; max-width:640px; margin:0 auto;}
  .eyebrow{font-size:12px; letter-spacing:.22em; color:var(--accent); font-weight:500;
    display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .eyebrow a{color:var(--ink-soft); font-size:12px; letter-spacing:normal; text-decoration:none;
    border:1px solid var(--line-strong); border-radius:8px; padding:3px 10px; background:var(--surface); white-space:nowrap;}
  h1{font-size:22px; font-weight:700; margin:4px 0 14px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .sec{font-size:11px; letter-spacing:.14em; color:var(--hint); margin:14px 0 7px; font-weight:500;}
  .chips{display:flex; gap:7px; flex-wrap:wrap;}
  .chip{border:1px solid var(--line-strong); background:var(--surface); font-size:13px; padding:8px 12px;
    border-radius:10px; cursor:pointer; font-family:inherit; user-select:none;}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .btn{border:none; border-radius:11px; padding:13px 16px; font-size:15px; font-weight:700;
    font-family:inherit; cursor:pointer; width:100%;}
  .btn.primary{background:var(--ink); color:#fff;}
  .btn.ghost{background:var(--surface); border:1px solid var(--line-strong); color:var(--ink); font-weight:500;}
  .meta-row{display:flex; justify-content:space-between; font-size:13px; color:var(--ink-soft); margin-bottom:8px;}
  .qtype{display:inline-block; font-size:11px; padding:2px 8px; border-radius:99px;
    background:var(--ok-bg); color:var(--ok); font-weight:700; margin-bottom:8px;}
  .stem{font-size:15.5px; font-weight:500; margin-bottom:14px; white-space:pre-wrap;}
  .stem .kwbox{display:block; background:var(--paper); border:1px solid var(--line);
    border-radius:9px; padding:9px 11px; margin-top:9px; font-size:14px; color:var(--ink-soft);}
  .opts{display:flex; flex-direction:column; gap:9px;}
  .opt{border:1.5px solid var(--line-strong); background:var(--surface); text-align:left;
    padding:12px 13px; border-radius:11px; font-size:14.5px; font-family:inherit; cursor:pointer; line-height:1.55;}
  .opt:disabled{cursor:default; opacity:1;}
  .opt.correct{border-color:var(--ok); background:var(--ok-bg); font-weight:700;}
  .opt.wrong{border-color:var(--bad); background:var(--bad-bg);}
  .expl{margin-top:13px; border-top:1px dashed var(--line-strong); padding-top:11px; font-size:13.5px; color:var(--ink-soft);}
  .expl b{color:var(--ink);}
  .expl .pg{color:var(--accent); font-weight:700;}
  .result-num{font-size:34px; font-weight:700; text-align:center; margin:8px 0 2px;}
  .result-sub{text-align:center; color:var(--ink-soft); font-size:13.5px; margin-bottom:14px;}
  .wrong-item{border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-top:8px; font-size:13.5px;}
  .wrong-item b{display:block;}
  .wrong-item span{color:var(--ink-soft); font-size:12.5px;}
  .row{display:flex; gap:9px; margin-top:10px; flex-wrap:wrap;}
  .row .btn{flex:1; min-width:130px;}
  .hidden{display:none;}
</style>
</head>
<body>
<header style="margin-bottom:14px;">
  <div class="eyebrow"><span>WORLD HERITAGE ・ 準一級</span><a href="review.html">📖 復習ノート</a></div>
  <h1>アウトプット模試（4択）</h1>
</header>

<div id="setup">
  <div class="card">
    <div class="sec" style="margin-top:0;">出題するノート（タップで切替）</div>
    <div class="chips" id="noteChips"></div>
    <div class="row" style="margin-top:8px;">
      <button class="btn ghost" onclick="toggleAll(true)">全部選ぶ</button>
      <button class="btn ghost" onclick="toggleAll(false)">全部外す</button>
    </div>
    <div class="sec">問題数</div>
    <div class="chips" id="cntChips"></div>
    <button class="btn primary" style="margin-top:16px;" onclick="startDrill()">▶ 模試スタート</button>
    <div id="setupMsg" style="color:var(--bad); font-size:13px; margin-top:8px;"></div>
  </div>
</div>

<div id="quiz" class="hidden">
  <div class="meta-row"><span id="qPos"></span><span id="qScore"></span></div>
  <div class="card">
    <div class="qtype" id="qType"></div>
    <div class="stem" id="qStem"></div>
    <div class="opts" id="qOpts"></div>
    <div class="expl hidden" id="qExpl"></div>
  </div>
  <button class="btn primary hidden" id="nextBtn" onclick="nextQ()">次の問題 →</button>
  <button class="btn ghost" style="margin-top:9px;" onclick="quitDrill()">中断して範囲選択に戻る</button>
</div>

<div id="result" class="hidden">
  <div class="card">
    <div class="result-num" id="rScore"></div>
    <div class="result-sub" id="rSub"></div>
    <div class="row">
      <button class="btn primary" onclick="retryWrong()" id="retryWrongBtn">間違いだけ再挑戦</button>
      <button class="btn ghost" onclick="retrySame()">同じ範囲でもう一度</button>
    </div>
    <button class="btn ghost" style="margin-top:9px;" onclick="backToSetup()">範囲選択に戻る</button>
    <div class="sec" id="wrongLabel">間違えた問題</div>
    <div id="wrongList"></div>
  </div>
</div>

<script>
var PAGES = [{"id": "p1", "title": "① 2025/12 準一級ノート", "cards": [{"id": 1, "name": "シミエン国立公園", "region": "アフリカ", "meta": "エチオピア・自然遺産・1978年", "page": "P389", "primary": "ゲラダヒヒ", "kw": "ゲラダヒヒ／ワリアアイベックス／ラスダシャン山", "note": "アフリカ第4の山ラスダシャン山がそびえる山岳地帯。ゲラダヒヒは現地でキリストの使いとして珍重される。1996〜2017年まで危機遺産。", "cat": "park", "star": true}, {"id": 2, "name": "イヴィンド国立公園", "region": "アフリカ", "meta": "ガボン・自然遺産・2021年", "page": "P385", "primary": "マルミミゾウ・ニシローランドゴリラ", "kw": "マルミミゾウ／ニシローランドゴリラ／ズアカハゲチメドリ／コンゴウ滝", "note": "赤道直下のギニア低地の熱帯雨林。手つかずの自然が残り、固有種の淡水魚や絶滅危惧の哺乳類・鳥類の希少な生息地。", "cat": "park", "star": true}, {"id": 3, "name": "リオ・アビセオ国立公園", "region": "南米", "meta": "ペルー・複合遺産・1990年", "page": "P379", "primary": "ヘンディーウーリーモンキー", "kw": "ヘンディーウーリーモンキー／チャチャポヤス文化（グラン・パハテン遺跡）／プヤ", "note": "アマゾン川上流の熱帯雨林。古代種が生き残り「雲の上の人々」チャチャポヤス文化の遺跡が残る複合遺産。", "cat": "mixed", "star": true}, {"id": 4, "name": "サロンガ国立公園", "region": "アフリカ", "meta": "コンゴ民主共和国・自然遺産・1984年", "page": "P390", "primary": "ボノボ（ピグミーチンパンジー）", "kw": "ボノボ（ピグミーチンパンジー）／オカピ／食用目的の密猟／コンゴ盆地", "note": "アフリカ最大級の熱帯多雨林保護区。固有種ボノボは食用目的の密猟で激減。1999〜2021年まで危機遺産。", "cat": "park", "star": false}, {"id": 5, "name": "カジランガ国立公園", "region": "アジア", "meta": "インド・自然遺産・1985年", "page": "P388", "primary": "インドサイ・漢方薬「犀角」", "kw": "インドサイ／漢方薬「犀角」目的の密猟／ブラマプトラ川／アッサム地方", "note": "インドサイ最大の保護区。1900年頃わずか12頭→保護強化で2,000頭以上に回復。トラの高密度生息地でもある。", "cat": "park", "star": true}, {"id": 6, "name": "ケオラデオ国立公園", "region": "アジア", "meta": "インド・自然遺産・1985年", "page": "P162", "primary": "マハラジャの狩猟場・ソデグロヅル", "kw": "マハラジャの狩猟場として整備／ソデグロヅル／シヴァ神（寺院名の由来）", "note": "冬季に約20万羽の渡り鳥が飛来する小規模な保護区。沼沢地は元マハラジャの狩猟場。ラムサール条約登録地。", "cat": "park", "star": false}, {"id": 7, "name": "コモエ国立公園", "region": "アフリカ", "meta": "コートジボワール・自然遺産・1983年", "page": "P390", "primary": "西アフリカ最大の国立公園・コモエ川", "kw": "西アフリカ最大の国立公園／コモエ川／南方の熱帯雨林が広がる", "note": "サバンナ地帯だがコモエ川により熱帯雨林が広がる。密猟でゾウが激減し2003年に危機遺産→対策が奏功し2017年に脱した。", "cat": "park", "star": false}, {"id": 8, "name": "チトワン国立公園", "region": "アジア", "meta": "ネパール・自然遺産・1984年", "page": "P391", "primary": "マラリア撲滅の農薬散布・ベンガルトラ", "kw": "マラリア撲滅のため1950年代から大量の農薬を散布／ベンガルトラ／タライ平原", "note": "農薬散布・乱獲で自然破壊→1973年ネパール初の国立公園に。軍隊が密猟者を取り締まりトラやインドサイを保護。", "cat": "park", "star": false}, {"id": 9, "name": "「八萬大蔵経」版木所蔵の海印寺", "region": "アジア", "meta": "韓国・文化遺産・1995年", "page": "P214", "primary": "八萬大蔵経の版木", "kw": "八萬大蔵経の版木／蔵経板殿（湿気・劣化を防ぐ校倉造）／伽倻山", "note": "高麗時代、モンゴル軍侵攻の国難克服を願って彫られた大蔵経の版木8万枚超を所蔵。板殿は床に木炭・石灰・塩を重ね湿気を防ぐ。", "cat": "culture", "star": false}, {"id": 10, "name": "盤亀川沿いの岩面彫刻群", "region": "アジア", "meta": "韓国・文化遺産・2025年", "page": "P397", "primary": "大谷里岩刻・ダムで水没する岩面彫刻", "kw": "大谷里岩刻／川前里岩刻／ダム建設で水没する岩面彫刻", "note": "紀元前5000年〜紀元後9世紀の精緻な岩面彫刻。1965年の治水ダムで大谷里岩刻は年平均151日も水没してきた。2025年登録。", "cat": "culture", "star": false}, {"id": 11, "name": "ミジケンダ諸族のカヤ聖域森林", "region": "アフリカ", "meta": "ケニア・文化遺産・2008年", "page": "P170", "primary": "カヤ（要塞化された円形村落）", "kw": "カヤ（要塞化された円形の村落）／ミジケンダの聖なる森林／長老評議会", "note": "16世紀以降に築かれた聖域。儀式・埋葬の地で薬草の採取場でもあった。伝統は無形文化遺産にも登録。", "cat": "culture", "star": false}, {"id": 12, "name": "バット、アル・フトゥム、アル・アインの考古遺跡", "region": "中東", "meta": "オマーン・文化遺産・1988年", "page": "P196", "primary": "アフダル山地・マガン国", "kw": "アフダル山地／マガン国／蜂の巣状の石積み墳墓／メソポタミアとインダスの中継地", "note": "紀元前3千年紀の集落と墓地遺跡群。銅をメソポタミアに供給したマガン国に関連すると考えられる。", "cat": "culture", "star": false}, {"id": 13, "name": "タプタプアテア", "region": "オセアニア", "meta": "フランス（仏領ポリネシア）・文化遺産・2017年", "page": "P328", "primary": "オロ神・マラエ・ライアテア島", "kw": "オロ神（戦いと豊穣の神）／マラエ（祭祀場）／ライアテア島／ポリネシアン・トライアングル", "note": "人類が最後に定住したポリネシアの中心。テ・アオ（人の世界）とテ・ポ（神の世界）が交差する聖地。文化的景観。", "cat": "culture", "star": false}, {"id": 14, "name": "ザビードの歴史地区", "region": "中東", "meta": "イエメン・文化遺産・1993年", "page": "P337", "primary": "アル・アシャエル・モスク", "kw": "アル・アシャエル・モスク（アラビア半島初の大学の前身）／アッバース朝の学問都市", "note": "9世紀にアッバース朝総督が建設。最盛期は200以上のマドラサやモスクが林立した学問都市。2000年に危機遺産登録。", "cat": "culture", "star": false}, {"id": 15, "name": "アッコの旧市街", "region": "中東", "meta": "イスラエル・文化遺産・2001年", "page": "P305", "primary": "アル・ジャッザール・モスク・聖ヨハネ騎士団", "kw": "アル・ジャッザール・モスク／聖ヨハネ騎士団の地下遺構／十字軍の争奪戦", "note": "国際貿易港として繁栄。十字軍時代にイスラム教徒とキリスト教徒が争奪。現旧市街はオスマン帝国が再建。", "cat": "culture", "star": false}, {"id": 16, "name": "チュニスの旧市街", "region": "アフリカ", "meta": "チュニジア・文化遺産・1979年", "page": "P304", "primary": "ザイトゥーナ・モスク・ウマイヤ朝", "kw": "ザイトゥーナ・モスク（オリーヴのモスク）／ハサン・イブン・アル・ヌウマーン／ウマイヤ朝", "note": "7世紀にウマイヤ朝が築いたイスラム都市。元はカルタゴの衛星都市。732年築の大モスクがザイトゥーナ・モスク。", "cat": "culture", "star": false}, {"id": 17, "name": "伝説の都市トンブクトゥ", "region": "アフリカ", "meta": "マリ・文化遺産・1988年", "page": "P432", "primary": "サンコレ・モスク・黄金の都", "kw": "サンコレ・モスク／「黄金の都」／サハラ交易の中継地／マリ帝国・ソンガイ帝国", "note": "サハラ砂漠南端の交易都市。イスラム文化が発達し100超のマドラサが建設。2012年にイスラム過激派が遺跡を破壊。", "cat": "culture", "star": false}]}, {"id": "p2", "title": "② 2025/12 過去問（続き）", "cards": [{"id": 1, "name": "コトルの文化歴史地域と自然", "region": "ヨーロッパ", "meta": "モンテネグロ・文化遺産・1979年", "page": "P426", "primary": "ロヴツェン山・1979年に世界最初の危機遺産", "kw": "ロヴツェン山／アドリア海のコトル湾／1979年に世界最初の危機遺産（地震被害）／ヴェネツィアの勢力下", "note": "アドリア海コトル湾最奥の商業都市。背後のロヴツェン山が天然の要害。地震被害により1979年に世界最初の危機遺産となった。", "cat": "culture", "star": true}, {"id": 2, "name": "セネガンビアのストーン・サークル遺跡群", "region": "アフリカ", "meta": "ガンビア／セネガル・文化遺産・2006年", "page": "P191", "primary": "ストーン・サークルに付随する墳墓（集団墓）", "kw": "ストーン・サークルには墳墓（多くは集団墓）が付随／8〜14本の石柱／ガンビア川沿いに1,000以上の遺跡", "note": "ガンビア川沿いに1,000以上の遺跡群。石柱8〜14本のストーン・サークルに墳墓が付随。高度な石工技術と埋葬の慣習を示す。", "cat": "culture", "star": true}, {"id": 3, "name": "メノルカ島のタライオティック文化", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2023年", "page": "P190", "primary": "キュクロプス式・円錐形の塔タラヨット", "kw": "キュクロプス式（モルタル不使用の空積み）／円錐形の塔タラヨット／集団墓ナベタ／T字石柱タウラ", "note": "青銅器〜鉄器時代の石積み遺跡群。モルタルを使わない空積み（キュクロプス式）で、円錐形の塔タラヨットやナベタ、タウラを築いた。階層社会の出現を示す。", "cat": "culture", "star": true}, {"id": 4, "name": "人類化石出土のサンギラン遺跡", "region": "アジア", "meta": "インドネシア・文化遺産・1996年", "page": "P186", "primary": "ホモ・エレクトゥス・エレクトゥス（ジャワ原人）", "kw": "ホモ・エレクトゥス・エレクトゥス（ジャワ原人）／メガントロプス／ジャワ島中部", "note": "ジャワ島の初期人類化石の出土地。ホモ・エレクトゥス・エレクトゥス（ジャワ原人）やメガントロプスが見つかった。", "cat": "culture", "star": false}, {"id": 5, "name": "北京原人化石出土の周口店遺跡", "region": "アジア", "meta": "中国・文化遺産・1987年", "page": "P187", "primary": "シナントロプス・ペキネンシス（北京原人）", "kw": "シナントロプス・ペキネンシス（北京原人）／火と道具の使用／東アジア最大の旧石器遺跡／山頂洞人", "note": "東アジア最大の旧石器時代遺跡。シナントロプス・ペキネンシス（北京原人）を発見。火と道具を使い集団生活していた。山頂洞人の遺跡も。", "cat": "culture", "star": false}, {"id": 6, "name": "マルタの巨石神殿群", "region": "ヨーロッパ", "meta": "マルタ・文化遺産・1980年", "page": "P188", "primary": "ゴゾ島のジュガンティーヤ・儀式的中心地", "kw": "ゴゾ島のジュガンティーヤ／計7基／高度に組織化された社会の重要な儀式的中心地", "note": "ゴゾ島・マルタ島の巨石神殿群。ゴゾ島のジュガンティーヤなど計7基が登録。高度に組織化された社会の重要な儀式的中心地。", "cat": "culture", "star": false}, {"id": 7, "name": "オークニー諸島の新石器時代遺跡", "region": "ヨーロッパ", "meta": "イギリス・文化遺産・1999年", "page": "P192", "primary": "スカラ・ブラエ", "kw": "集落跡スカラ・ブラエ／北西ヨーロッパの巨石文化／スコットランド北方の諸島", "note": "スコットランド北方の諸島にある新石器時代の集落跡スカラ・ブラエなど。北西ヨーロッパの巨石文化を象徴。", "cat": "culture", "star": false}, {"id": 8, "name": "バルーミニのスー・ヌラージ", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1997年", "page": "P193", "primary": "ヌラーゲ（堅固な要塞）", "kw": "ヌラーゲ（堅固な要塞）／サルディーニャ島／円錐状の石積み／高さ18.5mの最大級", "note": "サルディーニャ島の石積みの防御施設。「ヌラーゲ」は堅固な要塞で、スー・ヌラージは高さ18.5mの最大級。", "cat": "culture", "star": false}, {"id": 9, "name": "ナン・マトール:ミクロネシア東部の儀礼的中心地", "region": "オセアニア", "meta": "ミクロネシア連邦・文化遺産（危機）・2016年", "page": "P237", "primary": "古代の100以上の人工島・シャウテレウル朝", "kw": "古代につくられた100以上の人工島／シャウテレウル朝の儀礼の中心地／ポンペイ島／登録と同時に危機遺産", "note": "ポンペイ島の100以上の人工島。シャウテレウル朝の儀礼の中心地。遺跡倒壊の懸念で登録と同時に危機遺産に。", "cat": "culture", "star": false}, {"id": 10, "name": "ニンバ山厳正自然保護区", "region": "アフリカ", "meta": "ギニア／コートジボワール・自然遺産・1981年", "page": "P380", "primary": "ハルマッタン（砂嵐）・コビトカバ", "kw": "ハルマッタン（サハラからの砂嵐）／コビトカバ／ニシコモチヒキガエル", "note": "ギニア／コートジボワールの保護区。砂嵐ハルマッタンと季節風で高温多湿。コビトカバやニシコモチヒキガエルが有名。", "cat": "park", "star": false}, {"id": 11, "name": "青海フフシル（可可西里）", "region": "アジア", "meta": "中国・自然遺産・2017年", "page": "P269", "primary": "チベットカモシカ（チルー）の渡り", "kw": "チベットカモシカ（チルー）の渡り／チベット高原「第三極」／毛皮目的の密猟／映画『ココシリ』", "note": "チベット高原「第三極」の極寒高原。チベットカモシカ（チルー）の渡りのルートで、毛皮目的の密猟が問題に。", "cat": "park", "star": false}, {"id": 12, "name": "オオカバマダラ蝶生物圏保存地域", "region": "北中米", "meta": "メキシコ・自然遺産・2008年", "page": "P149", "primary": "蝶の越冬地・4世代にわたる世代交代", "kw": "オオカバマダラ蝶の越冬地／4世代にわたる世代交代／メキシコ→カナダ東部への大移動", "note": "メキシコの山中にあるオオカバマダラの越冬地。春にカナダ東部へ渡り、その間に4世代の世代交代がある。", "cat": "park", "star": false}, {"id": 13, "name": "カンペチェ州カラクムルの古代マヤ都市と保護熱帯雨林群", "region": "北中米", "meta": "メキシコ・複合遺産・2002年", "page": "P199", "primary": "建造物II（マヤ最大級の神殿ピラミッド）", "kw": "高さ約55mの「建造物II」（マヤ最大級の神殿ピラミッド）／古代マヤ都市＋保護熱帯雨林（複合遺産）", "note": "ユカタン半島の古代マヤ都市＋保護熱帯雨林の複合遺産。高さ約55mの「建造物II」はマヤ最大級の神殿ピラミッド。", "cat": "mixed", "star": false}, {"id": 14, "name": "シングヴェトリル国立公園", "region": "ヨーロッパ", "meta": "アイスランド・文化遺産（文化的景観）・2004年", "page": "P362", "primary": "ギャオ（大陸プレートの割れ目）・アルシング", "kw": "大陸プレートの割れ目「ギャオ」／世界最古の議会アルシング（930年〜）／法律の岩", "note": "世界最古の議会アルシング（930年〜）の遺構が残る文化的景観。大陸プレートの割れ目「ギャオ」が見られる。", "cat": "culture", "star": false}, {"id": 15, "name": "グロス・モーン国立公園", "region": "北中米", "meta": "カナダ・自然遺産・1987年", "page": "P359", "primary": "プレートテクトニクス・テーブルランド・フィヨルド", "kw": "プレートテクトニクス理論／テーブルランド（露出したマントル）／フィヨルド／地質学の野外博物館", "note": "「地質学の野外博物館」。プレートテクトニクスの過程やマントル露出（テーブルランド）、氷河が刻んだフィヨルドが見られる。", "cat": "park", "star": false}]}, {"id": "p3", "title": "③ 6/14 2025/12 過去問", "cards": [{"id": 1, "name": "タジキスタン国立公園（パミールの山脈）", "region": "アジア", "meta": "タジキスタン・自然遺産・2013年", "page": "P363", "primary": "フェドチェンコ氷河・地殻変動", "kw": "フェドチェンコ氷河（北極圏以外で最も長い氷河）／パミール高原の7,000m超の山峰／地球上で最も地殻変動の激しい場所のひとつ／隕石湖カラクル湖", "note": "パミールの山脈が連なるタジキスタン東部。プレートテクトニクスを研究できる地殻変動の激しい地域で、北極圏以外で最も長いフェドチェンコ氷河や標高最高の隕石湖カラクル湖がある。", "cat": "park", "star": false}, {"id": 2, "name": "ヴィエリチカとボフニャの王立岩塩坑", "region": "ヨーロッパ", "meta": "ポーランド・文化遺産・1978年", "page": "P344", "primary": "聖キンガの礼拝堂・岩塩の彫刻", "kw": "岩塩で築いた礼拝堂／ポーランド王国の財源の3分の1を占めた／ポーランド王カジミェシュ3世が保護／地下101mの聖キンガの礼拝堂", "note": "ヨーロッパ最古級の岩塩坑。14〜16世紀の産出岩塩はポーランド王国財源の3分の1を占め、王カジミェシュ3世が保護した。地下101mの聖キンガの礼拝堂は彫刻もシャンデリアも全て岩塩製。", "cat": "culture", "star": false}, {"id": 3, "name": "アツィナナナの熱帯雨林", "region": "アフリカ", "meta": "マダガスカル・自然遺産・2007年", "page": "P396", "primary": "マダガスカル島・2025年に危機遺産を脱した", "kw": "マダガスカル島の6つの国立公園／キツネザル類など固有種が独自進化／森林の不法伐採と密猟／2025年に危機遺産リストを脱した", "note": "独自の進化を遂げた動植物が生息する熱帯雨林。120種以上の哺乳類のうち78種が生息する。不法伐採と密猟で2010年に危機遺産となったが、2025年に危機遺産リストを脱した。", "cat": "park", "star": false}, {"id": 4, "name": "アンドレファナ乾燥林群", "region": "アフリカ", "meta": "マダガスカル・自然遺産・1990年", "page": "P364", "primary": "ツィンギー・ド・ベマラハ・尖った奇岩", "kw": "クイナモドキ（固有種）／レムール（キツネザル）／ツィンギー・ド・ベマラハ国立公園／石灰岩カルストの高さ100mの尖塔状の奇岩", "note": "マダガスカル西部の乾燥林。クイナモドキやレムール（キツネザル）が生息。ツィンギー・ド・ベマラハには雨の溶食で生まれた高さ100mの尖った奇岩が連なる。", "cat": "park", "star": false}, {"id": 5, "name": "W-アルリ-ペンジャーリ国立公園群", "region": "アフリカ", "meta": "ニジェール／ベナン／ブルキナファソ・自然遺産・1996年", "page": "P391", "primary": "アフリカ有数の酷暑地帯・西アフリカ最大のゾウ生息域", "kw": "アフリカでも最も暑い地帯／サバンナと森林の境界域／レイヨウ類のトピ／西アフリカ最大のゾウの生息域", "note": "アフリカ有数の酷暑地帯にあるサバンナの自然保護区。ニジェールのW国立公園にベナン・ブルキナファソの公園を加え拡大された。西アフリカ最大のゾウの生息域でもある。", "cat": "park", "star": false}, {"id": 6, "name": "ニョコロ・コバ国立公園", "region": "アフリカ", "meta": "セネガル・自然遺産・1981年", "page": "P385", "primary": "ジャイアントイランド・2024年に危機遺産を脱した", "kw": "世界最大のアンテロープ「ジャイアントイランド」／スーダン・サバンナとギニア森林の移行地帯／1,500種の植物／2024年に危機遺産リストから脱した", "note": "2つの植生をもつ移行地帯で1,500種の植物が生育する。世界最大のアンテロープ、ジャイアントイランドが生息。密猟で危機遺産となったが2024年にリストから削除された。", "cat": "park", "star": false}, {"id": 7, "name": "テ・ワヒポウナム", "region": "オセアニア", "meta": "ニュージーランド・自然遺産・1990年", "page": "P360", "primary": "アオラキ／マウント・クック・氷河作用", "kw": "アオラキ／マウント・クック／サザン・アルプス山脈／氷河作用と地殻変動／4つの国立公園（フィヨルドランドなど）", "note": "NZ南島南西部の景観。インド・オーストラリアプレートと太平洋プレートの衝突で形成されたサザン・アルプス山脈沿いにあり、氷河作用と地殻変動が多彩な景観を生んだ。", "cat": "park", "star": false}, {"id": 8, "name": "フェズの旧市街", "region": "アフリカ", "meta": "モロッコ・文化遺産・1981年", "page": "P285", "primary": "モロッコ最古のイスラム王都・カラウィーン・モスク", "kw": "イドリース朝のイドリース2世が建設／モロッコ最古のイスラム王都／カラウィーン・モスク（北アフリカ最大のモスク）／迷路状の街", "note": "8世紀末にイドリース朝のイドリース2世が建設したモロッコ最古のイスラム王都。旧市街の中心にある857年建立のカラウィーン・モスクは北アフリカ最大のモスク。", "cat": "culture", "star": false}, {"id": 9, "name": "マラケシュの旧市街", "region": "アフリカ", "meta": "モロッコ・文化遺産・1985年", "page": "P424", "primary": "ジャマ・エル・フナ広場・地震被害", "kw": "ジャマ・エル・フナ広場（街の象徴）／ムラービト朝が建設／アトラス山脈のふもと／2023年の地震で建物が倒壊", "note": "ムラービト朝のユースフ・イブン・ターシュフィーンが築いた都市。旧市街中心のジャマ・エル・フナ広場は街の象徴。2023年のモロッコ地震で旧市街の建物が倒壊する被害を受けた。", "cat": "culture", "star": false}, {"id": 10, "name": "ラバト：近代の首都と歴史都市の側面を併せもつ都市", "region": "アフリカ", "meta": "モロッコ・文化遺産・2012年", "page": "P301", "primary": "ムワッヒド城壁・イスラムとヨーロッパの融合", "kw": "ムワッヒド城壁・城門／イスラム文化と西洋モダニズムの融合／ハッサン・モスク／ムーア人文化の重要遺跡", "note": "イスラム文化と西洋モダニズムが融合したモロッコの首都。旧市街にはムワッヒド朝の首都建設計画の現存する唯一の痕跡であるムワッヒド城壁・城門が残る。", "cat": "culture", "star": false}, {"id": 11, "name": "ラジャスタン州のジャイプール市街", "region": "アジア", "meta": "インド・文化遺産・2019年", "page": "P304", "primary": "サワーイー・ジャイ・シング2世・ピンク・シティ", "kw": "マハラジャのサワーイー・ジャイ・シング2世が建設／都市計画に従い碁盤目状に整備／「ピンク・シティ」／シティ・パレス", "note": "マハラジャのサワーイー・ジャイ・シング2世が18世紀前半に築いた都市。都市計画に従って碁盤目状に整えられ、ピンク色の外観から「ピンク・シティ」と呼ばれる。", "cat": "culture", "star": false}, {"id": 12, "name": "バゲルハット：モスクを中心とした歴史都市", "region": "アジア", "meta": "バングラデシュ・文化遺産・1985年", "page": "P283", "primary": "ウルグ・ハーンジャハーン・360のモスク", "kw": "トルコ系武将ウルグ・ハーンジャハーンが建設／湿地を開拓し360のモスク・聖廟・池/シャット・グンバド・モスク／ハーン・ジャハーン様式", "note": "15世紀前半にトルコ系の武将ウルグ・ハーンジャハーンが築いた都市遺跡。湿地を開拓し360のモスクをつくったと伝わり、独特の様式の約50の建築物が現存する。", "cat": "culture", "star": false}, {"id": 13, "name": "ブリュッセルのグラン・プラス", "region": "ヨーロッパ", "meta": "ベルギー・文化遺産・1998年", "page": "P417", "primary": "バロック様式のギルドハウス・大広場", "kw": "「大広場」を意味する／壮麗なギルドハウスが並ぶ／建物正面がバロック様式で統一／1695年フランス軍の攻撃で焼失し再建", "note": "ブリュッセル旧市街中心の広場。1695年にルイ14世のフランス軍の攻撃で市庁舎以外が焼失したが、ギルドの団結で再建。ギルドハウスは正面がバロック様式で統一された。", "cat": "culture", "star": false}, {"id": 14, "name": "アムステルダム中心部：ジンフェルグラハト内部の17世紀の環状運河地区", "region": "ヨーロッパ", "meta": "オランダ・文化遺産・2010年", "page": "P254", "primary": "ジンフェルグラハト・アンネの日記", "kw": "一番外側の運河ジンフェルグラハト／扇状に広がる環状運河／最大規模の干拓工事／アンネ・フランクの隠れ家（アンネの日記）", "note": "16〜17世紀の港湾都市プロジェクトで建設された環状運河地区。最大規模の干拓事業の成果で、アンネ・フランクが隠れ「アンネの日記」を記したアパートも残る。", "cat": "culture", "star": false}, {"id": 15, "name": "ミディ運河", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1996年", "page": "P179", "primary": "ピエール・ポール・リケ・地中海と大西洋を結ぶ", "kw": "ピエール・ポール・リケが私財を投じて建設／地中海と大西洋の物流を結ぶ／60ヵ所以上の閘門で高低差を克服／総延長360km", "note": "ルイ14世時代にピエール・ポール・リケが私財を投じて建設した運河。約190mの高低差を60ヵ所以上の閘門で克服し、地中海と大西洋の物流を結びつけた。", "cat": "culture", "star": false}, {"id": 16, "name": "ベルリンのモダニズム公共住宅", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2008年", "page": "P296", "primary": "ブルーノ・タウト・近代的な公共住宅群", "kw": "ヴァイマール共和国時代の近代的な公共住宅群／ブルーノ・タウトら建築家／低所得層向けの住宅供給政策／6つの集合住宅", "note": "20世紀前半のヴァイマール共和国時代に建てられた近代的な公共住宅群。低所得層の住環境改善が目的で、ブルーノ・タウトらが中心となり6つの集合住宅が登録された。", "cat": "culture", "star": false}, {"id": 17, "name": "カラカスの大学都市", "region": "南米", "meta": "ベネズエラ・文化遺産・2000年", "page": "P336", "primary": "ベネズエラ中央大学・ビリャヌエバの設計", "kw": "ベネズエラ中央大学の施設群／カルロス・ラウル・ビリャヌエバが設計／鮮やかな色彩のコロニアル建築／熱帯気候に配慮した中庭や窓", "note": "首都カラカスに築かれたベネズエラ中央大学の施設群。近代建築の巨匠カルロス・ラウル・ビリャヌエバが設計し、熱帯気候に配慮して中庭や窓を多く設けた。", "cat": "culture", "star": false}, {"id": 18, "name": "トリポリのラシード・カラーミー国際見本市会場", "region": "中東", "meta": "レバノン・文化遺産・2023年", "page": "P438", "primary": "オスカー・ニーマイヤー・緊急的登録推薦", "kw": "ブラジル人建築家オスカー・ニーマイヤーが設計／ブーメラン型の屋根付きホール／鉄筋コンクリート造／緊急的登録推薦で危機遺産登録", "note": "ブラジル人建築家オスカー・ニーマイヤーが設計した近代化政策の中心施設。レバノン内戦で建設が中止され、緊急的登録推薦で2023年に危機遺産として登録された。", "cat": "culture", "star": false}]}, {"id": "p4", "title": "④ 6/20 2025/7 準一級復習", "cards": [{"id": 1, "name": "ヨーロッパの大温泉都市群", "region": "ヨーロッパ", "meta": "ヨーロッパ7カ国・文化遺産・2021年", "page": "P257", "primary": "ゲーテ・カルロヴィ・ヴァリ", "kw": "18世紀初頭〜1930年代に発展した11の温泉都市／7カ国にまたがるトランスバウンダリー・サイト／文豪ゲーテが湯治したカルロヴィ・ヴァリ／ベートーヴェンの第九ゆかりのバーデン・バイ・ウィーン", "note": "国際的なヨーロッパの温泉文化を証明する都市群。7カ国に点在する18世紀初頭〜1930年代の11の温泉都市からなり、ゲーテが湯治したカルロヴィ・ヴァリなどを含む。", "cat": "culture", "star": false}, {"id": 2, "name": "カナイマ国立公園", "region": "南米", "meta": "ベネズエラ・自然遺産・1994年", "page": "P362", "primary": "アンヘルの滝・アウヤンテプイ山", "kw": "世界最古のテーブルマウンテン／落差979mの世界最長アンヘルの滝／アウヤンテプイ山／17億年前の先カンブリア紀の地層", "note": "ベネズエラ南東部のテーブルマウンテンと熱帯雨林の山地。プレート運動の影響を受けず17億年前の地層が現存。アウヤンテプイ山に世界最長のアンヘルの滝がある。", "cat": "park", "star": false}, {"id": 3, "name": "ゼレナー・ホラにあるネポムークの聖ヨハネ巡礼教会", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1994年", "page": "P145", "primary": "ヤン・ブラジェイ・サンティーニ・五芒星の平面", "kw": "建築家ヤン・ブラジェイ・サンティーニが設計／上から見ると五芒星の平面プラン／5室の礼拝堂と5つの門で十芒星の回廊／聖ヤン・ネポムツキーゆかり", "note": "1393年に殉教した聖ヤン・ネポムツキーゆかりの巡礼教会。建築家サンティーニの設計で、上から見ると五芒星、周囲を含めると十芒星をなす特徴的な平面プランをもつ。", "cat": "culture", "star": false}, {"id": 4, "name": "テルチの歴史地区", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1992年", "page": "P415", "primary": "ザハリアーシュ・フラデツ・聖母マリア記念柱", "kw": "1530年の大火災後に火に強い造りで復興／領主ザハリアーシュ・フラデツ／ザハリアーシュ広場の聖母マリア記念柱／ルネサンス様式と初期バロック様式", "note": "モラヴィア地方南部の街。1530年の大火災後、領主ザハリアーシュ・フラデツが火に強い造りに復興。広場には市民が寄進した聖母マリア記念柱が立つ。", "cat": "culture", "star": false}, {"id": 5, "name": "ナンシーのスタニスラス広場、カリエール広場、アリアンス広場", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1983年", "page": "P291", "primary": "スタニスラス・レシチニスキー・ロココ様式", "kw": "ロレーヌ公スタニスラス・レシチニスキーの命による都市計画／新市街と旧市街を結ぶ3つの広場／華麗なロココ風の門や鉄柵／古典主義様式の市庁舎", "note": "18世紀半ばに整備されたナンシーの3つの広場。ロレーヌ公スタニスラス・レシチニスキーの都市計画でつくられ、華麗なロココ風の門や鉄柵が広場を囲む。", "cat": "culture", "star": false}, {"id": 6, "name": "海港都市バルパライソの歴史地区", "region": "南米", "meta": "チリ・文化遺産・2003年", "page": "P225", "primary": "サント・ドミンゴの丘・傾斜式エレベーター", "kw": "港から丘へ放射状に延びる坂道や石段／アセンソール（傾斜式エレベーター）／サント・ドミンゴの丘の古い教会／スペイン人が築いた港街", "note": "チリ中部の港街。港から丘へ坂道や石段が放射状に延び、アセンソールと呼ばれる傾斜式エレベーターが多い。サント・ドミンゴの丘に古い教会が残る。", "cat": "culture", "star": false}, {"id": 7, "name": "ヴルコリニェツの伝統的集落", "region": "ヨーロッパ", "meta": "スロバキア・文化遺産・1993年", "page": "P247", "primary": "オオカミ狩りの猟師・木造家屋", "kw": "地名「ヴルク」はスロバキア語のオオカミ／かつてオオカミ狩りの猟師が住む村／中世以来の伝統的工法の木造家屋45戸／実際に人々が暮らす", "note": "スロバキア中部の山地にある小さな農村。地名はオオカミを意味し、かつてオオカミ狩りの猟師が住んだ。伝統的工法の木造家屋45戸が残り今も人々が暮らす。", "cat": "culture", "star": false}, {"id": 8, "name": "クイーンズランドの湿潤熱帯地域", "region": "オセアニア", "meta": "オーストラリア・自然遺産・1988年", "page": "P381", "primary": "ニオイネズミカンガルー・湿潤熱帯雨林", "kw": "貿易風がもたらす多量の雨／800種以上の樹木／シダ植物から裸子・被子植物への進化過程／最も原始的なニオイネズミカンガルー", "note": "オーストラリア北東部の熱帯雨林。800種以上の樹木が生育し植物の進化過程が見られる。最も原始的なカンガルー類ニオイネズミカンガルーが生息。", "cat": "park", "star": false}, {"id": 9, "name": "シホテ・アリニ山脈中央部", "region": "アジア", "meta": "ロシア・自然遺産・2001年", "page": "P377", "primary": "タイガと亜熱帯林の混生・アムールトラ", "kw": "タイガ（亜寒帯針葉樹林）と亜熱帯林が混生／南方系と北方系の動物が共存／アムールトラ／シマフクロウ", "note": "日本海に面したロシアの巨大な森林地帯。タイガと亜熱帯林が混生し、南方系と北方系の動物が共存。アムールトラなど希少動物が多く生息する。", "cat": "park", "star": false}, {"id": 10, "name": "サン・クリストバル・デ・ラ・ラグナ", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1999年", "page": "P222", "primary": "植民地政策のモデル・要塞をもたない最初の都市", "kw": "のちの植民地政策のモデルになった都市／要塞をもたない最初の都市／スペイン領カナリア諸島／碁盤目状の都市計画", "note": "スペイン領カナリア諸島にある、のちの植民地政策のモデルになった都市。要塞をもたない最初の都市として知られ、碁盤目状に計画された。", "cat": "culture", "star": false}, {"id": 11, "name": "ビガンの歴史地区", "region": "アジア", "meta": "フィリピン・文化遺産・1999年", "page": "P224", "primary": "バハイ・ナ・バト・碁盤目状の街", "kw": "16世紀後半にスペインが築いた港街／中国やメキシコとの交易拠点／碁盤目状の都市計画／石と木の家屋「バハイ・ナ・バト」", "note": "ルソン島の港街。スペインが築き中国・メキシコとの交易で繁栄。碁盤目状に整備され、外観はスペイン風だが中国・フィリピンの様式を採った「バハイ・ナ・バト」が並ぶ。", "cat": "culture", "star": false}, {"id": 12, "name": "サルヴァドル・デ・バイアの歴史地区", "region": "南米", "meta": "ブラジル・文化遺産・1985年", "page": "P223", "primary": "ポルトガル領ブラジルの首都・新大陸初の奴隷市場", "kw": "ポルトガル領ブラジルの最初の首都／新大陸初の奴隷市場／プランテーションで栄えた港湾都市／バイア州の州都", "note": "ブラジル北東部バイア州の州都。ポルトガル領ブラジル最初の首都で、プランテーションで栄えた港湾都市。新大陸初の奴隷市場が置かれた。", "cat": "culture", "star": false}, {"id": 13, "name": "プエブラの歴史地区", "region": "北中米", "meta": "メキシコ・文化遺産・1987年", "page": "P223", "primary": "ロザリオの聖母礼拝堂・アズレージョ", "kw": "スペイン人が築いた植民都市／中南米特有のバロック様式／ロザリオの聖母礼拝堂／装飾タイル「アズレージョ」", "note": "標高約2,170mに位置するスペインが築いた植民都市。中南米特有のバロック様式の建造物が残り、ロザリオの聖母礼拝堂の内装は傑作とされる。", "cat": "culture", "star": false}, {"id": 14, "name": "シダーデ・ヴェーリャ、リベイラ・グランデの歴史地区", "region": "アフリカ", "meta": "カーボヴェルデ・文化遺産・2009年", "page": "P270", "primary": "ヨーロッパ諸国初の熱帯地域の植民都市・クレオール文化", "kw": "ヨーロッパ諸国初の熱帯地域における植民都市／奴隷貿易の中継点／海賊フランシス・ドレークの来襲で破壊／クレオール文化の都市", "note": "西アフリカ沖カーボヴェルデの島。15世紀半ばにポルトガルが築いたヨーロッパ諸国初の熱帯地域の植民都市。海賊フランシス・ドレークの来襲で破壊された。", "cat": "culture", "star": false}, {"id": 15, "name": "カルタヘナの港、要塞、歴史的建造物群", "region": "南米", "meta": "コロンビア・文化遺産・1984年", "page": "P271", "primary": "ペドロ・デ・エレディア・サン・フェリペ要塞", "kw": "ペドロ・デ・エレディアが建設した港湾都市／海賊フランシス・ドレークに占領された／海賊対策の城壁／サン・フェリペ要塞", "note": "カリブ海に面した港湾都市。ペドロ・デ・エレディアが建設し新大陸の金の積出港として繁栄。海賊フランシス・ドレークの占領後、城壁とサン・フェリペ要塞で守りを固めた。", "cat": "culture", "star": false}, {"id": 16, "name": "バンディアガラの断崖", "region": "アフリカ", "meta": "マリ・複合遺産・1989年", "page": "P329", "primary": "ドゴン族・神アンマへの信仰", "kw": "ドゴン族の集落が残る断崖／奴隷狩りやイスラム化から逃れて移住／神アンマを信仰する神話／断崖に築かれた住居や神殿", "note": "ニジェール川流域の断崖。奴隷狩りやイスラム化から逃れたドゴン族が移り住んだ。集落は神アンマを信仰するドゴン族の神話に由来する。", "cat": "mixed", "star": false}, {"id": 17, "name": "クタマク：バタマリバ人の土地", "region": "アフリカ", "meta": "トーゴ／ベナン・文化遺産・2004年", "page": "P246", "primary": "バタマリバ人・塔状の住居タキエンタ", "kw": "少数民族バタマリバ人が住む地域／泥で築かれた塔状の住居タキエンタ／トーゴのシンボル／2階は穀物倉庫で家屋は人体の象徴", "note": "少数民族バタマリバ人が住む地域。泥で築かれた塔状の住居タキエンタが密集して立ち並ぶ。タキエンタはトーゴのシンボルで、家屋自体が人体の象徴とされる。", "cat": "culture", "star": false}, {"id": 18, "name": "シュパイアの大聖堂", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1981年", "page": "P416", "primary": "ハインリヒ4世・ドイツ・ロマネスク建築の先駆け", "kw": "ザーリア朝のコンラート2世が建造開始／ドイツ・ロマネスク建築の先駆け／ハインリヒ4世が26年かけ改築／1689年の火災後もロマネスク様式を堅守", "note": "ライン川沿いに立つドイツ・ロマネスク建築の先駆けとなった大聖堂。ハインリヒ4世が改築。火災や戦災で何度も破壊されたが、その度にロマネスク様式で再建された。", "cat": "culture", "star": false}, {"id": 19, "name": "イラン縦貫鉄道", "region": "中東", "meta": "イラン・文化遺産・2021年", "page": "P178", "primary": "カスピ海とペルシア湾を結ぶ・外国の支配を避けた", "kw": "北部カスピ海と南西部ペルシア湾を結ぶ全長1,394km／4つの気候帯を通過／224のトンネルと360の橋／外国からの投資と支配を避けイラン国内資本で建設", "note": "カスピ海とペルシア湾を結ぶ全長1,394kmの鉄道。地形的障害を克服するため多数のトンネルや橋を建設。外国の投資と支配を避けイラン国内資本で賄われた。", "cat": "culture", "star": false}, {"id": 20, "name": "ゼメリング鉄道", "region": "ヨーロッパ", "meta": "オーストリア・文化遺産・1998年", "page": "P178", "primary": "鉄道として初めて世界遺産登録・アルプスの山岳鉄道", "kw": "鉄道として初めて世界遺産登録された／アルプス山脈を通る山岳鉄道／19世紀の技術の粋／ゼメリング峠がリゾート地に", "note": "アルプス山脈を通る全長41.8kmの山岳鉄道。鉄道として初めて世界遺産登録された。開通により山々を車窓から眺められるようになり、峠はリゾート地となった。", "cat": "culture", "star": false}]}, {"id": "p5", "title": "⑤ 6/21 2024/7 過去問", "cards": [{"id": 1, "name": "パドヴァの14世紀のフレスコ画群", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2021年", "page": "P144", "primary": "スクロヴェーニ礼拝堂・ジョットのフレスコ画", "kw": "1302〜1397年のフレスコ画を保持する8つの建造物群／遠近法や陰影で立体感／ジョットの革新的なフレスコ画／登録基準(ii)のみ", "note": "14世紀のフレスコ画を残す8つの建造物群。スクロヴェーニ礼拝堂には、遠近法や陰影で立体感をもたせる新技法を先駆けて取り入れたジョットのフレスコ画が残る。", "cat": "culture", "star": false}, {"id": 2, "name": "ボローニャのポルティコ群", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2021年", "page": "P145", "primary": "公共のための私有財産であるポルティコ", "kw": "ギリシャ神殿に起源をもつ屋根付きの柱廊・回廊／12世紀から現在までの12の構成要素／公共のための私有財産／木造・石造・鉄筋など多様／登録基準(iv)のみ", "note": "ポルティコは屋根付きの柱廊・回廊。12世紀から現在までのボローニャ市内のポルティコ群で、公共のための私有財産であり、街のアイデンティティの表れとなっている。", "cat": "culture", "star": false}, {"id": 3, "name": "アクイレイアの考古地区とバシリカ総主教聖堂", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1998年", "page": "P426", "primary": "カトリックの中央ヨーロッパへの布教拠点", "kw": "共和政ローマが軍事目的で建設／カトリックの中央ヨーロッパへの布教拠点／ロマネスク様式に一部ゴシック／1348年の地震で被災", "note": "共和政ローマが築いた街。1031年再建のバシリカ総主教聖堂はカトリックの中央ヨーロッパへの布教拠点で、1348年の地震被災部分の補修に一部ゴシック様式が用いられた。", "cat": "culture", "star": false}, {"id": 4, "name": "ウルビーノの歴史地区", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1998年", "page": "P262", "primary": "ラファエロ・サンティの生誕地・ルネサンスの城郭都市", "kw": "ルネサンス芸術の中心地のひとつ／画家・建築家ラファエロ・サンティの生誕地／モンテフェルトロ家のフェデリーコが文芸を保護／経済停滞でルネサンスの街並みが残った", "note": "ルネサンス芸術の中心地のひとつとなった城郭都市。モンテフェルトロ家が文芸を保護し文化が花開いた。ラファエロ・サンティの生誕地でもある。", "cat": "culture", "star": false}, {"id": 5, "name": "高敞、和順、江華の支石墓跡", "region": "アジア", "meta": "韓国・文化遺産・2000年", "page": "P193", "primary": "巨大な石板を石塊で支えた墓・ドルメン", "kw": "巨大な石板を石塊で支えた墓／英語ではドルメン・韓国語ではコインドル／先史時代の巨石文化／高敞は世界で最も豊富な種類のドルメンが密集", "note": "先史時代の巨石文化の支石墓群。巨大な石板を石塊で支えた墓で、英語でドルメン、韓国語でコインドルという。高敞は世界で最も豊富な種類のドルメンが密集する。", "cat": "culture", "star": false}, {"id": 6, "name": "セゴビアの旧市街とローマ水道橋", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1985年", "page": "P269", "primary": "アルカサル・映画「白雪姫」の城のモデル", "kw": "2層アーチのローマ水道橋（全長約813m）／128本の柱／アルカサル（王宮）／ディズニー映画「白雪姫」の城のモデル", "note": "2つの川に挟まれた要塞都市。ローマ人が築いた2層アーチの水道橋が残る。11世紀建設のアルカサル（王宮）はディズニー映画「白雪姫」の城のモデルとされる。", "cat": "culture", "star": false}, {"id": 7, "name": "イルリサット・アイスフィヨルド", "region": "ヨーロッパ", "meta": "デンマーク・自然遺産・2004年", "page": "P401", "primary": "セルメク・クジャレク氷河・温暖化で融解加速", "kw": "グリーンランド西部／最終氷期に形成されたセルメク・クジャレク氷河／世界で最も速く活動的な氷河のひとつ／気候と海水の温暖化で融解が加速", "note": "グリーンランド西部の氷河とフィヨルド。セルメク・クジャレク氷河は世界で最も速く活動的な氷河のひとつ。近年、気候と海水の温暖化により融解が加速している。", "cat": "park", "star": false}, {"id": 8, "name": "ファテープル・シークリー", "region": "アジア", "meta": "インド・文化遺産・1986年", "page": "P284", "primary": "アクバルが築いた「勝利の都」・ブランド・ダルワーザ", "kw": "ムガル帝国3代皇帝アクバルが築いた都市／名は「勝利の都」を意味／水不足と暑さで14年で遷都／街のシンボル、ブランド・ダルワーザ（偉大な門）", "note": "ムガル帝国3代皇帝アクバルが築いた「勝利の都」。水不足と暑さでわずか14年で遷都された。イスラムとインドの様式が融合し、街のシンボル、ブランド・ダルワーザが立つ。", "cat": "culture", "star": false}, {"id": 9, "name": "隊商都市ペトラ", "region": "中東", "meta": "ヨルダン・文化遺産・1985年", "page": "P268", "primary": "ナバテア王国の首都・エル・ハズネ", "kw": "ナバテア人が建設した隊商都市／ナバテア王国の首都／バラ色の都市／映画「インディ・ジョーンズ／最後の聖戦」のエル・ハズネ", "note": "ナバテア人が建設した隊商都市でナバテア王国の首都。砂漠の交易路を支配し繁栄。映画「インディ・ジョーンズ／最後の聖戦」に登場するエル・ハズネが有名。", "cat": "culture", "star": false}, {"id": 10, "name": "チャンキーヨの天文考古学遺産群", "region": "南米", "meta": "ペルー・文化遺産・2021年", "page": "P343", "primary": "13基の塔・太陽を観測する暦", "kw": "紀元前250〜前200年頃の先史時代の遺跡／丘に並ぶ13基の塔／日の出と日没の位置を観測／太陽を観測して1年の日付を示す暦", "note": "カスマ渓谷の先史時代の天文考古学遺産。丘に並ぶ13基の塔で日の出と日没の位置を観測でき、太陽を観測して1年の日付を示す暦として機能した。", "cat": "culture", "star": false}, {"id": 11, "name": "コロとその港", "region": "南米", "meta": "ベネズエラ・文化遺産・1993年", "page": "P225", "primary": "太陽の家・大雨で危機遺産", "kw": "スペインの植民都市／ムデハル様式やオランダのバロック様式が融合した土造りの建造物／玄関に太陽の紋章が付いた「太陽の家」／2004年の大雨で危機遺産", "note": "スペインが築いた植民都市。複数の様式が融合した土造りの建造物が残り、太陽の紋章が付いた「太陽の家」が有名。2004年の大雨被害で危機遺産リストに記載された。", "cat": "culture", "star": false}, {"id": 12, "name": "カスビのブガンダ王国の王墓", "region": "アフリカ", "meta": "ウガンダ・文化遺産・2001年", "page": "P418", "primary": "ガンダ族・2023年に危機遺産を脱した", "kw": "農耕民族ガンダ族のブガンダ王国／王（カバカ）の墓所／木材・萱・漆喰・土壁づくり／2010年の火災で焼失し危機遺産→2023年に脱した", "note": "農耕民族ガンダ族のブガンダ王国の王墓。歴代の王（カバカ）が葬られた。2010年の火災で焼失し危機遺産となったが、修復・再建され2023年に危機遺産から外れた。", "cat": "culture", "star": false}, {"id": 13, "name": "ハ・ロン湾とカット・バ諸島", "region": "アジア", "meta": "ベトナム・自然遺産・1994年", "page": "P393", "primary": "石灰岩の島々・石炭採掘による水質悪化", "kw": "大小1,100以上の島々／海面上昇で沈み残った石灰岩が風化／鍾乳石やサンゴ礁／石炭採掘による水質悪化でサンゴが激減", "note": "大小1,100以上の石灰岩の島々が点在するベトナム唯一の自然遺産。近年は石炭採掘による水質悪化でサンゴが激減し、観光や農地拡大による環境問題も進む。", "cat": "park", "star": false}, {"id": 14, "name": "ブルー・マウンテンズ地域", "region": "オセアニア", "meta": "オーストラリア・自然遺産・2000年", "page": "P400", "primary": "ユーカリの森・山火事", "kw": "砂岩の峰々が連なる山岳地帯／全世界の約13%にあたる90種以上のユーカリ／地球温暖化で山火事が頻発／2019〜2020年の山火事で大被害", "note": "砂岩の峰々が連なる山岳地帯。全世界の約13%にあたる90種以上のユーカリが生育する。近年は地球温暖化の影響で山火事が頻発し、2019〜2020年の山火事で大きな被害を受けた。", "cat": "park", "star": false}, {"id": 15, "name": "ダマスカスの旧市街", "region": "中東", "meta": "シリア・文化遺産・1979年", "page": "P282", "primary": "ウマイヤ朝の首都・ウマイヤ・モスク", "kw": "世界最古級の継続居住都市／旧約・新約聖書にも登場／初のイスラム王朝ウマイヤ朝の首都／現存最古級の大モスク、ウマイヤ・モスク", "note": "世界で最も古くから継続的に居住されてきた都市のひとつ。初のイスラム王朝ウマイヤ朝の首都として繁栄し、現存最古級の大モスクであるウマイヤ・モスクが残る。", "cat": "culture", "star": false}, {"id": 16, "name": "バルセロナのカタルーニャ音楽堂とサン・パウ病院", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1997年", "page": "P260", "primary": "ルイス・ドメネク・イ・モンタネルの建築", "kw": "ガウディと同時代の建築家ルイス・ドメネク・イ・モンタネルが設計／鉄骨建築のカタルーニャ音楽堂／ステンドグラスやモザイクタイル／患者に安らぎを与えるサン・パウ病院", "note": "ガウディと同時代の建築家ルイス・ドメネク・イ・モンタネルの建築群。鉄骨建築のカタルーニャ音楽堂と、庭園や明るいタイルで患者に安らぎを与えるサン・パウ病院。", "cat": "culture", "star": false}, {"id": 17, "name": "ムンバイにあるヴィクトリア朝ゴシックとアール・デコの建造物群", "region": "アジア", "meta": "インド・文化遺産・2018年", "page": "P216", "primary": "ヴィクトリア朝ゴシックとアール・デコ", "kw": "英国統治下の2度の都市開発／インドの気候に合わせたゴシック・リバイバル様式／壮観なヴィクトリア朝ゴシック建築群／20世紀初頭のアール・デコ様式", "note": "英国統治下の2度の都市開発でムンバイは大都市へ変貌した。インドの気候に合わせたゴシック・リバイバル様式の建築群と、20世紀初頭のアール・デコ様式が並ぶ。", "cat": "culture", "star": false}, {"id": 18, "name": "王立展示館とカールトン庭園", "region": "オセアニア", "meta": "オーストラリア・文化遺産・2004年", "page": "P217", "primary": "万国博覧会の展示会場", "kw": "1880年と1888年にメルボルンで開催された万国博覧会の展示会場／ビザンツ・ロマネスク・ルネサンスなど様式を融合／当時の万博会場の典型例／登録基準(ii)のみ", "note": "大英帝国下のメルボルンで開催された万国博覧会の展示会場。複数の様式を融合した構成が特徴で、万国博覧会の歴史を伝える貴重な建造物としてカールトン庭園と共に登録。", "cat": "culture", "star": false}, {"id": 19, "name": "デリーのフマユーン廟", "region": "アジア", "meta": "インド・文化遺産・1993年", "page": "P284", "primary": "ペルシアとインドの建築様式の融合", "kw": "ムガル帝国2代皇帝フマユーンの墓廟／インド初の本格的なイスラム廟建築／ペルシア式の巨大ドームと四分庭園／赤砂岩に白大理石の象嵌技法", "note": "ムガル帝国2代皇帝フマユーンの墓廟で、インド初の本格的なイスラム廟建築。ペルシア式の巨大ドームや四分庭園に、インドの象嵌技法などが融合している。", "cat": "culture", "star": false}, {"id": 20, "name": "バースの市街", "region": "ヨーロッパ", "meta": "イギリス・文化遺産・1987年", "page": "P210", "primary": "ローマ式大浴場・スリス・ミネルヴァ神殿", "kw": "1世紀にローマ帝国が天然温泉を用いた大浴場や神殿を建設／スリス・ミネルヴァ神殿／アルプス以北の貴重なローマ遺跡／ジョージアン時代に温泉保養地として再開発", "note": "1世紀にローマ帝国が天然温泉を用いた大浴場や神殿を築いた街。スリス・ミネルヴァ神殿や大浴場が残る。18世紀には温泉保養地として大規模に再開発された。", "cat": "culture", "star": false}]}, {"id": "p6", "title": "⑥ 6/22 イタリアノート", "cards": [{"id": 1, "name": "サン・ジョルジオ山", "region": "ヨーロッパ", "meta": "イタリア／スイス・自然遺産・2003年", "page": "P184", "primary": "三畳紀の化石・タニストロフェウス", "kw": "2億4,500万〜2億3,000万年前の三畳紀の化石が多数出土／かつてサンゴ礁の海／首の長い爬虫類タニストロフェウス／パキプレウロサウルス", "note": "イタリア・スイス国境の山。三畳紀の生物化石が多数出土し、首の長い爬虫類タニストロフェウスなどが見つかっている。かつてはサンゴ礁の海だった。", "cat": "park", "star": false}, {"id": 2, "name": "先史時代のサルディーニャ島の葬送の伝統:ドムス・デ・ヤナス", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2025年", "page": "P232", "primary": "妖精の家ドムス・デ・ヤナス・ヌラーゲ文明", "kw": "中期新石器時代（紀元前5千年紀）〜前期青銅器時代の地下墓地群／ヌラーゲ文明の到来とともに姿を消した／「妖精の家」ドムス・デ・ヤナス／アンゲル・ルジュ遺跡", "note": "サルディーニャ島の先史時代の地下墓地群。紀元前5千年紀から造営され、ヌラーゲ文明の到来とともに姿を消した。岩盤を掘った地下墓は「妖精の家」と呼ばれる。", "cat": "culture", "star": false}, {"id": 3, "name": "ヴェローナの市街", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2000年", "page": "P248", "primary": "スカリジェレ家・ロミオとジュリエット", "kw": "紀元前1世紀にローマの植民都市として発展／13〜14世紀にスカリジェレ家（スカラ家）が統治／シニョーレ広場／戯曲「ロミオとジュリエット」の舞台", "note": "ローマの植民都市として発展した都市。スカリジェレ家（スカラ家）のもとで繁栄した。「ロミオとジュリエット」の舞台として知られる。", "cat": "culture", "star": false}, {"id": 4, "name": "ミラノのサンタ・マリア・デッレ・グラーツィエ修道院とレオナルド・ダ・ヴィンチの「最後の晩餐」", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1980年", "page": "P262", "primary": "ドミニコ会・ダ・ヴィンチの「最後の晩餐」", "kw": "15世紀半ばのドミニコ会修道院／大食堂の壁にレオナルド・ダ・ヴィンチの「最後の晩餐」／テンペラと油彩を合わせた手法／1999年に修復完了", "note": "15世紀半ばのドミニコ会修道院。大食堂の壁にレオナルド・ダ・ヴィンチの壁画「最後の晩餐」がある。損傷が進んだが科学的修復が1999年に完了した。", "cat": "culture", "star": false}, {"id": 5, "name": "カゼルタの18世紀の王宮と庭園、ヴァンヴィテッリの水道橋、サン・レウチョの関連遺産", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1997年", "page": "P265", "primary": "カルロス3世・映画「スター・ウォーズ」", "kw": "スペイン・ブルボン朝のカルロス3世が建設／ヴェルサイユ宮殿に対抗／1,200の部屋と34の階段／映画「スター・ウォーズ」に登場", "note": "カルロス3世がヴェルサイユ宮殿に対抗して築いた王宮。1,200の部屋からなり、噴水と水路のフランス式庭園をもつ。映画「スター・ウォーズ」にも登場する。", "cat": "culture", "star": false}, {"id": 6, "name": "マテーラの洞窟住居サッシと岩窟教会公園", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1993年", "page": "P268", "primary": "洞窟住居サッシ・映画「007」", "kw": "石灰質の岩壁を利用した洞窟住居群「サッシ」／岩窟教会群／旧石器時代からの人の生活／映画「007 ノー・タイム・トゥ・ダイ」の撮影地", "note": "グラヴィーナ渓谷の岩壁を利用した洞窟住居群「サッシ」と岩窟教会群。旧石器時代からの暮らしを伝える。映画「007」の撮影地としても知られる。", "cat": "culture", "star": false}, {"id": 7, "name": "ピエモンテのブドウ園の景観：ランゲ・ロエロとモンフェッラート", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2014年", "page": "P274", "primary": "2,000年以上のワイン生産・紀元前5世紀のブドウ花粉", "kw": "2,000年以上続くワイン生産の文化的景観／紀元前5世紀のブドウ花粉が発見／古代ローマのプリニウスが記録／エトルリア人とケルト人の交易地", "note": "2,000年以上続くワイン生産の歴史を示す文化的景観。紀元前5世紀のブドウ花粉が発見され、古代ローマのプリニウスもこの地のワインを記録した。", "cat": "culture", "star": false}, {"id": 8, "name": "コネリアーノとヴァルドッビアーデネのプロセッコ栽培丘陵地", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2019年", "page": "P275", "primary": "プロセッコワイン・チリオーニ", "kw": "プロセッコワインの生産地／「ホグバック」の丘陵地／狭い短冊状の区画「チリオーニ」／市松模様（チェス盤）の独特な景観", "note": "プロセッコワインの生産地域の文化的景観。「チリオーニ」と呼ばれる狭い短冊状の区画にブドウが植えられ、市松模様の独特な景観を呈する。", "cat": "culture", "star": false}, {"id": 9, "name": "エオーリエ諸島", "region": "ヨーロッパ", "meta": "イタリア・自然遺産・2000年", "page": "P313", "primary": "ストロンボリ島・火山研究に貢献", "kw": "シチリア島北岸沖の7つの主要な島／「火山」の名のヴルカーノ島／「地中海の灯台」ストロンボリ島／火山研究に貢献／風の神アイオロスの神話に由来", "note": "シチリア島北岸沖の火山島群。ストロンボリ島など7つの主要な島からなり火山研究に貢献。名は風の神アイオロス（エオーロ）の神話に由来する。", "cat": "park", "star": false}, {"id": 10, "name": "アマルフィ海岸", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1997年", "page": "P313", "primary": "アマルフィ大聖堂・聖アンドレア", "kw": "ソレント半島の断崖に立つ集落／ギリシャ神話で世界一美しい場所とされた／中世の雰囲気を残す街並／漁師の守護聖人、聖アンドレアを祀るアマルフィ大聖堂", "note": "ソレント半島の断崖に家々が張りつく集落が点在する文化的景観。中世の街並が残り、アマルフィ大聖堂には漁師の守護聖人、聖アンドレアが祀られている。", "cat": "culture", "star": false}, {"id": 11, "name": "パドヴァの植物園（オルト・ボタニコ）", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1997年", "page": "P333", "primary": "世界最古の植物園・アンドレア・モロニ", "kw": "1545年設立の世界最古の植物園／パドヴァ大学の付属施設／建築家アンドレア・モロニが設計／イタリアで初めてジャガイモやヒマワリを栽培", "note": "パドヴァ大学付属として1545年に設立された世界最古の植物園。建築家アンドレア・モロニが設計。イタリアで初めてジャガイモやヒマワリが栽培された。", "cat": "culture", "star": false}, {"id": 12, "name": "アペニン山脈北部の蒸発岩カルストと洞窟群", "region": "ヨーロッパ", "meta": "イタリア・自然遺産・2023年", "page": "P369", "primary": "蒸発岩カルスト・窓ガラス代わりの石膏結晶", "kw": "900以上の洞窟からなるシリアル・サイト／石膏や硬石膏の蒸発岩が溶解して形成／洞窟学や鉱物学の発展に寄与／古代ローマでは透明な石膏結晶を窓ガラス代わりに利用", "note": "石膏などの蒸発岩が溶解して形成された900以上の洞窟群。洞窟学・鉱物学の発展に寄与し、古代ローマでは採取した透明な石膏結晶が窓ガラスの代わりに使われた。", "cat": "park", "star": false}, {"id": 13, "name": "ポンペイ、エルコラーノ、トッレ・アヌンツィアータの考古地区", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1997年", "page": "P370", "primary": "ヴェスヴィオ山の噴火で埋没した古代ローマ都市", "kw": "西暦79年のヴェスヴィオ山の噴火で火山灰に埋没／古代ローマ都市のタイムカプセル／1748年から発掘／オプロンティスのヴィッラ", "note": "西暦79年のヴェスヴィオ山の噴火で火山灰に埋没した古代ローマ都市群。1748年から発掘が始まり、広場・神殿・浴場などの遺構が現れた。現在も発掘が続く。", "cat": "culture", "star": false}, {"id": 14, "name": "エトナ山", "region": "ヨーロッパ", "meta": "イタリア・自然遺産・2013年", "page": "P371", "primary": "世界で最も活発な成層火山・2,700年前からの噴火記録", "kw": "シチリア島東海岸／地中海周辺の島で最も高い火山／世界で最も活発に活動している成層火山のひとつ／少なくとも2,700年前から噴火が記録／登録基準(viii)のみ", "note": "シチリア島東海岸の活火山。世界で最も活発に活動している成層火山のひとつで、少なくとも2,700年前から噴火が記録され、火山学などに影響を与え続けてきた。", "cat": "park", "star": false}, {"id": 15, "name": "ヴェネツィアとその潟", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1987年", "page": "P409", "primary": "潟に築かれた水の都・観光課題", "kw": "潟（ラグーナ）に築かれた都市／118の島々を176の運河と400以上の橋が結ぶ／東方貿易で繁栄／ハイシーズンに日帰り客から入場料・大型クルーズ船の入港制限", "note": "潟（ラグーナ）に築かれた水の都。東方貿易で繁栄した。オーバーツーリズムが課題で、ハイシーズンの日帰り客への入場料徴収や大型クルーズ船の入港制限を行う。", "cat": "culture", "star": false}, {"id": 16, "name": "フィレンツェの歴史地区", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・1982年", "page": "P409", "primary": "サンタ・マリア・デル・フィオーレ大聖堂・民泊新規開業禁止", "kw": "ルネサンスの中心となった商業都市／コジモ・デ・メディチの援助で建設されたサンタ・マリア・デル・フィオーレ大聖堂／観光課題／2025年から歴史地区で民泊の新規開業を禁止", "note": "ルネサンスの中心となった商業都市。コジモ・デ・メディチの援助で大聖堂が建設された。民泊が増えすぎ、2025年から歴史地区での民泊の新規開業が禁止された。", "cat": "culture", "star": false}, {"id": 17, "name": "アッシジのサン・フランチェスコ聖堂と関連建造物群", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2000年", "page": "P425", "primary": "ゴシック様式の代表作・聖フランチェスコ", "kw": "ゴシック様式建築の代表作／聖フランチェスコゆかりの地／上下2つの教会が連なる／チマブーエやジョットの壁画／1997年の地震で大きな被害", "note": "聖フランチェスコゆかりのゴシック様式の代表作。山の斜面に上下2つの教会が連なり、チマブーエやジョットの壁画で飾られる。1997年の地震で大きな被害を受けた。", "cat": "culture", "star": false}, {"id": 18, "name": "ヴァル・ディ・ノートの後期バロック様式の都市景観群（シチリア島南東部）", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2002年", "page": "P426", "primary": "1693年の大地震後に再建された後期バロックの街並", "kw": "シチリア島南東部のヴァル・ディ・ノート地域の8都市／1693年の大地震後に数十年かけて統一的に再建／後期バロック様式で統一／計画的な大規模都市建築の代表例", "note": "シチリア島南東部の8都市。1693年の大地震後、数十年かけて後期バロック様式で統一的に再建された。近代の計画的な大規模都市建築の代表例。", "cat": "culture", "star": false}, {"id": 19, "name": "ヴァティカン市国", "region": "ヨーロッパ", "meta": "ヴァティカン・文化遺産・1984年", "page": "P262", "primary": "システィーナ礼拝堂・ミケランジェロ「最後の審判」", "kw": "世界最小の独立国／国全体が世界遺産の唯一の場所／世界最大級のサン・ピエトロ大聖堂／ミケランジェロ「最後の審判」のシスティーナ礼拝堂", "note": "ローマ教皇を元首とする世界最小の独立国で、国全体が世界遺産。世界最大級のサン・ピエトロ大聖堂や、ミケランジェロ「最後の審判」のシスティーナ礼拝堂がある。", "cat": "culture", "star": false}]}, {"id": "p7", "title": "⑦ 6/23 ドイツノート", "cards": [{"id": 1, "name": "ワッデン海", "region": "ヨーロッパ", "meta": "オランダ／デンマーク／ドイツ・自然遺産・2009年", "page": "P159", "primary": "砂洲・干潟・アザラシ", "kw": "北海沿岸フリースラント地方／潮の干満が生む砂洲・干潟・塩性湿地／渡り鳥の重要拠点（ラムサール条約）／アザラシやイルカ", "note": "北海沿岸の湿地帯。潮の干満が砂洲・干潟・塩性湿地など多様な環境を生み、渡り鳥やアザラシなど多くの動植物の重要な生息地となっている。", "cat": "park", "star": false}, {"id": 2, "name": "メッセルの化石採掘地区", "region": "ヨーロッパ", "meta": "ドイツ・自然遺産・1995年", "page": "P185", "primary": "オイルシェール層・始新世の化石", "kw": "厚さ190mのオイルシェール層／約5,600万〜3,600万年前の始新世の化石／ワニの化石／1960年代後半に採掘中止し保存", "note": "ヘッセン州の化石採掘地区。厚いオイルシェール層から始新世の生物化石が出土する。採掘中止により保存されることになった。", "cat": "park", "star": false}, {"id": 3, "name": "アーヘンの大聖堂", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1978年", "page": "P201", "primary": "カールの戴冠・カロリング・ルネサンス", "kw": "カール大帝の宮廷礼拝堂が起源／カロリング・ルネサンスの象徴／約30人のドイツ王の戴冠／八角形の中心部を十六角形の周歩廊が囲む構造", "note": "カール大帝の宮廷礼拝堂を起源とするカロリング・ルネサンスの象徴。16世紀まで約30人のドイツ王の戴冠が行われた。", "cat": "culture", "star": false}, {"id": 4, "name": "アイスレーベンとヴィッテンベルクのルター記念建造物群", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1996年", "page": "P203", "primary": "マルティン・ルター・贖宥状", "kw": "宗教改革の中心人物マルティン・ルターゆかり／正式に「ルターの街」／1517年に贖宥状を販売するカトリック教会を批判／宗教改革の発端", "note": "宗教改革の中心人物マルティン・ルターゆかりの建造物群。1517年の贖宥状批判が宗教改革のきっかけとなった。", "cat": "culture", "star": false}, {"id": 5, "name": "ポツダムとベルリンの宮殿と庭園", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1990年", "page": "P206", "primary": "サンスーシ宮殿・ポツダム会談", "kw": "歴代プロイセン王が造営／フリードリヒ2世のサンスーシ宮殿／150以上の宮殿建築／ポツダム会談の舞台ツェツィーリエンホーフ宮殿", "note": "歴代プロイセン王が造営した宮殿・庭園群。代表はフリードリヒ2世のサンスーシ宮殿。ツェツィーリエンホーフ宮殿はポツダム会談の舞台。", "cat": "culture", "star": false}, {"id": 6, "name": "ヴァイマール古典主義文化", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1998年", "page": "P252", "primary": "ゲーテ・ヴァイマール古典主義", "kw": "18〜19世紀半ばの文芸「ヴァイマール古典主義」／文豪ヨハン・ヴォルフガング・フォン・ゲーテ／詩人シラー／古典主義芸術の中心地", "note": "ゲーテやシラーら文化人が集い「ヴァイマール古典主義」と呼ばれる文芸を生んだ芸術と文化の街。", "cat": "culture", "star": false}, {"id": 7, "name": "マウルブロン修道院関連建造物群", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1993年", "page": "P255", "primary": "ドイツ初期のシトー会修道院・ラテン十字形プラン", "kw": "12〜16世紀のドイツ初期のシトー会修道院／ラテン十字形プラン／名門神学校（ヘルマン・ヘッセが学ぶ）／当初は装飾のない建物", "note": "ドイツ初期のシトー会修道院。宗教改革後に名門神学校となり、作家ヘルマン・ヘッセらが学んだ。", "cat": "culture", "star": false}, {"id": 8, "name": "ヴァルトブルク城", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1999年", "page": "P258", "primary": "ルターの新約聖書独訳・オペラ「タンホイザー」", "kw": "11世紀半ば創建の後期ロマネスク様式の城／ルターがドイツ語訳「新約聖書」を完成／ワーグナーのオペラ「タンホイザー」の舞台", "note": "ルターが保護されドイツ語訳「新約聖書」を完成させた城。ワーグナーのオペラ「タンホイザー」の舞台でもある。", "cat": "culture", "star": false}, {"id": 9, "name": "バイロイトの辺境伯オペラハウス", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2012年", "page": "P260", "primary": "ジュゼッペ・ガッリ・ビビエーナ・バロックのオペラハウス", "kw": "ヴィルヘルミーネがつくらせた／建設当時のまま現存するバロック様式のオペラハウスとして欧州唯一／劇場建築家ジュゼッペ・ガッリ・ビビエーナが設計", "note": "18世紀半ばの建設当時のまま現存するバロック様式のオペラハウスとして欧州唯一。ビビエーナが設計した。", "cat": "culture", "star": false}, {"id": 10, "name": "ヴュルツブルクの司教館と庭園群", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1981年", "page": "P263", "primary": "シェーンボルン家・バロックの司教館", "kw": "地方領主シェーンボルン家が建設／バロック様式の粋／建築家バルタザール・ノイマン／画家ティエポロのフレスコ画", "note": "シェーンボルン家が築いたバロック様式の壮麗な司教館。ノイマンが指揮し、ティエポロのフレスコ画で飾られる。", "cat": "culture", "star": false}, {"id": 11, "name": "バウハウス関連遺産群：ヴァイマールとデッサウ、ベルナウ", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1996年", "page": "P263", "primary": "ヴァルター・グロピウス・パウル・クレー", "kw": "1919年にヴァルター・グロピウスが開設した総合造形学校バウハウス／建築教育を目指した／教授陣に画家パウル・クレーやカンディンスキー", "note": "グロピウスが1919年に開設した総合造形学校バウハウスの校舎など。教授陣に画家パウル・クレーらが名を連ねた。", "cat": "culture", "star": false}, {"id": 12, "name": "バイエルン王ルートヴィヒ2世の宮殿群：ノイシュヴァンシュタイン城、リンダーホーフ城、シャッヘン城、ヘレンキームゼー城", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2025年", "page": "P264", "primary": "ルートヴィヒ2世・ノイシュヴァンシュタイン城", "kw": "バイエルン王ルートヴィヒ2世が築いた4棟の城館／ノイシュヴァンシュタイン城はシンデレラ城のモチーフ／王の私邸／実用性より芸術性を重視・歴史主義様式", "note": "バイエルン王ルートヴィヒ2世が中世への憧れから築いた4棟の城。ノイシュヴァンシュタイン城はシンデレラ城のモチーフ。実用性より芸術性を重視した。", "cat": "culture", "star": false}, {"id": 13, "name": "ダルムシュタットのマチルデンフーエ（マチルダの丘）", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2021年", "page": "P294", "primary": "ヘッセン大公エルンスト・ルートヴィヒ・芸術家コロニー", "kw": "ヘッセン大公エルンスト・ルートヴィヒが1897年に創設した芸術家村／初期モダニズム建築／ヨーゼフ・マリア・オルブリッヒ／聖マリア・マグダレーナ礼拝堂（ロシア正教会）", "note": "ヘッセン大公エルンスト・ルートヴィヒが創設した芸術家コロニー。初期モダニズム建築の実験的な住居や制作環境が築かれた。", "cat": "culture", "star": false}, {"id": 14, "name": "アールフェルトのファーグス靴型工場", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2011年", "page": "P296", "primary": "ヴァルター・グロピウス・モダニズム建築", "kw": "ヴァルター・グロピウスが1910年に設計／巨大なガラスパネルの建築美と工場の機能美／バウハウスのモダニズム建築の草分け", "note": "グロピウスが設計したモダニズム建築。ガラスパネルの建築美と機能美を兼ね、バウハウス建築の草分けとされる。", "cat": "culture", "star": false}, {"id": 15, "name": "シュパイヒャーシュタットと、チリハウスのあるコントールハウス地区", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2015年", "page": "P296", "primary": "港湾都市ハンブルク・歴史主義様式の赤レンガ倉庫", "kw": "港湾都市ハンブルクの倉庫街／歴史主義様式の赤レンガ倉庫／運河と橋の水路網／隣接するコントールハウス地区（チリハウス）", "note": "ハンブルクの赤レンガ倉庫街シュパイヒャーシュタットと、大規模オフィス建築のコントールハウス地区。国際貿易拡大の影響を伝える。", "cat": "culture", "star": false}, {"id": 16, "name": "ライン渓谷中流上部", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2002年", "page": "P315", "primary": "ローレライ伝説・古城とブドウ畑", "kw": "ビンゲンからオーバーヴェセルへ続く約65km／川沿いの古城とブドウ畑／40以上の城や城塞／岩山ローレライの伝説", "note": "ライン川沿いに古城やブドウ畑が広がる文化的景観。航行の難所だった岩山ローレライの伝説で知られる。", "cat": "culture", "star": false}, {"id": 17, "name": "モラヴィア教会入植地", "region": "ヨーロッパ", "meta": "ドイツ／アメリカ／英国ほか・文化遺産・2015年", "page": "P326", "primary": "モラヴィア教会・「理想都市」", "kw": "フス派の一派モラヴィア教会（兄弟団）／プロテスタントの「理想都市」概念／教会広場を中心とした統一的な都市設計・バロック様式／2024年にアメリカ・英国・ドイツが追加登録", "note": "モラヴィア教会が「理想都市」概念に基づき築いた入植地。2024年にアメリカ・英国・ドイツの街が追加登録された。", "cat": "culture", "star": false}, {"id": 18, "name": "ヒルデスハイムの聖マリア大聖堂と聖ミヒャエル聖堂", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1985年", "page": "P327", "primary": "ベルンヴァルト・初期ロマネスク", "kw": "11世紀頃の初期ロマネスク様式の代表／司教ベルンヴァルトが学術文化の街として発展させた／聖ミヒャエル聖堂／聖マリア大聖堂", "note": "11世紀頃の初期ロマネスク様式を代表する2つの聖堂。司教ベルンヴァルトが私財を投じて建築・改築した。", "cat": "culture", "star": false}, {"id": 19, "name": "シュパイア、ヴォルムス、マインツのユダヤ人共同体（シュム）関連遺産群", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2021年", "page": "P327", "primary": "アシュケナジム・シュム（ShUM）", "kw": "シュパイア・ヴォルムス・マインツの3都市のアシュケナジムのコミュニティ／中世ユダヤ法の形成に影響／3都市の頭文字でShUM（シュム）／シナゴーグやユダヤ人墓地", "note": "中世アシュケナジムのコミュニティがあった3都市の遺産群。頭文字からShUM（シュム）と呼ばれ、シナゴーグや墓地が登録された。", "cat": "culture", "star": false}]}, {"id": "p8", "title": "⑧ 6/24 スペイン・アメリカ", "cards": [{"id": 1, "name": "アタプエルカの考古遺跡群", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2000年", "page": "P186", "primary": "ホモ・アンテセッサー・ヨーロッパ最古の人類", "kw": "原人の化石が多数出土／80万年前のヨーロッパ最古の人類ホモ・アンテセッサー／シマ・デ・ロス・ウエソス地区／ハイデルベルク原人", "note": "アタプエルカ山脈の考古遺跡群。80万年前のヨーロッパ最古の人類ホモ・アンテセッサーの化石が出土した。", "cat": "culture", "star": false}, {"id": 2, "name": "アンテケラの支石墓遺跡", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2016年", "page": "P190", "primary": "エル・ロメラルのトロス・恋人たちの岩", "kw": "3つの巨石遺跡（メンガとビエラの支石墓・エル・ロメラルのトロス）／恋人たちの岩ラ・ペーニャ・デ・ロス・エナモラドス／トルカル山／新石器〜青銅器時代", "note": "アンダルシア地方の巨石遺跡。メンガとビエラの支石墓、エル・ロメラルのトロスと、自然要素（恋人たちの岩・トルカル山）からなる。", "cat": "culture", "star": false}, {"id": 3, "name": "歴史都市トレド", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1986年", "page": "P202", "primary": "クリスト・デ・ラ・ルス・3宗教の共存", "kw": "711年からイスラム統治／レコンキスタでカスティーリャ王国の王都／クリスト・デ・ラ・ルス／イスラム・キリスト・ユダヤの3宗教が共存", "note": "イスラム統治後、レコンキスタでカスティーリャ王国の王都となった街。イスラム・キリスト・ユダヤの3宗教の要素が共存する街並が特徴。", "cat": "culture", "star": false}, {"id": 4, "name": "セビーリャの大聖堂、アルカサル、インディアス古文書館", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1987年", "page": "P220", "primary": "コロンブスの墓・ヒラルダの塔・ムデハル様式", "kw": "イスラム文化とカトリック文化の融合／大航海時代のスペインの栄光／クリストファー・コロンブスの墓がある大聖堂／ヒラルダの塔／ムデハル様式", "note": "イスラムとカトリック文化の融合、大航海時代の栄光を体現する建造物群。大聖堂にはコロンブスの墓があり、ヒラルダの塔やムデハル様式が残る。", "cat": "culture", "star": false}, {"id": 5, "name": "アランフエスの文化的景観", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2001年", "page": "P259", "primary": "王家の離宮と庭園・ホアキン・ロドリーゴ", "kw": "王家の夏の離宮と無数の庭園／ヴェルサイユ宮殿を模した／ブルボン家／作曲家ホアキン・ロドリーゴの「アランフエス協奏曲」", "note": "カスティーリャ王やスペイン王が築いた夏の離宮と庭園の文化的景観。作曲家ホアキン・ロドリーゴが「アランフエス協奏曲」を作曲した地。", "cat": "culture", "star": false}, {"id": 6, "name": "コルドバの歴史地区", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1984年", "page": "P281", "primary": "大モスク（メスキータ）・フェルナンド3世", "kw": "イスラム・ユダヤ・キリスト教文化が融合／西ゴート王国の支配を経てイスラム化／大モスク（メスキータ）／フェルナンド3世がレコンキスタで奪還", "note": "イスラム・ユダヤ・キリスト教の文化が融合する商業都市。大モスク（メスキータ）が象徴で、レコンキスタ前後の建築が共存する。", "cat": "culture", "star": false}, {"id": 7, "name": "グラナダのアルハンブラ宮殿、ヘネラリーフェ離宮、アルバイシン地区", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1984年", "page": "P284", "primary": "アルハンブラ宮殿・グラナダ王国・イスラム建築の最高傑作", "kw": "グラナダ王国が築いたアルハンブラ宮殿／イスラム建築の最高傑作／王族の避暑地ヘネラリーフェ離宮／アルバイシン地区", "note": "イスラム勢力のイベリア半島支配期の遺構。グラナダ王国が築いたアルハンブラ宮殿はイスラム建築の最高傑作と称される。", "cat": "culture", "star": false}, {"id": 8, "name": "プラド通りとブエン・レティーロ：芸術と科学の景観", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2021年", "page": "P334", "primary": "知識の民主化という啓蒙思想・マドリードの噴水", "kw": "マドリードの大きな噴水（アポロ・ネプチューン・シベレス）／芸術と科学に特化した建物／知識の民主化という啓蒙思想／ブエン・レティーロの庭", "note": "マドリードの噴水と、芸術・科学に特化した建物が並ぶ文化的景観。知識の民主化という啓蒙思想に結びついている。", "cat": "culture", "star": false}, {"id": 9, "name": "アルカラ・デ・エナレスの大学と歴史地区", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1998年", "page": "P334", "primary": "シスネロス枢機卿・世界初の計画的大学都市", "kw": "大学都市として計画的に開発された世界初の事例／シスネロス枢機卿が1508年に大学を開学／世界初の多言語対訳聖書／その後の大学都市のモデル", "note": "大学都市として計画的に開発された世界初の事例。シスネロス枢機卿が1508年に大学を開学し、多言語対訳聖書も刊行した。", "cat": "culture", "star": false}, {"id": 10, "name": "サラマンカの旧市街", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1988年", "page": "P335", "primary": "サラマンカ大学・プラテレスコ様式", "kw": "ヨーロッパ最古級の大学／1218年創設の現存スペイン最古のサラマンカ大学／世界四大大学のひとつ／学問院のファサードはプラテレスコ様式の傑作", "note": "スペイン最古のサラマンカ大学を擁する旧都。学問院のファサードはプラテレスコ様式の傑作として名高い。", "cat": "culture", "star": false}, {"id": 11, "name": "ガラホナイ国立公園", "region": "ヨーロッパ", "meta": "スペイン・自然遺産・1986年", "page": "P373", "primary": "ゲッケイジュ林・カナリア諸島ゴメラ島", "kw": "カナリア諸島ゴメラ島／海風の霧が太古の環境を保つ／500万〜170万年前と同じ種類のゲッケイジュ林が密生／コロンブスが最後の補給を行った地", "note": "カナリア諸島ゴメラ島の公園。霧が太古の環境を保ち、古い種類のゲッケイジュ林が密生する。コロンブスが最後の補給を行った地。", "cat": "park", "star": false}, {"id": 12, "name": "アントニ・ガウディの作品群", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1984年", "page": "P408", "primary": "サグラダ・ファミリア・カサ・ミラ", "kw": "天才建築家アントニ・ガウディの建築群／カサ・ミラ・グエル公園・グエル邸／2005年にサグラダ・ファミリア贖罪聖堂など4件追加登録／観光課題（EGA行動計画）", "note": "バルセロナに点在するガウディの建築群。1984年に3件、2005年にサグラダ・ファミリア贖罪聖堂など4件が追加登録された。", "cat": "culture", "star": false}, {"id": 13, "name": "独立記念館", "region": "北中米", "meta": "アメリカ・文化遺産・1979年", "page": "P204", "primary": "トマス・ジェファソン・独立宣言", "kw": "フィラデルフィアの赤レンガ造り／1776年にトマス・ジェファソン起草の独立宣言を採択／1787年に憲法制定会議／世界最古の近代的成文憲法", "note": "フィラデルフィアの建物。1776年にジェファソン起草の独立宣言が採択され、1787年にはアメリカ合衆国憲法が承認された。", "cat": "culture", "star": false}, {"id": 14, "name": "タオス・プエブロの伝統的集落", "region": "北中米", "meta": "アメリカ・文化遺産・1992年", "page": "P245", "primary": "タオス・プエブロ族・日干しレンガの集落", "kw": "ニューメキシコ州の先住民集落／14世紀から現在もタオス・プエブロ族が居住／アメリカ最古級の住居群／日干しレンガを積み泥で塗り固めた厚い壁", "note": "14世紀につくられ今もタオス・プエブロ族が住む先住民集落。日干しレンガの厚い壁が特徴で、アメリカ最古級の住居群とされる。", "cat": "culture", "star": false}, {"id": 15, "name": "シャーロットヴィルのモンティチェロとヴァージニア大学", "region": "北中米", "meta": "アメリカ・文化遺産・1987年", "page": "P335", "primary": "トマス・ジェファソン・図書館ロトンダ", "kw": "第3代大統領トマス・ジェファソンが自ら設計／新古典主義の私邸モンティチェロ／パンテオンを思わせる図書館ロトンダ／ヴァージニア大学", "note": "独立宣言起草者トマス・ジェファソンが自ら設計した私邸と大学。パンテオンを思わせる図書館「ロトンダ」が特徴。", "cat": "culture", "star": false}, {"id": 16, "name": "オリンピック国立公園", "region": "北中米", "meta": "アメリカ・自然遺産・1981年", "page": "P354", "primary": "温帯雨林地帯・オリンポス山", "kw": "生態系の多様性／オリンポス山の山岳地帯・温帯雨林地帯・海岸地帯の3領域／ブルー氷河など60の氷河／高さ90m超の針葉樹林", "note": "生態系の多様性で知られる公園。山岳地帯・温帯雨林地帯・海岸地帯の3領域に分かれ、氷河や高さ90m超の針葉樹林が見られる。", "cat": "park", "star": false}, {"id": 17, "name": "マンモス・ケーブ国立公園", "region": "北中米", "meta": "アメリカ・自然遺産・1981年", "page": "P365", "primary": "世界最大級の鍾乳洞", "kw": "ケンタッキー州のカルスト台地／世界最大級の鍾乳洞／総延長約560kmの地底世界／淡水動物や魚類など200種超の生物", "note": "カルスト台地の下に世界最大級の鍾乳洞をもつ公園。総延長約560kmの地底世界に巨大な鍾乳石や200種超の生物が存在する。", "cat": "park", "star": false}]}, {"id": "p9", "title": "⑨ 2025年 新規登録", "cards": [{"id": 1, "name": "ホッラマーバード渓谷の先史遺跡群", "region": "中東", "meta": "イラン・文化遺産・2025年", "page": "P144", "primary": "ネアンデルタール人〜現生人類・出アフリカ後の拡散", "kw": "ザグロス山脈／中期旧石器（ムスティエ文化）〜後期旧石器（バラドスティアン文化）／最古6万3,000年前", "note": "イラン西部ザグロス山脈の渓谷。ネアンデルタール人から現生人類までの居住痕跡が残り、出アフリカ後の人類拡散を示す。", "cat": "culture", "star": false}, {"id": 2, "name": "シュルガン・タシュ洞窟の岩絵群", "region": "ロシア", "meta": "ロシア・文化遺産・2025年", "page": "P145", "primary": "後期旧石器の岩絵（マンモス・バイソン）・カポヴァ洞窟", "kw": "ウラル山脈南部／カポヴァ洞窟／マンモス・バイソン・馬・ラクダ／カボヴァ台形", "note": "ウラル南部の洞窟に残る後期旧石器の岩絵群。マンモスやバイソン、擬人像や抽象記号が高密度に描かれる。", "cat": "culture", "star": false}, {"id": 3, "name": "ムンス・クリント", "region": "ヨーロッパ", "meta": "デンマーク・自然遺産・2025年", "page": "P150", "primary": "氷河が露出させた白亜の崖・チョーク層", "kw": "更新世に氷河でできた白亜の崖／白亜紀のチョーク層／ゴウザンゴマシジミ／化石が絶えず露出", "note": "デンマーク・ムン島の全長約6kmの白亜の崖。最終氷期に氷河が地層を変形させ、白亜紀のチョーク層が露出した。", "cat": "park", "star": false}, {"id": 4, "name": "カルナックとモルビアン沿岸の巨石群", "region": "ヨーロッパ", "meta": "フランス・文化遺産・2025年", "page": "P189", "primary": "メンヒル・積石墓が1万2千基以上", "kw": "新石器時代（前5000〜前2300年）／メンヒル／積石墓／1万2,000基以上の巨石記念物", "note": "ブルターニュに2000年以上かけて築かれた巨石群。メンヒルや積石墓が1万2千基超、地形と関連づけ意図的に配置。", "cat": "culture", "star": true}, {"id": 5, "name": "先史時代のサルディーニャ島の葬送:ドムス・デ・ヤナス", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2025年", "page": "P232", "primary": "岩を掘った地下墓ドムス・デ・ヤナス（妖精の家）", "kw": "ドムス・デ・ヤナス（妖精の家）／岩盤を掘った地下墓／約3,500基／ヌラーゲ文明の到来で消滅", "note": "サルディーニャ島の先史時代の地下墓群。「妖精の家」ドムス・デ・ヤナスは島内に約3,500基。青銅器時代に姿を消した。", "cat": "culture", "star": false}, {"id": 6, "name": "ミノア文明の宮殿群", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・2025年", "page": "P314", "primary": "クノッソス宮殿・ミノタウロスの迷宮・線文字A", "kw": "クレタ島／クノッソス宮殿／ミノタウロスの迷宮（ラビリンス）／象形文字・線文字A", "note": "クレタ島のミノア文明の宮殿6遺跡。最大のクノッソスは迷宮伝説で知られ、ヨーロッパ最古の文字（線文字A）の史料も出土。", "cat": "culture", "star": true}, {"id": 7, "name": "サルディスとビン・テベのリュディア墳丘墓", "region": "中東", "meta": "トルコ・文化遺産・2025年", "page": "P238", "primary": "リュディア人の首都・世界最古級の貨幣鋳造", "kw": "リュディア人の首都サルディス／初期の貨幣鋳造／ビン・テベの世界最大級の墳丘墓／鉄器時代（前8〜前6世紀）", "note": "リュディア王国の首都サルディスと墳丘墓群。富と初期の貨幣鋳造で知られる鉄器時代の中心地。", "cat": "culture", "star": false}, {"id": 8, "name": "西夏王陵群", "region": "東アジア", "meta": "中国・文化遺産・2025年", "page": "P239", "primary": "タングート族の西夏王朝・西夏文字", "kw": "西夏王朝（1038年〜、李元昊）／タングート族／西夏文字／1227年チンギス・ハンに滅ぼされる／9基の帝陵", "note": "黄河流域の西夏王朝の陵墓群。漢字を元に西夏文字を作るなど独自文化を築いたが、1227年モンゴル軍に滅ぼされた。", "cat": "culture", "star": false}, {"id": 9, "name": "金剛山", "region": "東アジア", "meta": "北朝鮮・複合遺産・2025年", "page": "P432", "primary": "山岳仏教の聖地・白い花こう岩の峰々", "kw": "山岳仏教の聖地（5世紀〜）／白に近い花こう岩の峰々／2008年の観光客射殺事件／北朝鮮初の複合遺産", "note": "北朝鮮南部の景勝地で山岳仏教の聖地。白い花こう岩の峰々で知られる複合遺産。2008年に韓国人観光客の射殺事件。", "cat": "mixed", "star": false}, {"id": 10, "name": "イエン・トゥー等の記念碑と景観の関連遺産群", "region": "東南アジア", "meta": "ベトナム・文化遺産・2025年", "page": "P330", "primary": "ベトナム独自のチュックラム（竹林）禅派発祥地", "kw": "陳朝の故地／竹林（チュックラム）禅派発祥／英雄・陳興道／キエップ・バック寺院／白藤江の戦い", "note": "ベトナム北東部の禅宗発祥の地。陳朝ゆかりで、大乗仏教と儒教・道教・土着信仰を融合した竹林禅派が生まれた。", "cat": "culture", "star": false}, {"id": 11, "name": "セランゴール森林公園マレーシア森林研究所", "region": "東南アジア", "meta": "マレーシア・文化遺産・2025年", "page": "P334", "primary": "錫鉱山跡を再生した人工熱帯雨林（FRIM）", "kw": "マレーシア森林研究所（FRIM）／1920年代設立／荒廃した錫鉱山跡地を熱帯林に再生／日本軍占領期は林業試験場", "note": "クアラルンプール近郊の人工熱帯雨林。荒廃した錫鉱山跡地を成熟した低地熱帯林へ再生させた稀有な例。", "cat": "culture", "star": false}, {"id": 12, "name": "ムルジュガの文化的景観", "region": "オセアニア", "meta": "オーストラリア・文化遺産・2025年", "page": "P407", "primary": "世界最大級の密度の岩面彫刻（100万〜200万点）", "kw": "ンガルダ・ンガリル族／5万年以上の管理／100万〜200万点の岩面彫刻／近隣LNG施設の酸性物質による風化懸念", "note": "5万年以上先住民が管理してきた文化的景観。世界最大級の密度の岩面彫刻が残るが、近隣工業施設の影響が懸念される。", "cat": "culture", "star": true}, {"id": 13, "name": "マンダラ山脈のディ・ギッド・ビィの文化的景観", "region": "アフリカ", "meta": "カメルーン・文化遺産・2025年", "page": "P243", "primary": "乾式石積みの段々畑・ディ・ギッド・ビィ（首長の邸宅跡）", "kw": "乾式石積み建築の段々畑／ディ・ギッド・ビィ（首長の邸宅跡）／マファ族／サハラ以南で稀有", "note": "カメルーン北部の山岳文化的景観。乾式石積みの段々畑が特徴で、サハラ以南では非常に稀。12〜17世紀に建造。", "cat": "culture", "star": false}, {"id": 14, "name": "ムランジェ山の文化的景観", "region": "アフリカ", "meta": "マラウイ・文化遺産・2025年", "page": "P321", "primary": "3民族の聖地・固有種ムランジェ杉", "kw": "マラウイ最高峰／マンガンジャ・ヤオ・ロンウェ族の聖地／雨乞い・祖先崇拝／固有種ムランジェ杉", "note": "マラウイ最高峰の残丘。3民族の聖地で雨乞いや祖先崇拝の場。固有の絶滅危惧種ムランジェ杉が生育する。", "cat": "culture", "star": false}, {"id": 15, "name": "ゴラとティワイの複合地域", "region": "アフリカ", "meta": "シエラレオネ・自然遺産・2025年", "page": "P384", "primary": "シエラレオネ初の世界遺産・淡水魚の35%が固有種", "kw": "シエラレオネ初の世界遺産／ゴラ熱帯雨林＋ティワイ島／淡水魚の約35%が固有種／ニシチンパンジー・コビトカバ", "note": "シエラレオネ初の世界遺産。上部ギニア森林の生物多様性ホットスポットで、淡水魚の約35%が固有種。", "cat": "park", "star": false}, {"id": 16, "name": "パナマの植民地時代の地峡横断ルート", "region": "北中米", "meta": "パナマ・文化遺産・2025年", "page": "P180", "primary": "地峡横断ルート・パナマ・ビエホ（モーガンが破壊）", "kw": "スペインの銀貿易ルート／カミノ・デ・クルセス／サン・ロレンツォ要塞／私掠船長ヘンリー・モーガンが破壊", "note": "16世紀以降スペインの物流拠点となった地峡。金銀貿易で栄えたパナマ・ビエホは英私掠船長モーガンに破壊された。", "cat": "culture", "star": false}, {"id": 17, "name": "聖地群を経てウィリクタへと至るウィハリカの道", "region": "北中米", "meta": "メキシコ・文化遺産・2025年", "page": "P180", "primary": "ウィハリカ族の聖なる巡礼路・ペヨーテ", "kw": "ウィハリカ族（ホイチョル族）の巡礼路500km／世界創造の地ウィリクタ／幻覚サボテンのペヨーテ／ケマド山", "note": "メキシコ中北部のウィハリカ族の聖なる巡礼路。世界創造の地ウィリクタへ向かい、旅そのものが伝統継承の行為。", "cat": "culture", "star": false}, {"id": 18, "name": "17世紀ポート・ロイヤルの考古学的遺跡群", "region": "北中米", "meta": "ジャマイカ・文化遺産・2025年", "page": "P273", "primary": "私掠船の拠点・1692年地震で海没", "kw": "私掠船の拠点／ヘンリー・モーガン／1692年の大地震で街の2/3が海没／海底に約90%が手つかずで残存", "note": "17世紀の港町で私掠船の拠点。1692年の大地震で街の約2/3が海没し、海底に手つかずのまま残る。", "cat": "culture", "star": false}]}, {"id": "p10", "title": "⑩ 7/5 テーマ:世界初・最初の登録遺産", "cards": [{"id": 1, "name": "ガラパゴス諸島", "region": "南米", "meta": "エクアドル・自然遺産・1978年", "page": "P412", "primary": "世界遺産第1号・最初の登録12件", "kw": "1978年最初の登録12件／大小19の火山島／ダーウィンが進化論の着想を得た地／フィンチ・ゾウガメが島ごとに異なる特徴／外来種・観光圧で一時危機遺産", "note": "1978年の第1回登録で世界遺産となった火山群島。ダーウィンが「種の起源」の着想を得た地で、外来種や観光圧により一時危機遺産リストに記載された。", "cat": "park", "star": true}, {"id": 2, "name": "キトの市街", "region": "南米", "meta": "エクアドル・文化遺産・1978年", "page": "P355", "primary": "最初の登録12件・赤道直下の首都", "kw": "1978年最初の登録12件／標高2,850mの赤道直下の首都／インカ帝国→スペイン植民都市／バロック様式とムデハル様式の融合", "note": "1978年最初の12件のひとつ。標高2,850mの高地にある赤道直下の首都で、新大陸における宗教の中心地。植民地特有の教会建築が残る。", "cat": "culture", "star": true}, {"id": 3, "name": "ランス・オー・メドー国立歴史公園", "region": "北中米", "meta": "カナダ・文化遺産・1978年", "page": "P317", "primary": "ヴァイキング北米最初の入植地", "kw": "1978年最初の登録12件／1000年頃のヴァイキング集落跡／北欧の伝承文学「サガ」を基に発見／ニューファンドランド島北端", "note": "北米に初めて到達したヨーロッパ人＝ヴァイキングの集落跡。北欧の伝承文学「サガ」の記述を基に1960年代に発見された。1978年最初の12件のひとつ。", "cat": "culture", "star": true}, {"id": 4, "name": "クラクフの歴史地区", "region": "ヨーロッパ", "meta": "ポーランド・文化遺産・1978年", "page": "P444", "primary": "最初の登録12件・「白貂を抱く貴婦人」", "kw": "1978年最初の登録12件／約600年間ポーランドの首都／ダ・ヴィンチ「白貂を抱く貴婦人」／ナチス・ドイツに収奪→バイエルンで発見・返還／チャルトリスキ美術館", "note": "11〜17世紀の約600年間ポーランドの首都。ダ・ヴィンチの「白貂を抱く貴婦人」は大戦時にナチスに収奪され、戦後クラクフに返還された。", "cat": "culture", "star": true}, {"id": 5, "name": "古代都市テーベと墓地遺跡", "region": "アフリカ", "meta": "エジプト・文化遺産・1979年", "page": "P445", "primary": "中王国時代に初めてエジプトの都・王家の谷", "kw": "第11王朝で初めてエジプトの都に／カルナク神殿・ルクソール神殿／王家の谷／ハトシェプスト女王葬祭殿／ツタンカーメンの墓", "note": "中王国時代の第11王朝で初めてエジプトの都となった地の遺跡群。カルナク神殿や王家の谷、ツタンカーメン王の墓が残る。", "cat": "culture", "star": false}, {"id": 6, "name": "シュトルーヴェの測地弧", "region": "ヨーロッパ", "meta": "10ヵ国共有・文化遺産・2005年", "page": "P340", "primary": "史上初めて経線を正確に測量", "kw": "史上初の経線の長距離測量／天文学者シュトルーヴェ／北極海から黒海まで10ヵ国／測地点265ヵ所中34ヵ所登録／地球が楕円形と証明", "note": "天文学者シュトルーヴェが史上初めて1つの経線を長距離にわたり測量した観測地点群。10ヵ国にまたがり、地球がわずかに楕円形であることを証明した。", "cat": "culture", "star": true}, {"id": 7, "name": "フラーネカーのエイシンハ・プラネタリウム", "region": "ヨーロッパ", "meta": "オランダ・文化遺産・2023年", "page": "P341", "primary": "最初期のプラネタリウム・毛織物職人が自作", "kw": "毛織物職人エイセ・エイシンハが考案・製作／居間兼寝室の天井に組み込み／1つの振り子時計で駆動／太陽系の動く機械模型", "note": "毛織物職人エイシンハが自宅の居間兼寝室の天井に組み込んだ太陽系の機械模型。振り子時計1つで惑星の位置を映す、プラネタリウムの最初期のもの。", "cat": "culture", "star": false}, {"id": 8, "name": "フォース鉄道橋", "region": "ヨーロッパ", "meta": "英国・文化遺産・2015年", "page": "P179", "primary": "世界最初期のカンチレバー橋", "kw": "世界最初期の複数接合式カンチレバー橋／この工法で現存最長（全長2,529m）／軟鋼板5万4,000t／1890年開通・現在も使用", "note": "スコットランドのフォース川河口に架かる鉄道橋。世界最初期のカンチレバー橋で、新素材の軟鋼を使い1890年に開通、今も現役。", "cat": "culture", "star": false}, {"id": 9, "name": "サラン・レ・バン大製塩所からアルケ・スナン王立製塩所までの天日塩生産所", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1982年", "page": "P346", "primary": "フランス初の産業建築・未完の理想都市", "kw": "フランス初の産業建築／建築家クロード・ニコラ・ルドゥ／施設を円形配置した理想工業都市／半円形のまま未完／ルイ16世治世下", "note": "ルイ16世治世下にルドゥの設計で建設された製塩所。円形の理想工業都市を目指したが半円で未完。フランス初の産業建築で、後の産業建築に影響を与えた。", "cat": "culture", "star": false}, {"id": 10, "name": "デッサウ・ヴェルリッツの庭園王国", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2000年", "page": "P307", "primary": "ヨーロッパ大陸初の風景式庭園", "kw": "ヨーロッパ大陸初の風景式庭園（ヴェルリッツ庭園）／アンハルト・デッサウ侯レオポルト3世／啓蒙主義時代の景観設計／英国のスタウアヘッドの影響", "note": "アンハルト・デッサウ侯レオポルト3世がつくった庭園群。中核のヴェルリッツ庭園は英国式庭園の影響を受けた、ヨーロッパ大陸初の風景式庭園。", "cat": "culture", "star": false}, {"id": 11, "name": "フォンテーヌブロー宮殿と庭園", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1981年", "page": "P231", "primary": "フランス最初のルネサンス君主フランソワ1世", "kw": "フランソワ1世（ヴァロワ朝第9代・フランス最初のルネサンス君主）が16世紀に拡張／フランソワ1世の回廊／舞踏の間／ナポレオンの「別れの中庭」", "note": "フランス最初のルネサンス君主フランソワ1世が大規模に拡張したルネサンス様式の宮殿。19世紀にはナポレオン1世が改築・修復した。", "cat": "culture", "star": false}, {"id": 12, "name": "アフパットとサナインの修道院", "region": "ヨーロッパ", "meta": "アルメニア・文化遺産・1996年", "page": "P289", "primary": "世界最初のキリスト教国の宗教建築", "kw": "世界最初のキリスト教国アルメニア（4世紀初めに国教化）／ビザンツ様式＋コーカサス独自様式の融合／ガビット（玄関ホール）／アルメニア正教の学問拠点", "note": "4世紀初めに世界で最初にキリスト教を国教としたアルメニアの代表的宗教建築。最盛期には2つの修道院で500人ほどの修道士が活動した。", "cat": "culture", "star": true}, {"id": 13, "name": "イランのアルメニア教会修道院群", "region": "中東", "meta": "イラン・文化遺産・2008年", "page": "P172", "primary": "世界で初めてキリスト教を公認した民族の修道院群", "kw": "聖タデウス修道院（十二使徒タダイ・7世紀起源）／聖ステファノス修道院／ゾルゾルの聖マリア聖堂／毎年7月の巡礼は無形文化遺産", "note": "イラン北西部に残るアルメニア正教の建造物群。世界で初めてキリスト教を公認したアルメニア王国の正教普及の中心地だった。", "cat": "culture", "star": false}, {"id": 14, "name": "ボルガルの歴史的考古学的遺産群", "region": "ヨーロッパ", "meta": "ロシア・文化遺産・2014年", "page": "P215", "primary": "ジョチ・ウルス最初の首都", "kw": "ヴォルガ川の岸辺／ジョチ・ウルス（キプチャク・ハン国）最初の首都／ヴォルガ・ボルガル文明（7〜15世紀）／タタールのイスラム教徒の巡礼地", "note": "ヴォルガ・ボルガル文明の考古遺跡。13世紀にはチンギス・ハンの長男ジョチの子孫が興したジョチ・ウルス最初の首都となった。", "cat": "culture", "star": false}, {"id": 15, "name": "始皇帝陵と兵馬俑坑", "region": "アジア", "meta": "中国・文化遺産・1987年", "page": "P226", "primary": "中国初の統一国家・秦の始皇帝の陵墓", "kw": "紀元前221年に中国初の統一国家／驪山北麓の地下帝国／「史記」に床に水銀で川や海の記述→土中の水銀濃度が異常に高い／兵馬俑は容貌が全て異なる（個別制作）", "note": "中国初の統一国家を築いた秦の始皇帝の陵墓。「史記」の水銀の川の記述どおり土中の水銀濃度が高い。陪葬坑から大量の兵馬俑が出土した。", "cat": "culture", "star": false}, {"id": 16, "name": "万里の長城", "region": "アジア", "meta": "中国・文化遺産・1987年", "page": "P227", "primary": "初めて中国を統一した始皇帝が整備した世界最大の城壁", "kw": "春秋時代（紀元前7世紀頃）に建造開始／始皇帝が連結・整備／敵台（望楼）・のろし台／長城を挟んで異民族同士の交易も", "note": "東西2万kmに及ぶ世界最大規模の城壁。初めて中国を統一した秦の始皇帝が、北方の遊牧民族に備えて長城をつなぐ形で整備した。", "cat": "culture", "star": false}, {"id": 17, "name": "カンチェンジュンガ国立公園", "region": "アジア", "meta": "インド・複合遺産・2016年", "page": "P322", "primary": "インド初の複合遺産・世界第3位の高峰", "kw": "インド初の複合遺産／シッキム州／世界第3位の標高カンチェンジュンガ山／原住民の神話と仏教の教えが同化", "note": "ヒマラヤ中心部にあるインド初の複合遺産。豊かな自然と、カンチェンジュンガ山を崇拝するシッキム原住民の神話・文化が認められた。", "cat": "mixed", "star": false}, {"id": 18, "name": "ニュングウエ国立公園", "region": "アフリカ", "meta": "ルワンダ・自然遺産・2023年", "page": "P151", "primary": "ルワンダ初の自然遺産", "kw": "ルワンダ初の自然遺産／中央アフリカの熱帯雨林保護の重要地域／ヒガシチンパンジー・ゴールデンモンキー／ナイル川の水源のひとつ", "note": "ルワンダ南西部の国立公園でルワンダ初の自然遺産。手つかずの森林や泥炭湿原が広がり、ナイル川の水源のひとつも存在する。", "cat": "park", "star": false}, {"id": 19, "name": "レブカ歴史的港湾都市", "region": "オセアニア", "meta": "フィジー・文化遺産・2013年", "page": "P218", "primary": "フィジー植民地最初の首都", "kw": "オバラウ島の港街／1874年イギリスに譲渡→植民地最初の首都／コロニアル様式の低層建築／ココナッツやマンゴーの木々", "note": "1874年にイギリスへ譲渡されたフィジーで、植民地最初の首都となった港街。オセアニアとヨーロッパの文化交流を伝える。", "cat": "culture", "star": false}, {"id": 20, "name": "ブリムストーン・ヒル要塞国立公園", "region": "北中米", "meta": "セントクリストファー・ネーヴィス・文化遺産・1999年", "page": "P219", "primary": "西インド諸島で最初に植民地化された島の要塞", "kw": "英仏が西インド諸島で最初に植民地化を進めた島／英国が設計・アフリカ人奴隷が約100年建設／17〜18世紀カリブ海軍事建築の傑出例", "note": "セントクリストファー島は英仏による植民地化が西インド諸島で最初に進められた島。英国設計の要塞をアフリカ人奴隷が約100年かけて建設した。", "cat": "culture", "star": false}, {"id": 21, "name": "ラリベラの岩の聖堂群", "region": "アフリカ", "meta": "エチオピア・文化遺産・1978年", "page": "P317", "primary": "最初の登録12件・第二のエルサレム", "kw": "1978年最初の登録12件／ザグウェ朝7代国王ラリベラ／11の岩窟キリスト教聖堂／都を第二のエルサレムに／工期の早さから天使がつくったといわれる／ギリシャ十字形のギョルギス聖堂", "note": "ザグウェ朝の国王ラリベラが、イスラム教徒の手に渡ったエルサレムに代わる第二のエルサレムを目指して造営した11の岩窟聖堂群。1978年最初の12件のひとつ。", "cat": "culture", "star": true}, {"id": 22, "name": "アーヘンの大聖堂", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1978年", "page": "P201", "primary": "最初の登録12件・現存唯一のカロリング朝青銅作品", "kw": "1978年最初の登録12件／793〜813年築の宮廷礼拝堂が起源／16世紀まで約30人のドイツ王が戴冠／青銅製の扉や柵は現存唯一のカロリング朝の青銅作品", "note": "カール大帝の宮廷礼拝堂を起源とする聖堂で、1978年最初の12件のひとつ。青銅製の扉や柵は現存する唯一のカロリング朝時代の青銅作品。", "cat": "culture", "star": false}, {"id": 23, "name": "ヴィエリチカとボフニャの王立岩塩坑", "region": "ヨーロッパ", "meta": "ポーランド・文化遺産・1978年", "page": "P344", "primary": "最初の登録12件・ヨーロッパ最古級の岩塩坑", "kw": "1978年最初の登録12件／約2,000万年前の塩湖が岩塩層に／13世紀から本格採掘・700年間で深さ300m超・総延長300km／ハプスブルク家領時代にフランツ2世の視察用鉄道", "note": "クラクフ南東にあるヨーロッパ最古級の岩塩坑で、1978年最初の12件のひとつ。9層の坑道は深さ300m以上、総延長300kmに及ぶ。", "cat": "culture", "star": false}, {"id": 24, "name": "シミエン国立公園", "region": "アフリカ", "meta": "エチオピア・自然遺産・1978年", "page": "P389", "primary": "最初の登録12件・ワリアアイベックス", "kw": "1978年最初の登録12件／アフリカ第4の高峰ラスダシャン山（4,620m）／ワリアアイベックスはアフリカと欧州が地続きだった証明／密猟・道路建設で1996〜2017年危機遺産", "note": "アフリカ第4の高峰ラスダシャン山がそびえる山岳公園で、1978年最初の12件のひとつ。密猟や新道路の建設計画により1996〜2017年に危機遺産リスト記載。", "cat": "park", "star": false}]}, {"id": "p11", "title": "⑪ 7/5 テーマ:自然遺産セレクション", "cards": [{"id": 1, "name": "ヴィクトリアの滝（モシ・オ・トゥニャ）", "region": "アフリカ", "meta": "ザンビア・ジンバブエ・自然遺産・1989年", "page": "P217", "primary": "モシ・オ・トゥニャ（轟音を響かせる水煙）", "kw": "ザンビアとジンバブエの国境／探検家リヴィングストンが女王にちなみ命名／現地名モシ・オ・トゥニャ＝轟音を響かせる水煙／雨季は毎分5億リットル／ザンベジ川が玄武岩に亀裂", "note": "ザンベジ川の水が玄武岩台地の亀裂に流れ落ちてできた大瀑布。探検家リヴィングストンが女王にちなみ命名したが、現地名は「轟音を響かせる水煙」。", "cat": "park", "star": true}, {"id": 2, "name": "グランド・キャニオン国立公園", "region": "北中米", "meta": "アメリカ・自然遺産・1979年", "page": "P419", "primary": "コロラド川が削った深さ1.5kmの峡谷", "kw": "コロラド川が削り出した深さ約1.5km／最下層ヴィシュヌ片岩は20億年前の先カンブリア時代／時代の異なる地層が観察できる／2025年ノース・リムで大規模火災", "note": "コロラド川が削り出した深さ約1.5kmの壮大な峡谷。最下層のヴィシュヌ片岩は20億年前の先カンブリア時代のもので、時代の異なる地層が観察できる。", "cat": "park", "star": true}, {"id": 3, "name": "エヴァーグレーズ国立公園", "region": "北中米", "meta": "アメリカ・自然遺産・1979年", "page": "P393", "primary": "北米最大の亜熱帯湿原・二度の危機遺産", "kw": "北米最大の亜熱帯自然保護区／ハンモックと呼ばれる島々とマングローブ林／都市の取水で地下水位低下・水質汚染／1993年危機遺産→2007年解除→2010年再登録", "note": "淡水と海水、温帯と亜熱帯の動植物が入り交じる北米最大の亜熱帯湿原。周囲の大都市の取水で水質が悪化し、1993年と2010年の二度危機遺産に登録された。", "cat": "park", "star": true}, {"id": 4, "name": "グレート・スモーキー山脈国立公園", "region": "北中米", "meta": "アメリカ・自然遺産・1983年", "page": "P378", "primary": "高低差が生む多様な植物分布・東京都と同面積", "kw": "東京都とほぼ同じ面積／園内9割以上が森林／高地は針葉樹・低地は落葉樹／アメリカグマ・キタオポッサム／カナダカワウソを再導入", "note": "アメリカ東部の広大な森林公園。土地の高低差が激しく多様な植物が分布し、アメリカグマや有袋類のキタオポッサムなど多くの哺乳類が生息する。", "cat": "park", "star": false}, {"id": 5, "name": "ガリ", "region": "オセアニア", "meta": "オーストラリア・自然遺産・1992年", "page": "P419", "primary": "世界最大の砂の島（旧フレーザー島）", "kw": "世界最大の砂の島／約80万年前グレート・ディヴァイディング山脈の砂が堆積／1991年に森林伐採停止／2020年大規模火災", "note": "オーストラリア東海岸に南北120kmに広がる世界最大の砂の島。約80万年前に風化した砂が堆積してできた。2020年に大規模火災で被害を受けた。", "cat": "park", "star": true}, {"id": 6, "name": "ドニャーナ国立公園", "region": "ヨーロッパ", "meta": "スペイン・自然遺産・1994年", "page": "P392", "primary": "スペインオオヤマネコ・水鳥の越冬地", "kw": "グアダルキビル川河口の湿地帯／スペインオオヤマネコ／毎年50万羽超の水鳥の越冬地・東大西洋フライウェイの中継地／動く砂丘ドゥナス・モビレス／過剰灌漑で湿原縮小", "note": "グアダルキビル川河口の広大な湿地帯。絶滅危惧のスペインオオヤマネコが生息し、50万羽超の水鳥の越冬地。近年は過剰な灌漑で湿原の縮小が進む。", "cat": "park", "star": true}, {"id": 7, "name": "パンタナル自然保護区", "region": "南米", "meta": "ブラジル・自然遺産・2000年", "page": "P396", "primary": "世界最大の淡水湿地", "kw": "世界最大の淡水湿地パンタナル湿原／ブラジル・ボリビア・パラグアイの3国／雨季の氾濫で肥沃／オオアリクイ・オオカワウソ・スミレコンゴウインコ／農地開発と山火事", "note": "ブラジル側の一部が登録された世界最大の淡水湿地。雨季の氾濫で養分が行きわたり、多くの絶滅危惧種を保護するが、農地開発や山火事の影響が深刻。", "cat": "park", "star": true}, {"id": 8, "name": "ロス・アレルセス国立公園", "region": "南米", "meta": "アルゼンチン・自然遺産・2017年", "page": "P419", "primary": "パタゴニアヒバ（アレルセ）の森", "kw": "パタゴニア北部アンデス側／氷河作用でできたモレーン・峡谷・透明な湖／パタゴニアヒバ（アレルセ）の森／2024年に大規模森林火災", "note": "パタゴニア北部の国立公園。氷河作用が生んだ風光明媚な景観と、現地名アレルセと呼ばれるパタゴニアヒバの森が特徴。2024年に大規模火災が発生。", "cat": "park", "star": false}, {"id": 9, "name": "ベリーズ・バリア・リーフ自然保護区", "region": "北中米", "meta": "ベリーズ・自然遺産・1996年", "page": "P393", "primary": "世界2番目のサンゴ礁（メソアメリカン・リーフ）", "kw": "世界で2番目に大きいメソアメリカン・リーフの中核／65種のサンゴ・500種以上の魚類／アメリカマナティー・ウミガメ／石油探査禁止で2018年危機遺産解除", "note": "世界で2番目に大きなサンゴ礁メソアメリカン・リーフの中核部分。石油採掘計画で2009年に危機遺産となったが、探査禁止により2018年に解除された。", "cat": "park", "star": false}, {"id": 10, "name": "東レンネル", "region": "オセアニア", "meta": "ソロモン諸島・自然遺産・1998年", "page": "P395", "primary": "世界最大の隆起環礁・森林伐採で危機遺産", "kw": "隆起環礁としては世界最大（全長86km）／汽水湖テガノ湖／クロッカーウミヘビなど固有種／森林伐採で2013年危機遺産／ var COUNTS = [10, 20, 30, 50];
var selNotes = {}; var selCount = 20;
var drill = null;

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

PAGES.forEach(function(p){ selNotes[p.id] = true; });
function renderSetup(){
  $('noteChips').innerHTML = PAGES.map(function(p){
    return '<span class="chip'+(selNotes[p.id]?' on':'')+'" onclick="toggleNote(\''+p.id+'\')">'+esc(p.title)+' <small>('+p.cards.length+')</small></span>';
  }).join('');
  $('cntChips').innerHTML = COUNTS.map(function(c){
    return '<span class="chip'+(selCount===c?' on':'')+'" onclick="setCount('+c+')">'+c+'問</span>';
  }).join('') + '<span class="chip'+(selCount===9999?' on':'')+'" onclick="setCount(9999)">全問</span>';
}
function toggleNote(id){ selNotes[id]=!selNotes[id]; renderSetup(); }
function toggleAll(v){ PAGES.forEach(function(p){ selNotes[p.id]=v; }); renderSetup(); }
function setCount(c){ selCount=c; renderSetup(); }

function tokensOf(name){
  var t = name.split(/[・（）()：:「」\s／\/－\-]+/).filter(function(x){ return x.length>=3; });
  t.push(name); return t;
}
function maskedSegs(card){
  var toks = tokensOf(card.name);
  return card.kw.split('／').filter(function(s){
    return s.length>0 && !toks.some(function(t){ return s.indexOf(t)>=0; });
  });
}
function countryOf(card){
  var p = card.meta.split('・');
  return p.length>=3 ? p.slice(0, p.length-2).join('・') : p[0];
}
// 単語カードのkw欄から「選択肢用キーワード」を作る。
// ・遺産名を含むキーワードは除外（答えがバレる）
// ・他のカードにも出てくる汎用キーワード（例: 1978年最初の登録12件）より、
//   そのカード固有のキーワードを優先する
function choiceSegs(card, pool){
  if(card._cs !== undefined) return card._cs;
  var segs = maskedSegs(card);
  if(segs.length === 0){ card._cs = null; return null; }
  var uniq = segs.filter(function(s){
    return !pool.some(function(c){ return c !== card && c.kw.indexOf(s) >= 0; });
  });
  var use = uniq.slice(0, 2);
  if(use.length < 2){
    segs.forEach(function(s){ if(use.length < 2 && use.indexOf(s) < 0) use.push(s); });
  }
  card._cs = use.join('／');
  return card._cs;
}
function pickDistractors(card, pool, n, keyFn){
  var used = {}; used[keyFn(card)] = true;
  var cands = shuffle(pool.filter(function(c){ return c!==card; }).slice());
  // 同地域を優先
  cands.sort(function(a,b){
    return (b.region===card.region?1:0) - (a.region===card.region?1:0);
  });
  var out = [];
  for(var i=0;i<cands.length && out.length<n;i++){
    var k = keyFn(cands[i]);
    if(!k || used[k]) continue;
    used[k]=true; out.push(cands[i]);
  }
  return out;
}
function explOf(card){
  return '<b>'+esc(card.name)+'</b>（'+esc(card.meta)+'・<span class="pg">'+esc(card.page)+'</span>）<br>'+esc(card.note);
}
function buildQuestion(card, pool){
  var segs = maskedSegs(card);
  var r = Math.random();
  var nameKey = function(c){ return c.name; };
  if(r < 0.25){
    // B) 遺産名 → 正しいキーワード（単語カードのkw欄）を選ぶ
    var myTxt = choiceSegs(card, pool);
    if(myTxt){
      var ds = pickDistractors(card, pool, 3, function(c){ return choiceSegs(c, pool); });
      if(ds.length===3){
        var opts = shuffle([{t:myTxt, ok:true}].concat(ds.map(function(c){ return {t:choiceSegs(c, pool), ok:false}; })));
        return { type:'キーワードを選ぶ', stem:'『'+card.name+'』のキーワードとして正しいものはどれか。', opts:opts, expl:explOf(card) };
      }
    }
  } else if(r < 0.40){
    // C) 遺産名 → 国名を選ぶ
    var ctry = countryOf(card);
    if(ctry && card.name.indexOf(ctry)<0){
      var ds2 = pickDistractors(card, pool, 3, countryOf);
      if(ds2.length===3){
        var opts2 = shuffle([{t:ctry, ok:true}].concat(ds2.map(function(c){ return {t:countryOf(c), ok:false}; })));
        return { type:'国を選ぶ', stem:'『'+card.name+'』が位置する国として正しいものはどれか。', opts:opts2, expl:explOf(card) };
      }
    }
  }
  // A) 説明・キーワード → 遺産名（デフォルト）
  var useSegs = segs.length>0 ? shuffle(segs.slice()).slice(0,3) : [card.primary];
  var ds3 = pickDistractors(card, pool, 3, nameKey);
  var opts3 = shuffle([{t:card.name, ok:true}].concat(ds3.map(function(c){ return {t:c.name, ok:false}; })));
  return { type:'遺産名を選ぶ',
    stem:'次のキーワードに当てはまる遺産として正しいものはどれか。<span class="kwbox">'+esc(useSegs.join('　／　'))+'</span>',
    opts:opts3, expl:explOf(card) };
}

function startDrill(cardsOverride){
  var cards = cardsOverride;
  if(!cards){
    cards = [];
    PAGES.forEach(function(p){ if(selNotes[p.id]) cards = cards.concat(p.cards); });
    if(cards.length < 4){ $('setupMsg').textContent = 'ノートを選んでください（最低4件必要です）'; return; }
    cards = shuffle(cards.slice()).slice(0, selCount);
  }
  var pool = [];
  PAGES.forEach(function(p){ pool = pool.concat(p.cards); });
  drill = { qs: cards.map(function(c){ var q = buildQuestion(c, pool); q.card = c; return q; }),
            i:0, score:0, wrong:[], srcCards:cards };
  $('setup').classList.add('hidden'); $('result').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  renderQ();
}
function renderQ(){
  var q = drill.qs[drill.i];
  $('qPos').textContent = '第 '+(drill.i+1)+' 問 / '+drill.qs.length;
  $('qScore').textContent = '正解 '+drill.score;
  $('qType').textContent = q.type;
  $('qStem').innerHTML = q.stem;
  $('qOpts').innerHTML = q.opts.map(function(o,idx){
    return '<button class="opt" onclick="answer('+idx+')">'+esc(o.t)+'</button>';
  }).join('');
  $('qExpl').classList.add('hidden');
  $('nextBtn').classList.add('hidden');
}
function answer(idx){
  var q = drill.qs[drill.i];
  var btns = $('qOpts').querySelectorAll('.opt');
  q.opts.forEach(function(o,i){
    btns[i].disabled = true;
    if(o.ok) btns[i].classList.add('correct');
    else if(i===idx) btns[i].classList.add('wrong');
  });
  if(q.opts[idx].ok){ drill.score++; $('qScore').textContent='正解 '+drill.score; }
  else drill.wrong.push(q.card);
  $('qExpl').innerHTML = q.expl;
  $('qExpl').classList.remove('hidden');
  $('nextBtn').classList.remove('hidden');
  $('nextBtn').textContent = drill.i+1 >= drill.qs.length ? '結果を見る →' : '次の問題 →';
}
function nextQ(){
  drill.i++;
  if(drill.i >= drill.qs.length){ showResult(); return; }
  renderQ();
}
function showResult(){
  $('quiz').classList.add('hidden');
  $('result').classList.remove('hidden');
  var n = drill.qs.length;
  var pct = Math.round(drill.score / n * 100);
  $('rScore').textContent = drill.score + ' / ' + n;
  $('rSub').textContent = '正答率 ' + pct + '%' + (pct>=70 ? '　合格ライン(70%)クリア！' : '　合格ラインまであと' + (Math.ceil(n*0.7)-drill.score) + '問');
  $('retryWrongBtn').style.display = drill.wrong.length ? '' : 'none';
  $('wrongLabel').style.display = drill.wrong.length ? '' : 'none';
  $('wrongList').innerHTML = drill.wrong.map(function(c){
    return '<div class="wrong-item"><b>'+esc(c.name)+'</b><span>'+esc(c.meta)+'・'+esc(c.page)+'　'+esc(c.primary)+'</span></div>';
  }).join('');
}
function retryWrong(){ if(drill.wrong.length) startDrill(shuffle(drill.wrong.slice())); }
function retrySame(){ startDrill(shuffle(drill.srcCards.slice())); }
function backToSetup(){ $('result').classList.add('hidden'); $('quiz').classList.add('hidden'); $('setup').classList.remove('hidden'); }
function quitDrill(){ backToSetup(); }

renderSetup();
</script>
