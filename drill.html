star": false}, {"id": 9, "name": "ドン・パヤーイェン-カオ・ヤイの森林群", "region": "アジア", "meta": "タイ・自然遺産・2005年", "page": "P381", "primary": "タイの絶滅危惧種15%が生息・シャムワニ", "kw": "4つの国立公園と1つの野生動物保護区／タイ国内の絶滅危惧種の約15%が生息／シャムワニ・バンテン・ムラサキモリバト／道路による分断が課題", "note": "バンコク北東部の広大な熱帯林。タイ国内の絶滅危惧種の約15%が生息する。遺産内の道路による分断や農地化が課題となっている。", "cat": "park", "star": false}, {"id": 10, "name": "湖北の神農架", "region": "アジア", "meta": "中国・自然遺産・2016年", "page": "P381", "primary": "中国中部最大の原生林・キンシコウ", "kw": "神農頂／巴東と老君山の2区域／中国中部最大の原生林の保護区／キンシコウ（ゴールデンモンキー）／チュウゴクオオサンショウウオ／植物採集の名所", "note": "中国中部の原生林保護区。キンシコウや世界最大の両生類チュウゴクオオサンショウウオが生息し、植物学の歴史でも重要な役割を果たした。", "cat": "park", "star": false}, {"id": 11, "name": "コイバ国立公園と特別海洋保護区", "region": "北中米", "meta": "パナマ・自然遺産・2005年", "page": "P387", "primary": "エルニーニョの影響を免れた独自の海洋生態系", "kw": "チリキ湾のコイバ島と38の小島／東部熱帯太平洋海洋回廊の一部／エルニーニョの影響が及ばない湾内で独自の生態系／ヒメオウギワシ・コンゴウインコ", "note": "パナマのコイバ島と周辺海域の海洋保護区。エルニーニョの影響が及ばない湾内にあり独自の生態系が育まれ、他地域で消えた希少種が残る。", "cat": "park", "star": false}, {"id": 12, "name": "三清山国立公園", "region": "アジア", "meta": "中国・自然遺産・2008年", "page": "P149", "primary": "48の岩峰と89の石柱・道教の聖地", "kw": "江西省の花こう岩の山塊／48の岩峰と89の石柱／人や動物のシルエットを思わせる奇岩／道教との関わり（道士の葛洪が登山）／登録基準は美観", "note": "花こう岩が削られてできた奇岩が林立する山。48の岩峰と89の石柱が集中し、道教とも関わりが深い。景観の美しさが評価された。", "cat": "park", "star": false}, {"id": 13, "name": "イシマンガリソ湿地公園とマプト国立公園", "region": "アフリカ", "meta": "南アフリカ・モザンビーク・自然遺産・1999年", "page": "P167", "primary": "アフリカ最南端のサンゴ礁を含む多様な地形", "kw": "淡水湖・海岸砂丘・マングローブ・アフリカ最南端のサンゴ礁／熱帯と亜熱帯の境界／セントルシア湖のフラミンゴ／2025年マプト国立公園を加え拡大", "note": "淡水湖から海岸砂丘、アフリカ最南端のサンゴ礁まで多様な地形を含む。2025年にモザンビークのマプト国立公園を加えて拡大登録された。", "cat": "park", "star": false}, {"id": 14, "name": "ケーン・クラチャーン森林関連遺産群", "region": "アジア", "meta": "タイ・自然遺産・2021年", "page": "P151", "primary": "3つの動物区系が交差・シャムワニ", "kw": "テナセリム山脈のタイ側／ヒマラヤ・インドシナ・スマトラの動植物界が交差／6タイプの森林／シャムワニ／2つの重要野鳥生息地（IBA）が重なる", "note": "テナセリム山脈のタイ側の森林地帯。ヒマラヤ・インドシナ・スマトラの動植物界が交差し、豊かな生物多様性と鳥類の多様性をもつ。", "cat": "park", "star": false}, {"id": 15, "name": "ウニアンガ湖群", "region": "アフリカ", "meta": "チャド・自然遺産・2012年", "page": "P148", "primary": "砂漠の中の18の色とりどりの湖・美観のみで登録", "kw": "サハラ砂漠（年降水量2mm以下）の18の湖／青・緑・赤の色彩／登録基準(vii)＝自然美のみで登録／砂丘で隔てられた湖同士の水循環で塩水化を防ぐ", "note": "極度に乾燥した地域にある互いにつながる18の湖群。色とりどりの湖と砂丘の景観が美しく、自然美（登録基準vii）のみで登録された。", "cat": "park", "star": true}, {"id": 16, "name": "フロー・カントリー", "region": "ヨーロッパ", "meta": "英国・自然遺産・2024年", "page": "P151", "primary": "9,000年堆積のヨーロッパ最大級の泥炭地", "kw": "スコットランド北部ハイランド／氷河後退以来9,000年堆積する泥炭地／ヨーロッパ最大級／炭素貯蔵と気候変動緩和に重要／鳥類の重要な繁殖地", "note": "氷河後退以来9,000年にわたり堆積を続けるヨーロッパ最大級の泥炭地。炭素を貯蔵し気候変動の緩和に重要な役割を果たす。", "cat": "park", "star": true}]}, {"id": "p13", "title": "⑬ 7/5 テーマ:産業・経済の遺産", "cards": [{"id": 1, "name": "コルドゥアン灯台", "region": "ヨーロッパ", "meta": "フランス・文化遺産・2021年", "page": "P345", "primary": "アンリ3世の命で建てた壮麗な現役灯台", "kw": "国王アンリ3世の命／ルイ・ドゥ・フォワ設計／ローマの霊廟やマニエリスムの装飾／王の居室・礼拝堂つき／現在も使用", "note": "16〜17世紀にアンリ3世の命で建設された灯台。霊廟やマニエリスムから着想した壮麗な装飾をもち、改良を重ねて現在も使われている。", "cat": "culture", "star": false}, {"id": 2, "name": "ヴァールベリのグリメトン無線局", "region": "ヨーロッパ", "meta": "スウェーデン・文化遺産・2004年", "page": "P345", "primary": "大西洋横断無線通信の初期施設", "kw": "1922〜24年建設／127mのアンテナ鉄塔6基／アレクサンダーソン送信機／毎年モールス信号の送信テスト", "note": "大西洋横断無線通信の初期施設として保存状態が良い無線局。今も使用可能な状態に整備され、毎年モールス信号の送信テストが行われる。", "cat": "culture", "star": false}, {"id": 3, "name": "ラス・メドゥラス", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1997年", "page": "P345", "primary": "ローマ時代の金採掘場・赤茶色の小山群", "kw": "古代ローマの金採掘場跡／トラヤヌス帝の時代に最盛期／水路の水で山を削る採掘法／残土が赤茶色の小山群に", "note": "古代ローマ時代の金の採掘場跡。大量の水で山を削る方法で採掘され、その残土が赤茶色の小山群の景観を形成した。", "cat": "culture", "star": false}, {"id": 4, "name": "プランタン＝モレトゥスの家屋・工房・博物館とその関連施設", "region": "ヨーロッパ", "meta": "ベルギー・文化遺産・2005年", "page": "P346", "primary": "現存唯一のルネサンス期活版印刷工房", "kw": "アントウェルペン／グーテンベルクが開発した活版印刷／クリストフ・プランタンの工房／事業記録は「世界の記憶」登録", "note": "アントウェルペンに現存する唯一のルネサンス・バロック期の活版印刷工房。事業記録はUNESCOの「世界の記憶」にも登録されている。", "cat": "culture", "star": true}, {"id": 5, "name": "ペルシア湾の真珠産業関連遺産：島嶼経済の証拠", "region": "中東", "meta": "バーレーン・文化遺産・2012年", "page": "P347", "primary": "日本の真珠養殖の確立で衰退した真珠産業", "kw": "バーレーン島の伝統的な真珠採取／沖合3ヵ所の真珠貝貝床／日本で真珠養殖が確立されると衰退／カラット・ブ・マヒール要塞", "note": "数千年バーレーン経済を支えた真珠採取産業の遺産。19世紀末に最盛期を迎えたが、日本で真珠養殖が確立されると衰退した。", "cat": "culture", "star": true}, {"id": 6, "name": "レッド・ベイのバスク人捕鯨基地", "region": "北中米", "meta": "カナダ・文化遺産・2013年", "page": "P347", "primary": "バスク人の捕鯨基地・鯨油の大規模生産", "kw": "16世紀にバスク人の船乗りが建設／鯨油はヨーロッパで照明用に販売／乱獲で鯨が激減し約70年で廃止／ベルアイル海峡", "note": "16世紀にバスク人が築いた捕鯨基地。鯨油の大規模生産という前工業的プロセスを示すが、乱獲による資源枯渇で約70年で廃れた。", "cat": "culture", "star": false}, {"id": 7, "name": "サワルントのオンビリン炭鉱遺産", "region": "アジア", "meta": "インドネシア・文化遺産・2019年", "page": "P348", "primary": "オランダ植民地政府が開発した炭鉱", "kw": "スマトラ島の高品質な石炭／オランダ植民地政府が開発／ミナンカバウ族や契約労働者・受刑者が労働力／採掘から輸送まで一体のシステム", "note": "オランダ植民地政府がスマトラ島に開発した炭鉱。欧州の工学知識と現地の知恵の融合を示す、植民地の先駆的な技術複合施設。", "cat": "culture", "star": false}, {"id": 8, "name": "セウェル鉱山都市", "region": "南米", "meta": "チリ・文化遺産・2006年", "page": "P348", "primary": "アンデス急斜面の「階段の街」", "kw": "世界最大級のエル・テニエンテ銅山／米国人技師ウィリアム・ブレイデン／大型車が入れず駅から階段が続く「階段の街」／標高2,000m超", "note": "アンデス山脈の急斜面に銅山労働者のため建設された都市。大型車両が入れず鉄道駅から階段が続くため「階段の街」と呼ばれる。", "cat": "culture", "star": false}, {"id": 9, "name": "イヴレーア：20世紀の産業都市", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2018年", "page": "P349", "primary": "オリベッティ社の企業都市", "kw": "タイプライターや計算機のオリベッティ社／1930〜60年代の建造物群／アドリアーノ・オリベッティのコミュニティ運動を反映", "note": "タイプライター等で有名なオリベッティ社の企業都市。創業者一族が起こしたコミュニティ運動の思想を反映した都市設計が残る。", "cat": "culture", "star": false}, {"id": 10, "name": "ニュー・ラナーク", "region": "ヨーロッパ", "meta": "英国・文化遺産・2001年", "page": "P349", "primary": "ロバート・オーウェンの理想の産業コミュニティ", "kw": "スコットランドの綿紡績工場の村／デヴィッド・デイルがアークライトの水力紡績機を導入／娘婿ロバート・オーウェンが労働者の生活・教育環境を整備", "note": "綿紡績工場を中心とする18〜19世紀の産業コミュニティ。社会思想家ロバート・オーウェンが労働者の生活と教育の環境を整えた。", "cat": "culture", "star": true}, {"id": 11, "name": "リューカン・ノトッデンの産業遺産", "region": "ヨーロッパ", "meta": "ノルウェー・文化遺産・2015年", "page": "P349", "primary": "空中窒素固定の合成肥料工場と水力発電", "kw": "ノシュク・ハイドロ社／空気中の窒素を固定する合成肥料の製造／水力発電所・輸送システム・労働者都市／自然と産業の融合景観", "note": "合成肥料製造のために築かれた水力発電所や輸送システム、労働者都市。20世紀初頭の新たなグローバル産業の顕著な事例。", "cat": "culture", "star": false}, {"id": 12, "name": "フライ・ベントスの産業景観", "region": "南米", "meta": "ウルグアイ・文化遺産・2015年", "page": "P350", "primary": "食肉産業の全過程を伝える工業地帯", "kw": "ウルグアイ川沿い／1859年設立の食肉処理工場が中心／牛肉エキスやコーンビーフを欧州へ輸出／調達から発送までの全過程", "note": "食肉処理工場を中心とする工業地帯。肉の調達から加工、梱包、発送まで、世界規模で流通した食肉産業の全体像を伝える。", "cat": "culture", "star": false}, {"id": 13, "name": "アウクスブルクの水管理システム", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2019年", "page": "P350", "primary": "水力工学のパイオニア・14世紀から続く水管理", "kw": "14世紀から連続的に発展／運河網と汲み上げポンプ式給水塔／水冷式食肉処理場・記念碑的な噴水・水力発電所など22施設", "note": "14世紀から現在まで発展し続ける水管理システム。運河網や給水塔など22施設が今も電力と衛生的な水を供給している。", "cat": "culture", "star": false}, {"id": 14, "name": "Ir.D.F.ヴァウダヘマール：D.F.ヴァウダ技師による蒸気水揚げポンプ場", "region": "ヨーロッパ", "meta": "オランダ・文化遺産・1998年", "page": "P351", "primary": "世界最大の蒸気水揚げポンプ場・現役稼働", "kw": "水利技師D.F.ヴァウダが建造／世界最大規模の排水施設／1920年完成・蒸気エンジン4基／現在も稼働", "note": "20世紀前半に建造された世界最大規模の蒸気排水ポンプ場。オランダ約700ヵ所のポンプ場の集大成で、現在も稼働している。", "cat": "culture", "star": false}, {"id": 15, "name": "シューシュタルの歴史的水利システム", "region": "中東", "meta": "イラン・文化遺産・2009年", "page": "P351", "primary": "ダレイオス1世に始まる古代水利システム", "kw": "アケメネス朝ダレイオス1世期に建設開始／ササン朝シャープール1世が大規模工事／ギャルギャル運河は現在も農地を潤す", "note": "紀元前5世紀のアケメネス朝に始まる水利システム。ササン朝時代のギャルギャル運河は現在も水を供給し農地を潤している。", "cat": "culture", "star": false}, {"id": 16, "name": "青城山と都江堰水利施設", "region": "アジア", "meta": "中国・文化遺産・2000年", "page": "P351", "primary": "道教発祥の地と李冰の水利施設", "kw": "青城山は張陵が布教した道教発祥の地／38の道教寺院が残る／都江堰は紀元前3世紀に蜀郡太守の李冰が建設／岷江の流れを制御", "note": "道教発祥の地・青城山と、紀元前3世紀に李冰が岷江の流れを制御するため築いた都江堰水利施設。今も広大な地域を灌漑する。", "cat": "culture", "star": true}]}, {"id": "p14", "title": "⑭ 7/5 テーマ:帝国の遺産（ローマ・オスマン・モンゴル）", "cards": [{"id": 1, "name": "ローマの歴史地区と教皇領、サン・パオロ・フォーリ・レ・ムーラ聖堂", "region": "ヨーロッパ", "meta": "イタリア・ヴァティカン・文化遺産・1980年", "page": "P208", "primary": "ロムルス伝説の7つの丘・コロッセウム", "kw": "アウレリアヌスの城壁内から範囲拡大／ローマ発祥の7つの丘（パラティーノ等）／コロッセウム・パンテオン／城壁外はサン・パオロ聖堂のみ／ロムルスとレムスの伝説", "note": "ローマ帝国の遺構を中心とする歴史地区。伝説では前753年にロムルスがパラティーノの丘に建国。ヴァティカン直轄の3聖堂も含む。", "cat": "culture", "star": true}, {"id": 2, "name": "オランジュの凱旋門、ローマ劇場とその周辺", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1981年", "page": "P209", "primary": "1万人収容のローマ劇場・ガリア人のレリーフ", "kw": "アウグストゥス治世下の遺跡／1万人収容・舞台幅100m超のローマ劇場（今もオペラ上演）／凱旋門に鎖につながれたガリア人のレリーフ", "note": "プロヴァンス地方の古代ローマ遺跡。保存状態の良い劇場では今も公演が行われ、凱旋門にはガリア人との戦いのレリーフが残る。", "cat": "culture", "star": false}, {"id": 3, "name": "カルタゴの考古遺跡", "region": "アフリカ", "meta": "チュニジア・文化遺産・1979年", "page": "P209", "primary": "ポエニ戦争で滅んだ「世界の覇者」", "kw": "フェニキア人が築いた都市国家／「世界の覇者」／3度のポエニ戦争でローマに壊滅→植民都市として再建／アントニヌスの浴場", "note": "フェニキア人が築き地中海の通商権を握った古代都市。ポエニ戦争でローマに滅ぼされた後、ローマ風の植民都市として蘇った。", "cat": "culture", "star": true}, {"id": 4, "name": "隊商都市ボスラ", "region": "中東", "meta": "シリア・文化遺産・1980年", "page": "P210", "primary": "ナバテア王国の首都→ローマのアラビア属州州都", "kw": "ナバテア王国の首都／2世紀にローマ帝国アラビア属州の州都／穀倉地帯・交易拠点／遺跡の上に現在の街／2013年危機遺産", "note": "ローマ〜イスラム時代の遺構が残る隊商都市。ナバテア王国の首都からローマのアラビア属州州都となった。内戦で危機遺産に。", "cat": "culture", "star": false}, {"id": 5, "name": "ローマ帝国の境界線：ダキア", "region": "ヨーロッパ", "meta": "ルーマニア・文化遺産・2024年", "page": "P210", "primary": "1,000km超の陸上国境・トラヤヌス帝の征服地", "kw": "トラヤヌス帝のダキア征服後106〜271年の国境／河川でなく1,000km以上の陸上国境／最も複雑な国境設備／金や塩を採掘", "note": "ローマ帝国最大領土期の国境線。河川国境が多い欧州で珍しい1,000km超の陸上国境で、属州で最も複雑な国境設備が築かれた。", "cat": "culture", "star": false}, {"id": 6, "name": "イスタンブルの歴史地区", "region": "中東", "meta": "トルコ・文化遺産・1985年", "page": "P211", "primary": "3帝国の首都・アヤ・ソフィア", "kw": "ビザンティオン→コンスタンティノープル→イスタンブル／ローマ・ビザンツ・オスマン3帝国の首都／アヤ・ソフィア（正教会→モスク）／トプカプ宮殿", "note": "アジアと欧州の境目でローマ、ビザンツ、オスマンの3帝国の首都となった都市。アヤ・ソフィアやトプカプ宮殿が歴史を伝える。", "cat": "culture", "star": true}, {"id": 7, "name": "ロドス島の中世都市", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・1988年", "page": "P211", "primary": "聖ヨハネ騎士団の要塞都市", "kw": "聖ヨハネ騎士団（三大騎士団）が築いた全長4kmの城壁／エジプト・トルコの侵略を撃退／1522年スレイマン大帝の包囲で陥落", "note": "聖ヨハネ騎士団がイスラム勢力に対抗して築いた要塞都市。1522年、オスマン帝国スレイマン大帝の6ヵ月の包囲の末に陥落した。", "cat": "culture", "star": false}, {"id": 8, "name": "モルドヴァ地方の教会群", "region": "ヨーロッパ", "meta": "ルーマニア・文化遺産・1993年", "page": "P212", "primary": "内外壁をフレスコ画で埋め尽くした教会群", "kw": "シュテファン大公がオスマン撃退のたびに建造／内壁も外壁もフレスコ画／キリスト教徒を襲うオスマン兵のモチーフ／中世モルドヴァ美術の最高峰", "note": "シュテファン大公がオスマン帝国を撃退するごとに建てた修道院群。内外壁を埋めるフレスコ画にはオスマンの脅威も描かれる。", "cat": "culture", "star": false}, {"id": 9, "name": "要塞教会のあるトランシルヴァニアの村落", "region": "ヨーロッパ", "meta": "ルーマニア・文化遺産・1993年", "page": "P212", "primary": "教会を城壁で固めた「要塞教会」の村", "kw": "移住したドイツ人（ザクセン人）の7つの村／町全体を要塞化する財力がなく教会だけ城壁で固めた／ビエルタンの三重防壁と15の閂が動く扉", "note": "ドイツ系移民がオスマン帝国の侵攻に備え、教会の周囲だけを城壁で固めた「要塞教会」が残る7つの村。ビエルタンが代表例。", "cat": "culture", "star": false}, {"id": 10, "name": "ブルサとジュマルクズク：オスマン帝国発祥の地", "region": "中東", "meta": "トルコ・文化遺産・2014年", "page": "P213", "primary": "オスマン帝国初期の首都・複合施設キュリエ", "kw": "オスマン帝国初期14世紀の首都／シルク・ロードの西の基点／モスク・マドラサ・ハマム等の複合施設キュリエ／ワクフ制度で設立", "note": "オスマン帝国発祥の地。初期の首都ブルサにはワクフ制度で設立された複合施設キュリエが残り、ジュマルクズクは農村の面影を残す。", "cat": "culture", "star": false}, {"id": 11, "name": "ヴィシェグラードのメフメド・パシャ・ソコロヴィッチ橋", "region": "ヨーロッパ", "meta": "ボスニア・ヘルツェゴビナ・文化遺産・2007年", "page": "P213", "primary": "宮廷建築家ミマール・スィナン設計の石橋", "kw": "ドリナ川に架かる全長約180m・11アーチ／オスマン帝国の宰相メフメド・パシャが建造／宮廷建築家ミマール・スィナン設計", "note": "オスマン帝国の宰相が16世紀に架けさせた橋。宮廷建築家ミマール・スィナンの設計で、ルネサンス建築に並ぶ技術水準を示す。", "cat": "culture", "star": false}, {"id": 12, "name": "ベラトとギロカストラの歴史地区", "region": "ヨーロッパ", "meta": "アルバニア・文化遺産・2005年", "page": "P213", "primary": "小塔「クレ」つき家屋のオスマン都市", "kw": "オスマン帝国時代の建造物が良好に残る／小塔「クレ」（トルコ語で塔）つき家屋／1階は冬・2階は夏の住み分け", "note": "オスマン帝国時代の街並が残るアルバニアの2都市。防御施設に由来する小塔「クレ」つきの家屋が特徴。", "cat": "culture", "star": false}, {"id": 13, "name": "グレート・ブルカン・カルドゥン山と周辺の聖なる景観", "region": "アジア", "meta": "モンゴル・文化遺産・2015年", "page": "P214", "primary": "チンギス・ハン生誕・埋葬の聖山", "kw": "ヘンティー山脈／ステップとシベリア・タイガが接する／石塚オボーへの崇拝／シャーマニズムと仏教の融合／チンギス・ハンが生まれ没した地と信じられる", "note": "チンギス・ハンが生まれ没した地と信じられる聖山。オボー（石塚）崇拝などシャーマニズムと仏教が融合した聖なる景観。", "cat": "culture", "star": false}, {"id": 14, "name": "オルホン渓谷の文化的景観", "region": "アジア", "meta": "モンゴル・文化遺産・2004年", "page": "P214", "primary": "カラコルム遺跡・オルホン碑文", "kw": "2,000年の遊牧民の歴史／突厥の遺跡／ウイグル王国の都カラバルガスン／モンゴル帝国の首都カラコルム／古代テュルク語のオルホン碑文", "note": "遊牧民2,000年の歴史を伝える渓谷。モンゴル帝国の首都カラコルム遺跡や、古代テュルク語が刻まれたオルホン碑文が残る。", "cat": "culture", "star": false}, {"id": 15, "name": "元の上都遺跡", "region": "アジア", "meta": "中国・文化遺産・2012年", "page": "P215", "primary": "フビライ・ハンの夏の離宮「ザナドゥ」", "kw": "フビライ・ハンが1256年に設けた開平府が前身／夏の離宮／遊牧文明と農耕文明の融合／「東方見聞録」で西洋に伝わり「ザナドゥ」＝桃源郷に", "note": "フビライ・ハンの夏の離宮。遊牧と農耕の文明が融合した都で、「東方見聞録」を通じ西洋で「ザナドゥ」＝桃源郷の代名詞になった。", "cat": "culture", "star": true}]}, {"id": "p15", "title": "⑮ 7/5 テーマ:ヨーロッパの建築", "cards": [{"id": 1, "name": "シャルトルの大聖堂", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1979年", "page": "P286", "primary": "シャルトルブルーのステンドグラス", "kw": "ゴシック建築の最高峰／「聖母の衣」をシャルル2世が寄進／ロマネスクの旧塔とゴシックの新塔／シャルトルブルーの176のステンドグラス", "note": "13世紀完成のゴシック建築の最高峰。「聖母の衣」を納め巡礼者を集めた。青を基調とする176のステンドグラスで名高い。", "cat": "culture", "star": true}, {"id": 2, "name": "ニームのメゾン・カレ", "region": "ヨーロッパ", "meta": "フランス・文化遺産・2023年", "page": "P287", "primary": "皇帝崇拝のコリント式神殿・ほぼ完全に現存", "kw": "ローマ植民地ネマウス／擬似列柱六柱式のコリント式神殿／アウグストゥスの推定継承者に献呈→皇帝崇拝の神殿／共和政から帝政への移行を証明", "note": "1世紀にローマ植民地ネマウスに建てられたコリント式神殿。ほぼ完全な形で現存し、共和政から帝政ローマへの移行を証明する。", "cat": "culture", "star": false}, {"id": 3, "name": "ボイ渓谷のカタルーニャ風ロマネスク様式教会群", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2000年", "page": "P287", "primary": "ピレネー山中の9つのロマネスク教会", "kw": "標高2,000mの谷あい／イスラム勢力が及ばずキリスト教会が多数建設／フレスコ画で有名なタウル村のサン・クリメン教会／9棟の教会・礼拝堂", "note": "ピレネー山中のボイ渓谷に残るロマネスク様式の教会群。イスラム勢力が及ばなかった谷で、サン・クリメン教会などが登録された。", "cat": "culture", "star": false}, {"id": 4, "name": "ヴァッセのアポロン・エピクリオス神殿", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・1986年", "page": "P288", "primary": "ドーリア・イオニア・コリント3様式の融合", "kw": "太陽と治癒の神アポロンに献呈／疫病や侵略から守った感謝／列柱にドーリア式・イオニア式・コリント式が融合／18世紀に再発見", "note": "疫病から守られた感謝でアポロン神に捧げられた神殿。列柱に3様式が融合するギリシャ古典期後半の革新的設計を示す。", "cat": "culture", "star": false}, {"id": 5, "name": "フォントネーのシトー会修道院", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1981年", "page": "P288", "primary": "シトー会最古・装飾のない簡素な修道院", "kw": "シトー会最古の修道院／フランス革命の破壊を免れた／製紙工場として使われ損傷→20世紀に修復／禁欲的で過剰な装飾は一切なし", "note": "シトー会最古の修道院。祈りと瞑想を重んじる禁欲的な理想を反映し、聖母像と祭壇だけの簡素なつくりが特徴。", "cat": "culture", "star": false}, {"id": 6, "name": "トゥルネーのノートル・ダム大聖堂", "region": "ヨーロッパ", "meta": "ベルギー・文化遺産・2000年", "page": "P288", "primary": "ロマネスクとゴシックが混在する大聖堂", "kw": "1130年ロマネスク様式で着工／1243年から他地域に先駆けゴシック様式で改築／3層アーチの身廊と5つの尖塔", "note": "ロマネスク様式で建て始められ、途中からゴシック様式で改築された大聖堂。3層アーチの身廊と5つの尖塔に両様式が混在する。", "cat": "culture", "star": false}, {"id": 7, "name": "ダフニ、オシオス・ルカス、ヒオスのネア・モニの修道院群", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・1990年", "page": "P290", "primary": "ビザンツ美術第二黄金期の金箔モザイク", "kw": "離れた3修道院が同じ建築様式を共有／内接十字形の平面プラン／スキンチ様式のドーム天井／金箔背景の大理石モザイク画", "note": "離れた場所にある3つの修道院が同じ建築様式を共有。金箔背景のモザイク画は「ビザンツ美術第二期黄金期」を代表する。", "cat": "culture", "star": false}, {"id": 8, "name": "ブレナム宮殿", "region": "ヨーロッパ", "meta": "英国・文化遺産・1987年", "page": "P290", "primary": "マールバラ公への恩賞・英国バロックの代表", "kw": "ブレンハイムの戦いの勝利でアン女王がマールバラ公チャーチル将軍に下賜／ジョン・ヴァンブラが17年かけ完成／ランスロット・ブラウンのイギリス式庭園", "note": "戦勝の恩賞としてアン女王がマールバラ公に与えた英国バロック建築の代表。庭園は後にイギリス式につくりかえられた。", "cat": "culture", "star": false}, {"id": 9, "name": "レーゲンスブルク旧市街とシュタットアムホーフ", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2006年", "page": "P291", "primary": "神聖ローマ帝国議会がおかれたドナウ河畔都市", "kw": "17世紀半ば〜19世紀初頭に神聖ローマ帝国議会／ドイツ現存最古の石橋／古代ローマの要塞から中世建築まで／対岸のシュタットアムホーフ", "note": "神聖ローマ帝国議会がおかれたドナウ河畔の都市。ドイツ最古の石橋や大聖堂など、各時代の建築様式が残る。", "cat": "culture", "star": false}, {"id": 10, "name": "トマールのキリスト騎士団の修道院", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・1983年", "page": "P291", "primary": "テンプル騎士団が建てたポルトガル最大の修道院", "kw": "12世紀末にテンプル騎士団が建設／5世紀にわたる増改築で各時代の様式美／マヌエル様式の豪華な彫刻の大窓", "note": "テンプル騎士団が建てたポルトガル最大規模の修道院。5世紀の増改築で各様式が重なり、マヌエル様式の大窓が名高い。", "cat": "culture", "star": false}, {"id": 11, "name": "シュヴェリーンの邸宅群", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2024年", "page": "P292", "primary": "歴史主義様式・ヨハン・アルブレヒト様式", "kw": "シュヴェリーン湖畔／メクレンブルク＝シュヴェリーン大公国の首都／ネオ・バロックやネオ・ゴシック／地域固有のネオ・ルネサンス「ヨハン・アルブレヒト様式」", "note": "大公国の首都として19世紀に整備された歴史主義様式の建築群。地域固有の「ヨハン・アルブレヒト様式」が特徴。", "cat": "culture", "star": false}, {"id": 12, "name": "プスコフ建築派の教会群", "region": "ヨーロッパ", "meta": "ロシア・文化遺産・2019年", "page": "P292", "primary": "立方体形状とドームのプスコフ建築派", "kw": "ヴェリーカヤ川沿いの都市／立方体的な形状・張り出した屋根のポーチ・鐘楼／ビザンツとノヴゴロドの影響／15〜16世紀に最盛期", "note": "ロシア北西部プスコフの建築派による教会群。立方体的な形状やポーチ、鐘楼が特徴で、15〜16世紀に最盛期を迎えた。", "cat": "culture", "star": false}, {"id": 13, "name": "パレルモのアラブ・ノルマン様式の建造物群と、チェファルとモンレアーレの大聖堂", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2015年", "page": "P292", "primary": "ノルマン・シチリア王国のアラブ・ノルマン様式", "kw": "1130〜1194年のノルマン・シチリア王国／ルッジェーロ2世のチェファル大聖堂／モンレアーレ大聖堂／9つの歴史的建造物", "note": "シチリア島に短期間栄えたノルマン・シチリア王国の建造物群。イスラムとノルマンの文化が融合した様式を伝える。", "cat": "culture", "star": false}, {"id": 14, "name": "ウルネスの木造教会", "region": "ヨーロッパ", "meta": "ノルウェー・文化遺産・1979年", "page": "P293", "primary": "スターヴヒルケの最高傑作", "kw": "ノルウェー最古の木造教会（12世紀前半）／釘やネジを使わないヴァイキング時代の工法スターヴヒルケ／約1,300棟中現存28棟／聖オーラヴのキリスト教化", "note": "フィヨルドを見下ろす崖に立つノルウェー最古の木造教会。ヴァイキングの伝統工法スターヴヒルケの最高傑作とされる。", "cat": "culture", "star": true}, {"id": 15, "name": "キージ島の木造教会と集落", "region": "ヨーロッパ", "meta": "ロシア・文化遺産・1990年", "page": "P293", "primary": "葱坊主形ドーム22のプレオブラジェンスカヤ教会", "kw": "オネガ湖に浮かぶ島／釘を用いない複雑な木組み／プレオブラジェンスカヤ教会／ロシア正教の葱坊主形ドームが22", "note": "オネガ湖上の島に残る釘を使わない木造教会。代表のプレオブラジェンスカヤ教会は葱坊主形ドームを22も頂く木の芸術。", "cat": "culture", "star": true}]}, {"id": "p16", "title": "⑯ 7/5 テーマ:庭園の遺産", "cards": [{"id": 1, "name": "クロムニェジーシュの庭園と宮殿", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1998年", "page": "P306", "primary": "ポンペイの柱廊・快楽の庭園", "kw": "オロモウツ司教の居城として発展／ゴシック→バロックに改築された宮殿／ポンペイの彫刻を配した「ポンペイの柱廊」／後期ルネサンス様式の「快楽の庭園」", "note": "中欧を代表するバロック都市の宮殿と庭園。宮殿は洞窟で庭園とつながり、「ポンペイの柱廊」や「快楽の庭園」が残る。", "cat": "culture", "star": false}, {"id": 2, "name": "ヴィルヘルムスヘーエ丘陵公園", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・2013年", "page": "P307", "primary": "水が主役のヨーロッパ最大規模の丘陵公園", "kw": "ヘッセン・カッセル方伯カール伯爵が着手／水圧・空気圧で斜面の水路に給水／バロック様式の水の劇場／350mの滝", "note": "カッセルにあるヨーロッパ最大規模の丘陵公園。水圧を駆使して斜面の水路へ水を送り、水の劇場や350mの滝を流れ落ちる。", "cat": "culture", "star": false}, {"id": 3, "name": "ティヴォリのエステ家別荘", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2001年", "page": "P307", "primary": "500の噴水・水圧で自動演奏するオルガンの噴水", "kw": "枢機卿イッポリート・デステの邸宅／建築家ピッロ・リゴーリオが庭園造営／大小500の噴水／水圧で自動演奏する「オルガンの噴水」", "note": "枢機卿デステの別荘。大小500の噴水をもつルネサンス庭園の代表作で、水圧で自動演奏する「オルガンの噴水」が名高い。", "cat": "culture", "star": true}, {"id": 4, "name": "トスカーナのメディチ家の別荘と庭園", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2013年", "page": "P308", "primary": "ルネサンスを支援したメディチ家の12別荘", "kw": "トスカーナ大公国の君主メディチ家／12の別荘と2つの庭園／農園とも城館とも異なる革新的な邸宅／芸術保護が近代欧州文化に影響", "note": "フィレンツェを支配しルネサンスを支援したメディチ家の別荘群。農園とも城館とも異なる革新的な形と機能を備えた。", "cat": "culture", "star": false}, {"id": 5, "name": "ファウンテンズ修道院の廃墟のあるスタッドリー・ロイヤル公園", "region": "ヨーロッパ", "meta": "英国・文化遺産・1986年", "page": "P308", "primary": "修道院の廃墟を活かした造園・ナショナル・トラスト", "kw": "シトー会のファウンテンズ修道院／ヘンリー8世の修道院解散令で廃墟に／エイズラビー親子が廃墟を活かして造園／ナショナル・トラスト所有", "note": "ヘンリー8世の解散令で廃墟となった修道院を、18世紀に親子が買い取り雰囲気を活かして造園した公園。現在はナショナル・トラストが所有。", "cat": "culture", "star": false}, {"id": 6, "name": "マフラの王家の建物：宮殿、バシリカ、修道院、セルコ庭園、狩猟公園（タパダ）", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・2019年", "page": "P308", "primary": "ジョアン5世のバロック建造物群・3万6千冊の図書館", "kw": "ジョアン5世が1711年に建設／ローマ・バロック様式のバシリカ／3万6,000冊の図書館／セルコ庭園と狩猟公園タパダで幾何学構成が完成", "note": "ジョアン5世が築いた宮殿・修道院・庭園の複合体。ポルトガル帝国の権力を象徴し、3万6,000冊を収める図書館をもつ。", "cat": "culture", "star": false}, {"id": 7, "name": "ペルシア庭園", "region": "中東", "meta": "イラン・文化遺産・2011年", "page": "P309", "primary": "エデンの園を具現化・ゾロアスター教の4要素", "kw": "イラン9ヵ所の庭園の総称／キュロス2世（大キュロス）の時代にルーツ／ゾロアスター教の「空・大地・水・植物」の4要素／乾燥気候に適合", "note": "エデンの園を具現化したとされるイラン9ヵ所の庭園。ゾロアスター教が重視した空・大地・水・植物の4要素で構成される。", "cat": "culture", "star": true}, {"id": 8, "name": "ゴレスタン宮殿", "region": "中東", "meta": "イラン・文化遺産・2013年", "page": "P309", "primary": "カージャール朝の最高傑作・西洋と融合", "kw": "カージャール朝時代の最高傑作／テヘラン遷都後の行政中心地／欧州の建築技術とペルシア工芸の融合の成功例", "note": "テヘランにあるカージャール朝の最高傑作。18世紀欧州の建築技術と伝統的なペルシア工芸を融合させた新様式の代表例。", "cat": "culture", "star": false}, {"id": 9, "name": "ラホール城とシャーラマール庭園", "region": "アジア", "meta": "パキスタン・文化遺産・1981年", "page": "P309", "primary": "アクバル帝の城とシャー・ジャハーンの泉水庭園", "kw": "ムガル帝国3代アクバル帝がラホール城を建設／白大理石の「真珠のモスク」／「40本柱の間」／シャーラマール庭園は5代シャー・ジャハーンのペルシア式泉水庭園", "note": "ムガル帝国アクバル帝が築いた城と、シャー・ジャハーンが造営した典型的なペルシア式泉水庭園。真珠のモスクが残る。", "cat": "culture", "star": false}, {"id": 10, "name": "シーギリヤの古代都市", "region": "アジア", "meta": "スリランカ・文化遺産・1982年", "page": "P310", "primary": "シーギリヤ・ロックの天空要塞・シーギリヤ・レディ", "kw": "カッサパ1世が岩山の上に建設した要塞都市／アジア最古級の「水の庭園」／テンペラ画の壁画シーギリヤ・レディ", "note": "シンハラ王カッサパ1世が岩山上に築いた要塞都市。ふもとの「水の庭園」はアジア最古級で、壁画シーギリヤ・レディが残る。", "cat": "culture", "star": true}, {"id": 11, "name": "蘇州の園林", "region": "アジア", "meta": "中国・文化遺産・1997年", "page": "P310", "primary": "中国四大名園の拙政園・留園", "kw": "官僚や豪商・文人が私的に築いた古典庭園群（9庭園）／水を利用した池が中心／明朝様式として各地に波及／四大名園の拙政園と留園（巨岩・冠雲峰）", "note": "官僚や文人が私的に築いた蘇州の古典庭園群。池を中心とする様式は明朝様式として広まり、拙政園と留園は中国四大名園。", "cat": "culture", "star": true}, {"id": 12, "name": "承徳の避暑山荘と外八廟", "region": "アジア", "meta": "中国・文化遺産・1994年", "page": "P310", "primary": "清朝皇帝の避暑地・中国全土の縮図", "kw": "康熙帝が着工し乾隆帝が完成／江南の水郷と北方の草原を再現した中国全土の縮図／外八廟はチベット様式で少数民族との融和", "note": "歴代清朝皇帝の避暑地。中国全土の縮図といえる景観をもち、周辺の寺廟群・外八廟はチベット様式で民族融和を示す。", "cat": "culture", "star": false}, {"id": 13, "name": "昌徳宮", "region": "アジア", "meta": "韓国・文化遺産・1997年", "page": "P311", "primary": "景福宮の離宮・秘苑", "kw": "朝鮮王朝3代太宗が景福宮の離宮として建設／文禄の役で焼失→再建後270年間法宮／韓国最古の木造二層式門・敦化門／自然と調和した庭園「秘苑」", "note": "朝鮮王朝の離宮。文禄の役で焼失後に再建され約270年法宮として使用。自然と調和した庭園「秘苑」が名高い。", "cat": "culture", "star": false}, {"id": 14, "name": "山寺（サンサ）：韓国の山岳僧院群", "region": "アジア", "meta": "韓国・文化遺産・2018年", "page": "P311", "primary": "7つの山岳僧院・屋根のない中庭マダン", "kw": "7〜9世紀創建の7寺院（通度寺・浮石寺・法住寺など）／仏殿・あずまや・講堂・宿舎に囲まれた「マダン（屋根のない中庭）」", "note": "7〜9世紀に創建された韓国仏教の山岳僧院群。4つの建物に囲まれた韓国特有の中庭「マダン」をもつ。", "cat": "culture", "star": false}, {"id": 15, "name": "ホベルト・ブールリ・マルクスの庭園", "region": "南米", "meta": "ブラジル・文化遺産・2021年", "page": "P311", "primary": "絵画の美学を取り入れた熱帯の風景式庭園", "kw": "リオ・デ・ジャネイロ西方／ランドスケープ・アーキテクトのマルクスが40年以上開発／絵画の美学＋在来の熱帯植物／現代の熱帯庭園に影響", "note": "芸術家マルクスが40年以上かけて開発した風景式庭園。絵画の美学とモダニズム、熱帯植物を融合し現代の熱帯庭園に影響を与えた。", "cat": "culture", "star": false}]}, {"id": "p17", "title": "⑰ 7/5 テーマ:文化的景観", "cards": [{"id": 1, "name": "オルチア渓谷", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2004年", "page": "P152", "primary": "シエナが開墾した糸杉の田園風景", "kw": "都市国家シエナが14〜15世紀に開墾／商人の富で石灰質土壌を農地に改良／円錐形の丘と糸杉の並木／人間の開発が自然美を高めた理想例", "note": "都市国家シエナが開墾した田園風景。薄緑の農地と濃緑の糸杉の対照が美しく、開発が自然美を高めた理想例とされる。", "cat": "culture", "star": true}, {"id": 2, "name": "アル・アハサ・オアシス：進化する文化的景観", "region": "中東", "meta": "サウジアラビア・文化遺産・2018年", "page": "P153", "primary": "ナツメヤシ250万本・世界最大のオアシス", "kw": "アラビア半島東部／新石器時代から数千年の定住／約250万本のナツメヤシ／世界最大のオアシス／12の構成資産", "note": "新石器時代から人類が定住してきた世界最大のオアシス。約250万本のナツメヤシが今も生育し、進化を続けている。", "cat": "culture", "star": false}, {"id": 3, "name": "ホルトバージ国立公園：プスタ（大平原）", "region": "ヨーロッパ", "meta": "ハンガリー・文化遺産・1999年", "page": "P153", "primary": "プスタの放牧・灰色牛と9アーチの石橋", "kw": "ドナウ川とティサ川流域の大平原プスタ／ラツカ羊と灰色牛の放牧（灰色牛は重要な輸出品）／ハンガリー最長の9アーチの石橋", "note": "中世以来の放牧地プスタ（大平原）。灰色牛は19世紀まで重要な輸出品で、ハンガリー最長の9アーチ石橋も残る。", "cat": "culture", "star": false}, {"id": 4, "name": "ヴェガエイヤン：ヴェガ群島", "region": "ヨーロッパ", "meta": "ノルウェー・文化遺産・2004年", "page": "P153", "primary": "ケワタガモの羽毛産業の島々", "kw": "北緯66度・6,500の島々／ケワタガモの営巣小屋／羽毛の売買が9世紀から重要産業／漁村・波止場・灯台の文化的景観", "note": "ノルウェー沿岸の6,500の島々。9世紀からケワタガモの羽毛売買が重要産業で、営巣小屋などが自然に溶け込む景観をつくる。", "cat": "culture", "star": false}, {"id": 5, "name": "ゲデオの文化的景観", "region": "アフリカ", "meta": "エチオピア・文化遺産・2023年", "page": "P154", "primary": "エンセーテのアグロフォレストリー", "kw": "ゲデオ族の森林農業（アグロフォレストリー）／主食エンセーテ（ニセバナナ）の下でコーヒー栽培／聖なる森林と巨石記念物群", "note": "ゲデオ族が数千年続けてきた森林農業の景観。主食エンセーテの下でコーヒーを育て、聖なる森と巨石記念物が点在する。", "cat": "culture", "star": false}, {"id": 6, "name": "キナリグ人の文化的景観と移牧の道「カッチ・ヨル」", "region": "中東", "meta": "アゼルバイジャン・文化遺産・2023年", "page": "P154", "primary": "200kmの移牧の道・垂直移牧", "kw": "大コーカサス高地の夏季牧草地と低地の冬季牧草地／200kmの移牧の道カッチ・ヨル／古代から続く長距離の垂直移牧", "note": "キナリグ人が季節で高地と低地を移動する移牧の伝統を伝える景観。200kmの道「カッチ・ヨル」が牧草地を結ぶ。", "cat": "culture", "star": false}, {"id": 7, "name": "ライティング・オン・ストーン／アイシナイピ", "region": "北中米", "meta": "カナダ・文化遺産・2019年", "page": "P154", "primary": "ブラックフット族のロック・アート・フードゥー", "kw": "グレートプレーンズ北端のミルク川渓谷／アイシナイピ＝描かれたの意／円柱状の岩フードゥー／約4,500年前からのロック・アート", "note": "先住民ブラックフット族が砂岩壁に聖なる伝言を刻んだ地。円柱状の奇岩フードゥーと約4,500年分のロック・アートが残る。", "cat": "culture", "star": false}, {"id": 8, "name": "ザゴリの文化的景観", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・2023年", "page": "P155", "primary": "石造りの村々と石のアーチ橋のネットワーク", "kw": "エピルス地方の山岳地帯／プラタナスの中央広場と聖なる森／石灰岩積みの伝統建築／石のアーチ橋・石畳が村々を結ぶ／海外移住者の送金でインフラ整備", "note": "ギリシャ山岳部の石造りの村々。石のアーチ橋や石畳が村を結び、18〜19世紀には海外移住者の送金でインフラが整備された。", "cat": "culture", "star": false}, {"id": 9, "name": "ロワール渓谷：シュリー・シュル・ロワールからシャロンヌまで", "region": "ヨーロッパ", "meta": "フランス・文化遺産・2000年", "page": "P156", "primary": "ルネサンス城館が連なる約280kmの流域", "kw": "ロワール川の約280kmが登録範囲／貴族が競って築いたルネサンス様式の城館群／丘陵とブドウ畑／中世からの思想的変遷を読み取れる", "note": "ルネサンス期の城館が点在するロワール川流域約280km。城館と景観から啓蒙主義へ至る西欧の思想的変遷が読み取れる。", "cat": "culture", "star": true}, {"id": 10, "name": "シントラの文化的景観", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・1995年", "page": "P156", "primary": "王族の離宮の街・ムーア人の城跡の王宮", "kw": "イベリア半島最西端／アフォンソ1世のリスボン奪回後キリスト教徒の街に／代々の王族が離宮／ムーア人の城跡に建つ王宮", "note": "ポルトガル王族が代々離宮をおいた避暑の街。中心部の王宮はムーア人の城の跡地に建てられたと考えられている。", "cat": "culture", "star": false}, {"id": 11, "name": "ケブラーダ・デ・ウマウアカ", "region": "南米", "meta": "アルゼンチン・文化遺産・2003年", "page": "P157", "primary": "インカの要塞集落プカラが残る交易渓谷", "kw": "グランデ川の侵食による全長155kmの渓谷／時代を問わず交易路として重視／先史時代の集落跡／インカ帝国の要塞集落プカラ", "note": "アンデスの全長155kmの渓谷。古来の交易路で、先史時代の集落跡からインカ帝国の要塞集落プカラまで各時代の遺跡が残る。", "cat": "culture", "star": false}, {"id": 12, "name": "アル・ファーウ考古地域の文化的景観", "region": "中東", "meta": "サウジアラビア・文化遺産・2024年", "page": "P157", "primary": "乾燥化で放棄された古代都市・聖山カシュム・カリヤ", "kw": "旧石器時代から5世紀まで継続的に居住／乾燥化と水資源枯渇で放棄／約1万2,000点の考古遺構／聖山カシュム・カリヤ／隊商宿とオアシス", "note": "湿潤な旧石器時代から乾燥化で放棄される5世紀まで、人類の環境適応を示す遺跡群。聖山や隊商宿、古代都市の遺構が残る。", "cat": "culture", "star": false}, {"id": 13, "name": "ル・モルヌの文化的景観", "region": "アフリカ", "meta": "モーリシャス・文化遺産・2008年", "page": "P157", "primary": "逃亡奴隷（マルーン）が隠れ住んだ岩山", "kw": "脱走した奴隷が身を隠した岩山／逃亡奴隷＝マルーン／山頂や洞窟で密かに生活／奴隷たちの抵抗の象徴", "note": "18〜19世紀に逃亡奴隷（マルーン）が隠れ住んだ岩山。自由のために闘った奴隷たちの抵抗の象徴として記憶されている。", "cat": "culture", "star": true}]}, {"id": "p18", "title": "⑱ 7/5 テーマ:道の遺産", "cards": [{"id": 1, "name": "サンティアゴ・デ・コンポステーラの巡礼路: カミノ・フランセスとスペイン北部の道", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1993年", "page": "P174", "primary": "カミノ・フランセス（フランス人の道）738km", "kw": "カミノ・フランセス＝フランス人の道（738km）／2015年に北の道・原初の道など「スペイン北部の道」を拡大登録／パンプローナやレオンを通過", "note": "聖地サンティアゴへ向かうスペイン側の巡礼路。フランス人が多く歩いたカミノ・フランセスに、北部の道が拡大登録された。", "cat": "culture", "star": false}, {"id": 2, "name": "フランスのサンティアゴ・デ・コンポステーラの巡礼路", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1998年", "page": "P175", "primary": "トゥールの道など4つの巡礼路・巡礼橋", "kw": "トゥール・リモージュ・ル・ピュイ・トゥールーズの4つの道／64の遺跡と7つの関連施設／ロマネスク最大級のサン・セルナン教会／巡礼橋", "note": "ピレネーを越えて聖地へ通じるフランス側の4つの巡礼路。沿道の64遺跡が登録され、サン・セルナン教会や巡礼橋を含む。", "cat": "culture", "star": false}, {"id": 3, "name": "サンティアゴ・デ・コンポステーラ（旧市街）", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1985年", "page": "P175", "primary": "キリスト教三大巡礼地・聖ヤコブの墓", "kw": "キリスト教三大巡礼地／聖ヤコブ（スペイン語でサンティアゴ）が眠る大聖堂／チュリゲラ様式のファサード／彫刻家マテオの「栄光の門」", "note": "聖ヤコブの墓の上に築かれたキリスト教三大巡礼地のひとつ。大聖堂はチュリゲラ様式のファサードと「栄光の門」をもつ。", "cat": "culture", "star": true}, {"id": 4, "name": "ヴェズレーの教会と丘", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1979年", "page": "P176", "primary": "マグダラのマリアを祀るサント・マドレーヌ教会", "kw": "マグダラのマリアの聖遺物を祀る／サント・マドレーヌ教会／円柱のレリーフ「神秘の粉ひき」／タンパンの「使徒に使命を与えるキリスト」はロマネスク彫刻の傑作", "note": "マグダラのマリアの聖遺物を祀る教会がある丘の街。巡礼路上にあり、タンパンの彫刻はロマネスクの傑作とされる。", "cat": "culture", "star": false}, {"id": 5, "name": "ピレネー山脈のペルデュ山", "region": "ヨーロッパ", "meta": "スペイン・フランス・複合遺産・1997年", "page": "P176", "primary": "石灰岩の欧州最高峰・圏谷ガヴァルニー", "kw": "標高3,352m・石灰岩の山として欧州最高峰／欧州最大かつ最深の2つの渓谷／今も続く移牧／氷河がつくった圏谷（カール）", "note": "仏西にまたがる石灰岩の欧州最高峰。欧州最大級の渓谷と氷河がつくった圏谷が広がり、スペイン側では移牧が今も続く。", "cat": "mixed", "star": false}, {"id": 6, "name": "アッピア街道: レジーナ・ヴィアルム（街道の女王）", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2024年", "page": "P177", "primary": "ローマ最古の軍事街道・街道の女王", "kw": "紀元前312年からの建設／ローマ帝国最古かつ最重要の街道／監察官アッピウス・クラウディウスが整備／ローマ〜ブリンディジ全長800km", "note": "紀元前312年に監察官アッピウスが整備を始めたローマ最古の街道。ローマからブリンディジまで800kmに及び「街道の女王」と呼ばれた。", "cat": "culture", "star": false}, {"id": 7, "name": "シルクロード: ザラフシャン・カラクム回廊", "region": "アジア", "meta": "ウズベキスタン・タジキスタン・トルクメニスタン・文化遺産・2023年", "page": "P177", "primary": "サマルカンドからメルヴへ・交易路の交差点", "kw": "サマルカンドやブハラのオアシス都市を経てメルヴへ／天山回廊など複数の交易路と接続する要衝／サマルカンド等の都市自体は本遺産に含まれない", "note": "シルクロードの重要区間。オアシス都市を結び複数の交易路が交差する要衝だったが、サマルカンド等の都市は含まれない。", "cat": "culture", "star": false}, {"id": 8, "name": "シルクロード: 長安から天山回廊の交易網", "region": "アジア", "meta": "中国・カザフスタン・キルギス・文化遺産・2014年", "page": "P177", "primary": "長安から中央アジアへ約5,000km・中継交易", "kw": "漢・唐の都、長安と洛陽から天山回廊へ／約5,000kmが登録／キャラバンが都市から都市へ運ぶ「中継交易」／16世紀まで文化・宗教交流に影響", "note": "長安・洛陽から中央アジアに至るシルクロード約5,000km。キャラバンが都市間を繋ぐ「中継交易」で文化と宗教が行き交った。", "cat": "culture", "star": false}, {"id": 9, "name": "アルブラとベルニナの景観とレーティッシュ鉄道", "region": "ヨーロッパ", "meta": "スイス・イタリア・文化遺産・2008年", "page": "P178", "primary": "アルプス越え最高地点2,253mの高山鉄道", "kw": "スイスの私鉄レーティッシュ鉄道のアルブラ線・ベルニナ線／高山鉄道最高の標高2,253m／13のトンネルと52の橋梁／20世紀初頭の最高レベルの技術", "note": "アルプスを越える高山鉄道。ベルニナ線は標高2,253mを通過し、20世紀初頭の山岳鉄道建設の最高技術を示す。", "cat": "culture", "star": false}, {"id": 10, "name": "京杭大運河", "region": "アジア", "meta": "中国・文化遺産・2014年", "page": "P179", "primary": "隋の煬帝が整備・北京と杭州を結ぶ", "kw": "隋の煬帝が通済渠などを開削し運河を連結／政治の華北と穀倉の華南を結ぶ／総延長2,000km以上／一部は現在も輸送路", "note": "北京から杭州まで中国を南北に縦断する大運河。隋の煬帝が整備し、華北と華南を結んで経済発展に貢献。一部は今も現役。", "cat": "culture", "star": true}, {"id": 11, "name": "ネゲヴにある香料の道と砂漠都市群", "region": "中東", "meta": "イスラエル・文化遺産・2005年", "page": "P181", "primary": "乳香・没薬を運んだナバテア人の交易路", "kw": "アラビア半島と地中海を結ぶ香料交易路／乳香と没薬／ナバテア（ナバタイ）人が整備／ハルザ・マムシト・シヴタ・アヴダトの4砂漠都市", "note": "乳香や没薬を運ぶためナバテア人が整備した交易路。ハルザなど4つの砂漠都市と隊商宿、灌漑システムが登録された。", "cat": "culture", "star": false}, {"id": 12, "name": "カパック・ニャン: アンデスの道", "region": "南米", "meta": "ペルーほか6ヵ国・文化遺産・2014年", "page": "P181", "primary": "インカの道路網・総延長3万km", "kw": "6ヵ国273構成資産のトランスバウンダリー・サイト／総延長3万km／インカの通信・交易・防衛の交通網／首都クスコの広場から始まる", "note": "インカの人々が築いた総延長3万kmの道路網。6ヵ国にまたがり、雪山から海岸、砂漠までを結んだ。クスコの広場が起点。", "cat": "culture", "star": true}, {"id": 13, "name": "カミノ・レアル・デ・ティエラ・アデントロ - メキシコ内陸部の王の道", "region": "北中米", "meta": "メキシコ・文化遺産・2010年", "page": "P181", "primary": "銀の道・サカテカスの銀を運んだ王立道路", "kw": "スペイン王立道路／銀の運搬から「銀の道」／サカテカスやグアナフアトの銀山／銀精錬用の水銀も輸送", "note": "メキシコ内陸部のスペイン王立道路。銀山の銀と精錬用の水銀を運んだことから「銀の道」と呼ばれた。", "cat": "culture", "star": false}]}, {"id": "p19", "title": "⑲ 7/5 テーマ:天文学と学術", "cards": [{"id": 1, "name": "ジョドレルバンク天文台", "region": "ヨーロッパ", "meta": "英国・文化遺産・2019年", "page": "P338", "primary": "世界最大規模の電波天文観測所・ラヴェル望遠鏡", "kw": "マンチェスター郊外／天文物理学者バーナード・ラヴェル／路面電車の電気的影響を避けて移転／直径76mのラヴェル望遠鏡／クエーサーの発見", "note": "世界最大規模の電波天文観測所。路面電車の電磁ノイズを避けて移転した施設で、直径76mのラヴェル望遠鏡がクエーサー発見などに貢献。", "cat": "culture", "star": false}, {"id": 2, "name": "海事都市グリニッジ", "region": "ヨーロッパ", "meta": "英国・文化遺産・1997年", "page": "P339", "primary": "本初子午線・グリニッジ天文台", "kw": "イギリスの海の玄関／1675年建造のバロック様式グリニッジ天文台／恒星図を基に位置と時間を定めた／1884年に経度0度の本初子午線の基点に", "note": "海洋王国イギリスの表玄関だった海事都市。グリニッジ天文台は1884年の国際会議で経度0度・本初子午線の基点と定められた。", "cat": "culture", "star": true}, {"id": 3, "name": "ブルー・ナ・ボーニャ：ボイン渓谷の考古遺跡群", "region": "ヨーロッパ", "meta": "アイルランド・文化遺産・1993年", "page": "P339", "primary": "冬至の陽光が届くニューグレンジの石室墓", "kw": "紀元前3000年頃のアイルランド最大の先史遺跡／ニューグレンジ・ノウス・ダウスの3大石室墓／冬至の日に入口から石室へ陽光が届く／渦巻き文様はケルトに影響", "note": "アイルランド最大の先史遺跡。ニューグレンジの石室墓は冬至の朝日が奥まで届く設計で、正確な天文知識を示す。", "cat": "culture", "star": true}, {"id": 4, "name": "カザン連邦大学の天体観測所群", "region": "ヨーロッパ", "meta": "ロシア・文化遺産・2023年", "page": "P340", "primary": "稼働中では世界唯一の屈折式ヘリオメーター", "kw": "タタールスタン共和国カザン／1837年のカザン市天文台とドーム付き3つの塔／郊外のエンゲルハルト天文台／世界唯一稼働中の屈折式ヘリオメーター望遠鏡", "note": "19〜20世紀初頭の光学天文学の発展を示す2つの天文台。エンゲルハルト天文台には世界唯一稼働中の屈折式ヘリオメーターが残る。", "cat": "culture", "star": false}, {"id": 5, "name": "ジャイプールのジャンタル・マンタル−マハラジャの天文台", "region": "アジア", "meta": "インド・文化遺産・2010年", "page": "P341", "primary": "巨大日時計サムラート・ヤントラ", "kw": "マハラジャのジャイ・シング2世が5ヵ所に建設した最大のもの／肉眼での天体観測／2秒単位で計れる巨大日時計サムラート・ヤントラ", "note": "藩王ジャイ・シング2世が建てた18世紀の天体観測施設。2秒単位で時を計る巨大日時計サムラート・ヤントラなどが残る。", "cat": "culture", "star": false}, {"id": 6, "name": "トルンの中世都市", "region": "ヨーロッパ", "meta": "ポーランド・文化遺産・1997年", "page": "P341", "primary": "コペルニクス生誕の町屋", "kw": "ヴィスワ川沿いの交易・行政中心地／ゴシック様式の教区教会と中世レンガ造りの町屋／1473年にコペルニクスが生まれた町屋が博物館に", "note": "中世の交易都市。レンガ造りの町屋が残り、天文学者コペルニクスが生まれたとされる町屋は博物館になっている。", "cat": "culture", "star": true}, {"id": 7, "name": "文化交差路サマルカンド", "region": "アジア", "meta": "ウズベキスタン・文化遺産・2001年", "page": "P342", "primary": "青の都・ウルグ・ベクの天文台", "kw": "シルクロードの要衝「青の都」／ティムール朝の首都として再興／レギスタン広場のモスクとマドラサ／4代君主ウルグ・ベクが天文台で精緻な星表を完成", "note": "ティムール朝の首都として栄えた「青の都」。ティムールの孫ウルグ・ベクは天文台を築き、精緻な星表を完成させた。", "cat": "culture", "star": true}, {"id": 8, "name": "アフラージュ：オマーンの灌漑システム", "region": "中東", "meta": "オマーン・文化遺産・2006年", "page": "P342", "primary": "天文観測で水を公平分配する灌漑ファラジ", "kw": "井戸の底を横穴でつなぐ灌漑ファラジ（約3,000）／天文観測を基に運営／日時計で各水路への配水時間を管理／代表的な5つが登録", "note": "井戸を横穴でつなぐオマーンの灌漑システム。天文観測と日時計で配水時間を管理し、限られた水を公平に分配してきた。", "cat": "culture", "star": false}, {"id": 9, "name": "リスコ・カイドとグラン・カナリア島の聖なる山々の文化的景観", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2019年", "page": "P342", "primary": "星と大地への信仰・神殿アルモガレン", "kw": "グラン・カナリア島の山岳地帯／北アフリカのベルベル人が到達し隔離環境で独自進化／星や大地への信仰の神殿アルモガレン／季節ごとの祭礼", "note": "ベルベル人由来の文化が隔離環境で独自に進化した島の聖地。星への信仰と結びつく神殿アルモガレンが点在する。", "cat": "culture", "star": false}, {"id": 10, "name": "開城歴史遺跡地区", "region": "アジア", "meta": "北朝鮮・文化遺産・2013年", "page": "P343", "primary": "高麗王朝の都・風水的な配置", "kw": "10〜14世紀の高麗王朝の都／12の歴史的建造物／風水的な配置が高麗の哲学を体現／天文・気象観測所も含む", "note": "高麗王朝の都がおかれた都市。王宮や王陵など12の建造物が登録され、風水的配置に高麗の政治・哲学が表れる。", "cat": "culture", "star": false}, {"id": 11, "name": "登封の歴史的建造物群−天地之中", "region": "アジア", "meta": "中国・文化遺産・2010年", "page": "P343", "primary": "天地の中心・嵩山と少林寺", "kw": "中国の宇宙観で天地の中心／聖山・嵩山（中岳）／周公測景台（日時計）と観星台／9王朝が修復・増築／嵩山少林寺を含む", "note": "中国の伝統的宇宙観で「天地の中心」とされた登封の建造物群。日時計や観星台のほか、名刹・嵩山少林寺も含まれる。", "cat": "culture", "star": false}, {"id": 12, "name": "コインブラ大学：アルタとソフィア", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・2013年", "page": "P335", "primary": "ディニス1世設立・ヨーロッパ最古級の大学", "kw": "1290年にポルトガル王ディニス1世が設立／ヨーロッパ最古の大学のひとつ／丘の上のアルタ地区と下のソフィア地区／アルカソヴァの王宮", "note": "1290年にディニス1世が設立したヨーロッパ最古級の大学。丘の上下のアルタ地区とソフィア地区が登録された。", "cat": "culture", "star": false}]}, {"id": "p20", "title": "⑳ 7/5 テーマ:歴史上の人物（フェリペ2世・ナポレオン他）", "cards": [{"id": 1, "name": "泰山", "region": "アジア", "meta": "中国・複合遺産・1987年", "page": "P227", "primary": "登録基準(i)〜(vii)すべて認められた唯一の遺産", "kw": "登録基準(i)〜(vii)を全て認められた唯一の遺産／中国五岳の筆頭・道教の聖地／始皇帝が行った封禅の儀式／中国三大宮殿のひとつ天貺殿", "note": "中国五岳の筆頭で道教の聖地。始皇帝が天地を祀る封禅を行った。登録基準(i)〜(vii)すべてが認められた唯一の世界遺産。", "cat": "mixed", "star": true}, {"id": 2, "name": "グアナフアトの歴史地区と鉱山", "region": "北中米", "meta": "メキシコ・文化遺産・1988年", "page": "P228", "primary": "世界有数の銀の街・バレンシアナ教会堂", "kw": "16世紀半ばの銀鉱山発見で建設／18世紀に世界有数の銀生産地／フェリペ2世が寄進した聖母像／メキシコ・チュリゲラ様式のバレンシアナ教会堂", "note": "銀鉱山の発見を機に建設されたスペイン植民都市。フェリペ2世寄進の聖母像やチュリゲラ様式の教会堂が残る。", "cat": "culture", "star": false}, {"id": 3, "name": "サンティアゴ・デ・クーバのサン・ペドロ・デ・ラ・ロカ城", "region": "北中米", "meta": "キューバ・文化遺産・1997年", "page": "P228", "primary": "無敵艦隊敗北を機にフェリペ2世が建設した要塞", "kw": "無敵艦隊がイングランドに敗れ防衛強化／フェリペ2世が1590年に建設開始／軍事建築家ファン・バッティスタ・アントネッリ／ルネサンス様式の堅牢さと機能美", "note": "無敵艦隊の敗北を機にフェリペ2世が築かせた要塞。アントネッリ父子の設計で、堅牢さと機能美を併せもつ。", "cat": "culture", "star": false}, {"id": 4, "name": "マドリードのエル・エスコリアール修道院と王立施設", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・1984年", "page": "P228", "primary": "聖ラウレンティウスにちなむ格子型の平面プラン", "kw": "フェリペ2世が建設／聖ラウレンティウス（ロレンソ）の殉教日の戦勝に感謝／鉄格子で火あぶりの殉教にちなむ格子型平面プラン／王宮・神学校・図書館の複合施設", "note": "フェリペ2世が戦勝に感謝して築いた複合施設。火あぶりで殉教した聖ラウレンティウスにちなみ格子型の平面プランをもつ。", "cat": "culture", "star": false}, {"id": 5, "name": "アルマデンとイドリア：水銀鉱山の遺跡", "region": "ヨーロッパ", "meta": "スペイン・スロベニア・文化遺産・2012年", "page": "P229", "primary": "銀精錬のアマルガム法を支えた水銀鉱山", "kw": "近年まで世界最大の水銀鉱山／銀精錬のアマルガム法で水銀需要が増大／フェリペ2世時代の最盛期を支えた／2国にまたがる", "note": "スペインとスロベニアに残る世界最大級の水銀鉱山。アマルガム法による新大陸の銀精錬を支え、スペイン最盛期を裏で支えた。", "cat": "culture", "star": false}, {"id": 6, "name": "ポトシの市街", "region": "南米", "meta": "ボリビア・文化遺産・1987年", "page": "P229", "primary": "セロ・リコ（富山）・世界の銀の半分を産出", "kw": "標高4,000m超の鉱山都市／銀山セロ・リコ（富山）／フェリペ2世が総督フランシスコ・デ・トレドを派遣／約100年で世界の銀産出量の半分（1万5,000t）／2014年危機遺産", "note": "銀山セロ・リコとともに栄えた標高4,000mの都市。約100年で世界の銀産出量の半分を占めた。2014年に危機遺産登録。", "cat": "culture", "star": true}, {"id": 7, "name": "モンバサのフォート・ジーザス", "region": "アフリカ", "meta": "ケニア・文化遺産・2011年", "page": "P229", "primary": "真上から見ると人体の形の要塞", "kw": "ポルトガル人が建設・フェリペ2世の命／軍事建築家カイラティ設計／「神がつくった完全な創造物」＝人間の形を設計に反映／真上から見ると人体の形", "note": "モンバサ港防衛のためポルトガル人が建設した要塞。ルネサンスの理念を反映し、真上から見ると人体の形に似ている。", "cat": "culture", "star": false}, {"id": 8, "name": "シェーンブルン宮殿と庭園", "region": "ヨーロッパ", "meta": "オーストリア・文化遺産・1996年", "page": "P230", "primary": "マリア・テレジアの居城・ケネディとフルシチョフ会談", "kw": "女帝マリア・テレジアが増改築した居城／ナポレオン1世の司令部／ウィーン会議の舞台／1961年ケネディとフルシチョフの会談→ベルリンの壁へ", "note": "マリア・テレジアの居城。ナポレオンの司令部やウィーン会議、そして1961年の米ソ首脳会談の舞台にもなった歴史の証人。", "cat": "culture", "star": true}, {"id": 9, "name": "ヴロツワフの百周年記念ホール", "region": "ヨーロッパ", "meta": "ポーランド・文化遺産・2006年", "page": "P230", "primary": "ライプツィヒの戦い百周年・鉄筋コンクリートの先駆", "kw": "1813年ライプツィヒの戦い（対ナポレオン戦勝）の百周年記念／ドイツ人建築家マックス・ベルク／四つ葉型の対称平面とリブ付きドーム／鉄筋コンクリート大規模建築の先駆", "note": "ナポレオンに勝利したライプツィヒの戦いの百周年を記念して建設された多目的ホール。鉄筋コンクリート大規模建築の先駆的作品。", "cat": "culture", "star": false}, {"id": 10, "name": "ミール城と関連遺産群", "region": "ヨーロッパ", "meta": "ベラルーシ・文化遺産・2000年", "page": "P231", "primary": "ゴシックから増改築を重ねた500年の城郭", "kw": "イリイニチ家が15世紀末に創建／ゴシック→ルネサンス→バロックの融合／ナポレオン戦争の戦火→帝政ロシア下で修復／現在は博物館", "note": "500年以上の歴史をもつ城郭。様式の増改築を重ね、ナポレオン戦争の戦火を経て帝政ロシア下で修復された。", "cat": "culture", "star": false}, {"id": 11, "name": "ビリニュスの歴史地区", "region": "ヨーロッパ", "meta": "リトアニア・文化遺産・1994年", "page": "P231", "primary": "ナポレオンが持ち帰りたがった聖アンナ聖堂", "kw": "リトアニア大公国の政治の中心地／カトリック・正教・モスク・シナゴーグが混在／聖アンナ聖堂をナポレオンが「手に乗せてパリに持って帰りたい」", "note": "リトアニア大公国の中心地で多宗教の施設が混在する。聖アンナ聖堂にはナポレオンが持ち帰りたがったという伝説が残る。", "cat": "culture", "star": false}]}, {"id": "p21", "title": "㉑ 7/5 テーマ:文化財返還問題", "cards": [{"id": 1, "name": "アテネのアクロポリス", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・1987年", "page": "P440", "primary": "エルギン・マーブルの返還要求", "kw": "パルテノン神殿はペルシア戦争勝利を祝いアテナに献呈／彫刻家フェイディアスが総監督／聖堂→モスクに改変・ヴェネツィア軍の攻撃で被害／エルギン伯が持ち出した「エルギン・マーブル」を英国に返還要求", "note": "パルテノン神殿を中心とする建造物群。英外交官エルギン伯が持ち出した彫刻群「エルギン・マーブル」の返還要求が続く。", "cat": "culture", "star": true}, {"id": 2, "name": "ベルリンのムゼウムスインゼル（博物館島）", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1999年", "page": "P441", "primary": "ネフェルティティの胸像・5つの博物館", "kw": "シュプレー川の中州に5つの博物館・美術館／新博物館の「ネフェルティティの胸像」（アメンホテプ4世の妃）／エジプトが1920年代から返還要求", "note": "シュプレー川の中州の複合博物館地区。新博物館の「ネフェルティティの胸像」はエジプトが返還要求を続けている。", "cat": "culture", "star": false}, {"id": 3, "name": "バビロン", "region": "中東", "meta": "イラク・文化遺産・2019年", "page": "P441", "primary": "イシュタル門の実物はベルガモン博物館", "kw": "新バビロニアの首都／ハンムラビ王・ネブカドネザル王の絶頂期／空中庭園／青い釉薬レンガのイシュタル門は独ベルガモン博物館に移築・現地はレプリカ", "note": "新バビロニアの首都だった古代都市。青い釉薬レンガのイシュタル門の実物はドイツの博物館にあり、現地はレプリカ。", "cat": "culture", "star": true}, {"id": 4, "name": "バンチェンの考古遺跡", "region": "アジア", "meta": "タイ・文化遺産・1992年", "page": "P442", "primary": "東南アジア最古級の稲作・赤色彩文土器", "kw": "コラート高原の先史集落跡／東南アジア最古級の稲作の証拠／赤色彩文土器／米軍兵士に贈られた陶器4点が2024年に返還", "note": "東南アジア最古級の稲作の証拠を示す先史集落跡。米軍兵士に贈られていた陶器4点が2024年にタイへ返還された。", "cat": "culture", "star": false}, {"id": 5, "name": "コー・ケー：古代リンガプラもしくはチョック・ガルギャーの考古遺跡", "region": "アジア", "meta": "カンボジア・文化遺産・2023年", "page": "P442", "primary": "七段ピラミッドと世界最大級のリンガ・女神像返還", "kw": "ジャヤヴァルマン4世のクメール朝の都（921〜944年）／七段ピラミッド「プラサット・プラン」に世界最大級のリンガ／略奪された女神ドゥルガー像がメトロポリタン美術館から2024年返還", "note": "クメール朝の都。七段ピラミッド頂上に世界最大級のリンガを祀る。略奪された女神像が2024年に米国から返還された。", "cat": "culture", "star": false}, {"id": 6, "name": "トロイアの考古遺跡", "region": "中東", "meta": "トルコ・文化遺産・1998年", "page": "P443", "primary": "シュリーマンが発掘した「プリアモスの宝」", "kw": "ホメロスの叙事詩「イリアス」のトロイア戦争を信じたシュリーマンが発掘／「プリアモスの宝」を発見／宝物は独・露・米などに流出／前3000年からの遺跡が層をなす", "note": "「イリアス」を信じたシュリーマンが発掘した古代都市。発見された「プリアモスの宝」は各国に流出した。", "cat": "culture", "star": true}, {"id": 7, "name": "アンコールの遺跡群", "region": "アジア", "meta": "カンボジア・文化遺産・1992年", "page": "P443", "primary": "アンドレ・マルローが盗もうとした女神像", "kw": "クメール美術が東南アジアに影響／アンコール・ワットはヒンドゥー教の宇宙観を具現化／バンテアイ・スレイの女神像を仏作家アンドレ・マルローが盗み出そうとした", "note": "アンコール王朝の都市遺跡。バンテアイ・スレイの女神像は、その美しさから仏作家マルローが盗み出そうとした逸話をもつ。", "cat": "culture", "star": false}, {"id": 8, "name": "マチュ・ピチュ", "region": "南米", "meta": "ペルー・複合遺産・1983年", "page": "P443", "primary": "ビンガムが持ち帰った出土品は2011年返還", "kw": "標高2,400mのインカ都市遺跡／太陽信仰と花こう岩の建築／1911年に米歴史学者ハイラム・ビンガムが発見／米国に持ち帰られた出土品は2011年返還", "note": "アンデス標高2,400mのインカ都市遺跡。発見者ビンガムが米国へ持ち帰った出土品は、100年後の2011年に返還された。", "cat": "mixed", "star": true}, {"id": 9, "name": "アボメーの王宮群", "region": "アフリカ", "meta": "ベナン・文化遺産・1985年", "page": "P444", "primary": "ダホメ王国・フランスからの文化財返還", "kw": "奴隷貿易で栄えたダホメ王国（奴隷海岸）／ゲゾーとグレレの王宮の壁画・彫刻／2021年に仏が略奪工芸品を返還／2025年に儀式用椅子カタクレも返還", "note": "奴隷貿易で栄えたダホメ王国の王宮群。旧宗主国フランスが略奪した工芸品が2021年に、儀式用椅子も2025年に返還された。", "cat": "culture", "star": false}, {"id": 10, "name": "アクスムの考古遺跡", "region": "アフリカ", "meta": "エチオピア・文化遺産・1980年", "page": "P444", "primary": "オベリスク130本・イタリアから2005年返還", "kw": "聖約の箱（アーク）があると信じられるエチオピア最古の都市／一枚岩のオベリスクが130／第二次大戦中イタリア軍が略奪→2005年返還", "note": "聖約の箱があると信じられるアクスム王国の首都。イタリア軍に略奪されたオベリスクは2005年に返還された。", "cat": "culture", "star": false}]}, {"id": "p22", "title": "㉒ 7/8 テーマ:世界の旧市街・歴史都市", "cards": [{"id": 1, "name": "エディンバラの旧市街と新市街", "region": "ヨーロッパ", "meta": "英国・文化遺産・1995年", "page": "P300", "primary": "中世の旧市街と碁盤目の新市街・ロイヤルマイル", "kw": "スコットランドの首都／中世の旧市街＋18世紀の碁盤目状の新市街／エディンバラ城とホリールードハウス宮殿／両者を結ぶ王宮通りロイヤルマイル", "note": "中世の旧市街と18世紀整備の新市街からなる都市。エディンバラ城と宮殿を結ぶ1.6kmのロイヤルマイルが貫く。", "cat": "culture", "star": false}, {"id": 2, "name": "ルクセンブルク市の旧市街と要塞", "region": "ヨーロッパ", "meta": "ルクセンブルク・文化遺産・1994年", "page": "P301", "primary": "地下道要塞カゼマッテ・3個のどんぐり", "kw": "963年ジーゲフロイト伯が岩山に小城ルキリンブルク／列強の支配で要塞を強化／地下道要塞カゼマッテ／3個のどんぐりと呼ばれるテュンゲン要塞", "note": "岩山の小城に始まる要塞都市。スペイン統治期の地下道要塞カゼマッテや、3基の塔をもつテュンゲン要塞が残る。", "cat": "culture", "star": false}, {"id": 3, "name": "タリンの歴史地区", "region": "ヨーロッパ", "meta": "エストニア・文化遺産・1997年", "page": "P302", "primary": "ハンザ都市＋城壁都市・トーンペアの丘", "kw": "ドイツ騎士修道会の城に始まる／ハンザ都市特有のカラフルな家並／城塞のあるトーンペアの丘／全長2.5km・高さ10mの城壁", "note": "ハンザ都市と城壁都市の特徴を併せもつ街。トーンペアの丘のふもとにカラフルな家並が広がり、城壁が街を囲む。", "cat": "culture", "star": false}, {"id": 4, "name": "リヴィウ歴史地区", "region": "ヨーロッパ", "meta": "ウクライナ・文化遺産・1998年", "page": "P302", "primary": "ヨーロッパの真珠・多様な様式が混在する石畳の街", "kw": "ポーランド領以降この地方の宗教・政治・商業の中心／東欧の伝統＋伊独の様式が混在／リノック広場のバロック・ルネサンス建築／美しい石畳／2023年危機遺産", "note": "波乱の歴史を反映し多様な建築様式が混在する街。美しい石畳で知られ「ヨーロッパの真珠」と呼ばれる。2023年危機遺産登録。", "cat": "culture", "star": false}, {"id": 5, "name": "クヴェートリンブルクの旧市街と聖堂参事会教会、城", "region": "ヨーロッパ", "meta": "ドイツ・文化遺産・1994年", "page": "P303", "primary": "2,000軒のハーフティンバー様式家屋", "kw": "ハインリヒ1世の宮殿以来の古都／2,000軒に及ぶハーフティンバー様式の家屋／木組みの家博物館／12世紀の聖セルヴァティウス修道院聖堂", "note": "中世の景観をそのまま伝える古都。14〜19世紀のハーフティンバー様式の家屋が2,000軒も立ち並ぶ。", "cat": "culture", "star": false}, {"id": 6, "name": "ジッダの歴史地区：メッカの入口", "region": "中東", "meta": "サウジアラビア・文化遺産・2014年", "page": "P305", "primary": "メッカ巡礼の玄関口・紅海のサンゴの建築", "kw": "第3代正統カリフのウスマーンが主要港として整備／メッカの外港／メッカ巡礼（ハッジ）の玄関口／紅海のサンゴを用いた独特の建築", "note": "メッカ巡礼の玄関口として繁栄した紅海の港湾都市。多様な民族が集う文化の中心地で、サンゴを用いた建築が残る。", "cat": "culture", "star": false}, {"id": 7, "name": "ラムの旧市街", "region": "アフリカ", "meta": "ケニア・文化遺産・2001年", "page": "P305", "primary": "スワヒリ圏最古の市街地・サンゴ石の建築", "kw": "インド洋のラム島／東アフリカのスワヒリ圏最古の市街地遺跡／12世紀から海洋交易の拠点／土着文化とイスラム文化の融合／サンゴ石とマングローブ材の建築", "note": "東アフリカのスワヒリ圏最古の市街地を含む港街。土着文化とイスラム商人の文化が融合した建築が残る。", "cat": "culture", "star": false}, {"id": 8, "name": "北京の中軸線：中国首都の理想的秩序を示す建造物群", "region": "アジア", "meta": "中国・文化遺産・2024年", "page": "P301", "primary": "南北7.8kmの都市軸・儒教思想の対称配置", "kw": "北京中心を南北に貫く約7.8kmの都市軸／故宮・天安門広場・天壇など15の構成資産／元代に「考工記」に基づき計画／儒教思想を反映した対称配置", "note": "北京中心を南北に貫く都市軸。故宮や天壇など15資産からなり、儒教思想を反映した対称的な都市計画を示す。", "cat": "culture", "star": false}, {"id": 9, "name": "クスコの市街", "region": "南米", "meta": "ペルー・文化遺産・1983年", "page": "P303", "primary": "インカ帝国の首都・ピサロが滅ぼす", "kw": "標高3,400mのインカ帝国の首都／9代皇帝パチャクテクの時代に絶頂／1532年ピサロが168人の兵で征服／インカの石積みを土台にスペインが大聖堂を建設", "note": "インカ帝国の首都として栄えた高地都市。ピサロに征服され、インカの石積みの上にスペインの建物が築かれた。", "cat": "culture", "star": true}, {"id": 10, "name": "ポルトの歴史地区、ルイス1世橋とセラ・ド・ピラール修道院", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・1996年", "page": "P221", "primary": "ポートワインの積出港・エンリケ航海王子", "kw": "ドウロ川河口のポルトガル第二の都市／海洋通商の中心／エンリケ航海王子の海外進出を支援／ポートワインの輸出で繁栄／フェルナンド王の市壁の内側", "note": "ドウロ川河口の商業都市。エンリケ航海王子を支援し、ポートワインの積出港として繁栄した。", "cat": "culture", "star": false}, {"id": 11, "name": "ハバナの旧市街と要塞群", "region": "北中米", "meta": "キューバ・文化遺産・1982年", "page": "P273", "primary": "カリブ海交易の中継都市・モロ要塞", "kw": "1519年ベラスケスが建設／砂糖・たばこ・奴隷貿易の中心／最古のフエルサ要塞やモロ要塞／都市全体が要塞に囲まれる／スペイン・バロック様式", "note": "カリブ海交易の中継都市。都市全体が要塞に囲まれ、フエルサ要塞やモロ要塞など堅牢な防衛施設が築かれた。", "cat": "culture", "star": false}, {"id": 12, "name": "歴史的要塞都市カンペチェ", "region": "北中米", "meta": "メキシコ・文化遺産・1999年", "page": "P273", "primary": "海賊から街を守った城壁・ドレークの襲撃", "kw": "マヤの都市の上にスペイン人が建設／富を狙う海賊フランシス・ドレークらの襲撃／17世紀末からの高さ8m・全長2.5kmの城壁／サン・ホセ要塞", "note": "海賊から街を守るため城壁で囲まれた要塞都市。カリブの海賊ドレークらの襲撃に備え、要塞が築かれた。", "cat": "culture", "star": false}, {"id": 13, "name": "ルーネンバーグの旧市街", "region": "北中米", "meta": "カナダ・文化遺産・1995年", "page": "P218", "primary": "机上でつくられた格子状の植民都市", "kw": "18世紀半ばに英国が建設した植民都市／格子状の道路／本国の役人がロンドンの机上で計画したため急坂に／400の木造家屋", "note": "英国が18世紀半ばに建設した植民都市。ロンドンの机上で計画されたため急坂が生じた格子状の街路が残る。", "cat": "culture", "star": false}, {"id": 14, "name": "チェスキー・クルムロフの歴史地区", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1992年", "page": "P400", "primary": "ヴルタヴァ川畔のボヘミアの古都・洪水リスク", "kw": "ヴルタヴァ川畔の古都／13世紀に城の建築が始まり城下町が発展／ロジェンベルク家の銀山で発展／2002年の洪水／気候変動での大雨増加が懸念", "note": "ヴルタヴァ川畔のボヘミアの古都。中世美術の面影を残すが、2002年に洪水被害を受け気候変動対策が求められる。", "cat": "culture", "star": false}, {"id": 15, "name": "クルディーガの旧市街", "region": "ヨーロッパ", "meta": "ラトビア・文化遺産・2023年", "page": "P146", "primary": "クールラント公国の街路をほぼ維持", "kw": "クールラント・ゼムガレン公国の行政中心地／公国は3大陸に交易網／開発から取り残され大戦も無傷／公国時代の街路配置をほぼ維持／丸太造りの建築", "note": "クールラント公国の行政中心地。開発から取り残され戦禍も免れたため、公国時代の街路配置がほぼそのまま残る。", "cat": "culture", "star": false}, {"id": 16, "name": "ウィーンの歴史地区", "region": "ヨーロッパ", "meta": "オーストリア・文化遺産・2001年", "page": "P403", "primary": "ハプスブルク家の王都・高層再開発で危機遺産", "kw": "ハプスブルク家の王都／オスマン帝国の大軍を撃退／城壁の外へ市街が拡大しバロック建築／ヨーロッパ文化の中心／高層ビル再開発で2017年危機遺産", "note": "ハプスブルク家の王都として栄えた文化の中心地。高層ビルを含む再開発計画により2017年に危機遺産となった。", "cat": "culture", "star": true}, {"id": 17, "name": "ブダペスト：ドナウ河岸とブダ城地区、アンドラーシ通り", "region": "ヨーロッパ", "meta": "ハンガリー・文化遺産・1987年", "page": "P403", "primary": "ドナウ両岸の街・くさり橋で合併", "kw": "ドナウ川西岸のブダと東岸のペスト／1849年のくさり橋が合併の機運／1873年に合併／ブダ城の改修の真正性が問われ危機遺産入りも提言", "note": "ドナウ川の両岸の街が合併して生まれた首都。くさり橋が合併を後押しした。ブダ城改修の真正性が課題。", "cat": "culture", "star": false}, {"id": 18, "name": "サナアの旧市街", "region": "中東", "meta": "イエメン・文化遺産・1986年", "page": "P316", "primary": "日干しレンガの高層住宅・ノアの息子の伝説", "kw": "中世アラビアの城塞都市／ノアの息子セムが建設したという伝説／世界最古級の都市／玄武岩の土台に日干しレンガ（アドベ）の高層住宅6,000棟／2015年危機遺産", "note": "中世アラビアの面影を残す城塞都市。玄武岩の土台に日干しレンガを積んだ高層住宅が林立する。2015年危機遺産登録。", "cat": "culture", "star": true}]}, {"id": "p23", "title": "㉓ 7/8 テーマ:聖地・聖山と宗教建築", "cards": [{"id": 1, "name": "モン・サン・ミシェルとその湾", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1979年", "page": "P318", "primary": "海に浮かぶ聖なる山・大天使ミカエルの啓示", "kw": "英仏海峡に浮かぶ聖なる山／潮の干満差が激しく満潮時は海中に孤立／司教オベールの夢に大天使ミカエルが三度現れ聖堂建立／ベネディクト会修道院", "note": "満潮時に海に孤立する岩山の修道院。大天使ミカエルのお告げで聖堂が建てられ、中世の重要な巡礼地となった。", "cat": "culture", "star": true}, {"id": 2, "name": "ピエモンテとロンバルディアのサクロ・モンテ群", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2003年", "page": "P320", "primary": "エルサレムを模した9つの聖山", "kw": "イタリア北部に散在する9ヵ所の聖山（サクロ・モンテ）／小聖堂や礼拝堂からなる山上の聖域／エルサレム巡礼が難しくなった代替／最古はヴァラッロ・セジア", "note": "聖地巡礼が難しくなった時代に代替として築かれた聖山群。最古のヴァラッロ・セジアはエルサレムを再現している。", "cat": "culture", "star": false}, {"id": 3, "name": "聖山アトス", "region": "ヨーロッパ", "meta": "ギリシャ・複合遺産・1988年", "page": "P320", "primary": "ギリシャ正教の聖地・女人禁制", "kw": "アクティ半島の聖山／20の修道院／ビザンツ帝国から自治権／今も1,000人以上の修道士／入域許可証を持つ男性のみで女人禁制", "note": "20の修道院が点在するギリシャ正教の聖地。ビザンツ帝国以来の自治権をもち、今も女人禁制が守られている。", "cat": "mixed", "star": true}, {"id": 4, "name": "ブラガのボン・ジェズス・ド・モンテ聖域", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・2019年", "page": "P321", "primary": "エルサレムを想起させる聖山・受難の彫像", "kw": "教会を頂く聖なる山でエルサレムを想起させる／トリエント公会議のカトリックの聖山運動／キリストの受難を描いた彫像／噴水や階段、庭園", "note": "エルサレムを想起させるためにつくられた聖山。宗教改革に対抗するカトリックの聖山運動を伝え、受難の彫像が並ぶ。", "cat": "culture", "star": false}, {"id": 5, "name": "聖カトリーナ修道院地域", "region": "中東", "meta": "エジプト・文化遺産・2002年", "page": "P321", "primary": "モーセの十戒のシナイ山・現存最古の修道院", "kw": "シナイ山北麓／モーセが十戒を授かった場所／6世紀半ば創建で現存最古の活動修道院／燃える柴礼拝堂／花こう岩の防壁", "note": "モーセが十戒を授かったシナイ山のふもとにある、現在も活動する世界最古の修道院。三宗教の聖地。", "cat": "culture", "star": false}, {"id": 6, "name": "マプングブエの文化的景観", "region": "アフリカ", "meta": "南アフリカ・文化遺産・2003年", "page": "P322", "primary": "インド洋交易で栄えた王国・聖なる岩山", "kw": "10〜14世紀インド洋交易で繁栄したマプングブエ王国の都／気候変動で衰退・放棄／象牙や金を輸出、磁器やガラス玉を輸入／聖なる岩山にエリート層", "note": "インド洋交易で栄えた王国の都の遺跡。気候変動で放棄されたため手つかずで残り、聖なる岩山にエリート層が暮らした。", "cat": "culture", "star": false}, {"id": 7, "name": "チャムパーサックの文化的景観にあるワット・プーと関連古代遺跡群", "region": "アジア", "meta": "ラオス・文化遺産・2001年", "page": "P323", "primary": "クメールの聖山カオ山とヒンドゥー寺院ワット・プー", "kw": "クメール人が5〜15世紀に築いた／カオ山（プー・カオ）を神の宿る地とあがめる／中腹のヒンドゥー教寺院ワット・プー／のちに仏教寺院に改修", "note": "クメール人が聖山カオ山の中腹に築いたヒンドゥー教寺院ワット・プーを中心とする遺跡群。後に仏教寺院に改修された。", "cat": "culture", "star": false}, {"id": 8, "name": "武当山の道教寺院群", "region": "アジア", "meta": "中国・文化遺産・1994年", "page": "P323", "primary": "真武大帝の道教聖地・永楽帝が再建", "kw": "道教の神・真武大帝が修行した聖地／全長約60kmの参道沿いの寺院群／元代末期に焼失し明の永楽帝が再建／天柱峰頂の金殿", "note": "道教の神・真武大帝ゆかりの聖地。焼失後に明の永楽帝が再建し、参道沿いに寺院群、山頂に金殿が残る。", "cat": "culture", "star": false}, {"id": 9, "name": "五台山", "region": "アジア", "meta": "中国・文化遺産・2009年", "page": "P323", "primary": "文殊菩薩の聖地・中国四大仏教名山", "kw": "5つの台地がある山／中国四大仏教名山／文殊菩薩の聖地／53の寺院／唐代の木造建築、仏光寺の東大殿", "note": "文殊菩薩の聖地とされる中国四大仏教名山のひとつ。53の寺院があり、唐代の木造建築・仏光寺東大殿が残る。", "cat": "culture", "star": false}, {"id": 10, "name": "リラの修道院", "region": "ヨーロッパ", "meta": "ブルガリア・文化遺産・1983年", "page": "P326", "primary": "ブルガリア正教の総本山・フレリヨの塔", "kw": "10世紀に修道士イワン・リルスキーが創建／ブルガリア正教の総本山／14世紀のフレリヨの塔が現存／19世紀のブルガリア宗教画の傑作フレスコ画", "note": "イワン・リルスキーが創建したブルガリア正教の総本山。14世紀のフレリヨの塔と19世紀の傑作フレスコ画が残る。", "cat": "culture", "star": false}, {"id": 11, "name": "アルコバサの修道院", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・1989年", "page": "P324", "primary": "ポルトガル初期ゴシック最大・イネスとペドロの墓", "kw": "ポルトガル初期ゴシック様式最大の建築／エンリケス1世が建設／太ると通れない細い食堂入口＝シトー会の禁欲／暗殺された愛妾イネスとペドロ1世の墓", "note": "ポルトガル初期ゴシック様式最大の修道院。シトー会の禁欲を示す細い食堂入口や、愛妾イネスとペドロ1世の墓で知られる。", "cat": "culture", "star": false}, {"id": 12, "name": "カディーシャ渓谷（聖なる谷）と神の杉の森（ホルシュ・アルツ・エルラブ）", "region": "中東", "meta": "レバノン・文化遺産・1998年", "page": "P380", "primary": "レバノン杉の群生地・マロン派の教会", "kw": "レバノン山脈の渓谷／レバノン杉の数少ない群生地／フェニキア人がガレー船の材に／国旗に描かれるが大きく減少／マロン派などの教会", "note": "国旗に描かれるレバノン杉の数少ない群生地。フェニキア人が船材に用いた。マロン派などの教会も残る聖なる谷。", "cat": "culture", "star": false}, {"id": 13, "name": "宗廟", "region": "アジア", "meta": "韓国・文化遺産・1995年", "page": "P170", "primary": "李氏朝鮮の儒教の霊廟・世界最大の単一木造建築", "kw": "1395年に李成桂が造営した霊廟／現存する儒教の王室祭祀所で最古／歴代王・王妃の位牌／正殿は幅101mで同時代の単一木造建築として世界最大／宗廟大祭は無形文化遺産", "note": "李氏朝鮮の歴代王を祀る儒教の霊廟。正殿は単一木造建築として世界最大規模で、宗廟大祭は無形文化遺産。", "cat": "culture", "star": false}, {"id": 14, "name": "リスボンのジェロニモス修道院とベレンの塔", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・1983年", "page": "P221", "primary": "大航海時代の栄華・ヴァスコ・ダ・ガマゆかり", "kw": "マヌエル1世がエンリケ航海王子とヴァスコ・ダ・ガマの功績をたたえ建立／歴代国王の霊廟／船乗りの心のよりどころ／テージョ川河口のベレンの塔", "note": "大航海時代の栄華を伝えるマヌエル様式の建築。ヴァスコ・ダ・ガマの功績をたたえて建てられた修道院と塔。", "cat": "culture", "star": false}, {"id": 15, "name": "キーウ：聖ソフィア聖堂と関連修道院群、キーウ・ペチェルーシク大修道院", "region": "ヨーロッパ", "meta": "ウクライナ・文化遺産・1990年", "page": "P326", "primary": "キエフ大公国の聖ソフィア聖堂・13ドーム", "kw": "9〜13世紀のキエフ大公国の遺構／13のドームをもつ聖ソフィア聖堂／ロシアの聖堂建築に影響／11世紀創建のキーウ・ペチェルーシク大修道院／2023年危機遺産", "note": "キエフ大公国の遺構。13ドームの聖ソフィア聖堂は各地の聖堂建築に影響を与えた。2023年危機遺産登録。", "cat": "culture", "star": false}]}, {"id": "p24", "title": "㉔ 7/8 テーマ:危機遺産と紛争・返還", "cards": [{"id": 1, "name": "オデーサの歴史地区", "region": "ヨーロッパ", "meta": "ウクライナ・文化遺産・2023年", "page": "P439", "primary": "黒海の真珠・ロシアの軍事侵攻で危機遺産", "kw": "黒海沿岸の港湾都市／エカチェリーナ2世が不凍港として築く／プリモルスキー階段（オデーサ階段）／オデーサ・オペラ劇場／ロシアの軍事侵攻で登録と同時に危機遺産", "note": "エカチェリーナ2世が築いた黒海の港湾都市「黒海の真珠」。ロシアの軍事侵攻を受け、登録と同時に危機遺産となった。", "cat": "culture", "star": true}, {"id": 2, "name": "ヘブロン：アル・ハリールの旧市街", "region": "中東", "meta": "パレスチナ・文化遺産・2017年", "page": "P437", "primary": "アブラハム・モスク・緊急的登録推薦で米イスラエル反発", "kw": "マムルーク朝時代の市街地／隊商交易の要衝／アブラハムの墓を守るアブラハム・モスク（マクペラの洞穴）／三宗教の巡礼地／緊急的登録推薦に米・イスラエルが反発", "note": "アブラハムの墓を祀る三宗教の巡礼地。緊急的登録推薦で登録されたが、ユダヤ教の価値が不十分と米・イスラエルが反発した。", "cat": "culture", "star": false}, {"id": 3, "name": "マリブ：古代サバ王国の代表的遺跡群", "region": "中東", "meta": "イエメン・文化遺産・2023年", "page": "P438", "primary": "サバ王国のマリブダム・古代アラビア最大の人工オアシス", "kw": "古代サバ王国の遺跡群／乳香など香料交易で繁栄／高度な水利技術のマリブダム／古代アラビア最大の人工オアシス／内戦リスクで緊急的登録推薦", "note": "香料交易で栄えた古代サバ王国の遺跡群。マリブダムの灌漑で古代アラビア最大の人工オアシスが生まれた。緊急的登録推薦。", "cat": "culture", "star": false}, {"id": 4, "name": "バーミヤン渓谷の文化的景観と古代遺跡群", "region": "中東", "meta": "アフガニスタン・文化遺産・2003年", "page": "P436", "primary": "文明の十字路・タリバンが破壊した磨崖仏", "kw": "約1,000の石窟遺跡／インド・中央アジア・西アジアを結ぶ文明の十字路／ガンダーラ美術／6〜7世紀の2体の巨大磨崖仏／2001年タリバンが破壊／緊急的登録推薦", "note": "文明の十字路に築かれた仏教石窟群。有名な2体の巨大磨崖仏は2001年にタリバンに破壊された。緊急的登録推薦で登録。", "cat": "culture", "star": true}, {"id": 5, "name": "イエス生誕の地：ベツレヘムの聖誕教会と巡礼路", "region": "中東", "meta": "パレスチナ・文化遺産・2012年", "page": "P437", "primary": "イエス生誕の地・339年建立の聖誕教会", "kw": "イエスが生まれたとされる場所に339年建立の聖誕教会／カトリックやギリシャ正教の教会も／緊急的登録推薦で登録／大規模修繕で危機遺産を脱した", "note": "イエスが生まれたとされる地に建つ聖誕教会。緊急的登録推薦で登録され、大規模修繕により危機遺産リストを脱した。", "cat": "culture", "star": false}, {"id": 6, "name": "バムとその文化的景観", "region": "中東", "meta": "イラン・文化遺産・2004年", "page": "P438", "primary": "日干しレンガのアルゲ・バム・大地震で被災", "kw": "サーサーン朝時代の城塞都市／交易ルートの交差路／日干しレンガの城塞アルゲ・バム（三重構造）／2003年大地震で壊滅／緊急的登録推薦→2013年危機遺産解除", "note": "交易路の要衝だった城塞都市。日干しレンガの城塞アルゲ・バムが2003年の大地震で壊滅し、緊急的登録推薦で登録された。", "cat": "culture", "star": false}, {"id": 7, "name": "オリーブとワインの土地 - バッティールの丘：南エルサレムの文化的景観", "region": "中東", "meta": "パレスチナ・文化遺産・2014年", "page": "P437", "primary": "石積みの段々畑・分離壁とICOMOS不登録勧告", "kw": "深い渓谷ワディヤンの連なり／石積みの段々畑の耕作地／イスラエルの分離壁計画地区／ICOMOSは不登録勧告／緊急的登録推薦で登録", "note": "石積みの段々畑が特徴の丘。イスラエルの分離壁計画にさらされ、ICOMOSの不登録勧告を覆して緊急的登録推薦で登録された。", "cat": "culture", "star": false}, {"id": 8, "name": "古代都市パルミラ", "region": "中東", "meta": "シリア・文化遺産・1980年", "page": "P430", "primary": "シルクロードのオアシス都市・ISが破壊", "kw": "シリア砂漠中央のオアシス都市／隊商交易で繁栄／ローマ帝国の属州／2015年ISが破壊／ベル神殿や凱旋門が大きな被害", "note": "シルクロードの隊商交易で栄えたオアシス都市。シリア内戦とISの破壊で、ベル神殿や凱旋門が大きな被害を受けた。", "cat": "culture", "star": true}, {"id": 9, "name": "聖ヒラリオン修道院／テル・ウンム・アメル", "region": "中東", "meta": "パレスチナ・文化遺産・2024年", "page": "P429", "primary": "中東最古級の修道院・ガザ地区", "kw": "ガザ地区の海岸砂丘／中東最古級の修道院遺跡／4世紀に聖ヒラリオンが創設／巡礼者の中継地／イスラエルの軍事攻撃で緊急的登録推薦", "note": "ガザ地区にある中東最古級の修道院遺跡。4世紀に聖ヒラリオンが創設。軍事攻撃を受け緊急的登録推薦で登録された。", "cat": "culture", "star": false}, {"id": 10, "name": "タウリカ半島の古代都市とチョーラ", "region": "ヨーロッパ", "meta": "ウクライナ・文化遺産・2013年", "page": "P429", "primary": "クリミアの古代ギリシャ植民都市ケルソネソス", "kw": "クリミア半島南端のケルソネソス／古代ギリシャの植民都市／チョーラ（小区画）のブドウ園／2014年ロシアがクリミアを併合し保護に影響", "note": "クリミア半島の古代ギリシャ植民都市の遺跡。ブドウ園の小区画チョーラで栄えたが、ロシアの併合が保護に影響している。", "cat": "culture", "star": false}, {"id": 11, "name": "ミーソン聖域", "region": "アジア", "meta": "ベトナム・文化遺産・1999年", "page": "P432", "primary": "チャンパー王国のシヴァ神崇拝の聖地", "kw": "チャンパー王国のヒンドゥー教シヴァ神崇拝の中心／4世紀末に神殿建立／多くの伽藍／ベトナム戦争で多くの遺構が破壊", "note": "チャンパー王国のシヴァ神崇拝の聖地。ベトナム戦争で多くの遺構が破壊されたが、ヒンドゥー建築の広がりを伝える。", "cat": "culture", "star": false}, {"id": 12, "name": "ラパ・ヌイ国立公園", "region": "南米", "meta": "チリ・文化遺産・1995年", "page": "P418", "primary": "モアイ像・部族抗争と2022年火災", "kw": "イースター島（パスクア島）／ポリネシア起源の長耳族／巨大なモアイ像／部族間抗争フリ・モアイ／2022年の大規模火災でモアイが被害", "note": "モアイ像で知られる絶海の孤島。部族間の抗争でモアイが倒され、2022年の大規模火災でも多くが被害を受けた。", "cat": "culture", "star": true}, {"id": 13, "name": "パラマリボの歴史街区", "region": "南米", "meta": "スリナム・文化遺産・2002年", "page": "P418", "primary": "オランダ建築とクレオール文化の融合・2025年火災", "kw": "南米最小の国スリナムの首都／オランダ植民地／木造ネオ・ゴシック様式の聖堂／オランダ建築とクレオール文化の融合／2025年の大火災で木造建造物5棟焼失", "note": "オランダ建築とクレオール文化が融合した街区。2025年の大火災で歴史的な木造建造物5棟が焼失した。", "cat": "culture", "star": false}, {"id": 14, "name": "エルサレムの旧市街とその城壁群", "region": "中東", "meta": "エルサレム（ヨルダン申請）・文化遺産・1981年", "page": "P428", "primary": "三宗教の聖地・嘆きの壁と岩のドーム", "kw": "ユダヤ教・キリスト教・イスラム教の三宗教の聖地／ユダヤ教の嘆きの壁／キリスト教の聖墳墓教会／イスラム教の岩のドーム／1982年危機遺産", "note": "三宗教の聖地。嘆きの壁、聖墳墓教会、岩のドームが集まる。紛争の舞台となり1982年に危機遺産登録された。", "cat": "culture", "star": true}, {"id": 15, "name": "モスタル旧市街の石橋と周辺", "region": "ヨーロッパ", "meta": "ボスニア・ヘルツェゴビナ・文化遺産・2005年", "page": "P435", "primary": "スタリ・モスト・ボスニア紛争で破壊され復元", "kw": "ネレトヴァ川沿いの街／オスマン帝国期の交通の要衝／街の象徴の石橋スタリ・モスト（古い橋）／ボスニア紛争で破壊→2004年に復元", "note": "オスマン帝国期の石橋スタリ・モストで知られる街。ボスニア紛争で破壊された橋は、各国の支援で2004年に復元された。", "cat": "culture", "star": false}, {"id": 16, "name": "ル・アーヴル：オーギュスト・ペレにより再建された街", "region": "ヨーロッパ", "meta": "フランス・文化遺産・2005年", "page": "P435", "primary": "戦後復興の成功例・ペレの鉄筋コンクリート", "kw": "ノルマンディー上陸作戦で破壊／建築家オーギュスト・ペレが1945〜64年に再建／鉄筋コンクリート／戦後の都市再建の成功例／モネが少年時代を過ごした", "note": "第二次大戦で破壊され、建築家ペレが鉄筋コンクリートで再建した街。戦後の都市再建の成功例とされる。", "cat": "culture", "star": false}]}, {"id": "p25", "title": "㉕ 7/8 テーマ:登録基準の名作と近現代建築", "cards": [{"id": 1, "name": "タージ・マハル", "region": "アジア", "meta": "インド・文化遺産・1983年", "page": "P143", "primary": "シャー・ジャハーンが愛妃に捧げた白大理石の霊廟", "kw": "ムガル帝国5代シャー・ジャハーン／産褥熱で亡くなった愛妃ムムターズ・マハル／約20年かけた白大理石の霊廟／完全な左右対称／バロック様式の影響も", "note": "ムガル皇帝シャー・ジャハーンが愛妃ムムターズ・マハルのために建てた白大理石の霊廟。完全な左右対称の構成が美しい。", "cat": "culture", "star": true}, {"id": 2, "name": "シドニーのオペラハウス", "region": "オセアニア", "meta": "オーストラリア・文化遺産・2007年", "page": "P143", "primary": "ウッツォン設計・登録基準(i)のみで登録", "kw": "デンマーク人ヨーン・ウッツォンが設計コンペで勝利／建築家存命中の珍しい登録／人類の傑作として登録基準(i)のみで登録／貝殻状の屋根", "note": "ウッツォンが設計した革新的なコンサートホール。人類の傑作として登録基準(i)のみで登録された珍しい例。", "cat": "culture", "star": true}, {"id": 3, "name": "プレア・ビヒア寺院", "region": "アジア", "meta": "カンボジア・文化遺産・2008年", "page": "P142", "primary": "崖上のヒンドゥー寺院・タイとの国境問題", "kw": "崖の上のシヴァ神を祀る寺院／スーリヤヴァルマン1世・2世が大改築／1962年ハーグ国際司法裁判所がカンボジア領と認定／国境問題で登録が審議先送りに", "note": "崖の上に立つクメール王朝のヒンドゥー教寺院。タイとの国境問題を抱え、登録審議が先送りされた末に登録された。", "cat": "culture", "star": false}, {"id": 4, "name": "ヌビアの遺跡群：アブ・シンベルからフィラエまで", "region": "アフリカ", "meta": "エジプト・文化遺産・1979年", "page": "P267", "primary": "アブ・シンベル神殿・ダム建設の救済移築", "kw": "ラムセス2世が築いたアブ・シンベル神殿／フィラエ島のイシス神殿／アスワン・ハイ・ダム建設で水没の危機／UNESCOの救済キャンペーンで移築", "note": "ラムセス2世のアブ・シンベル神殿などの古代遺跡群。ダム建設による水没の危機をUNESCOの救済キャンペーンが救った。", "cat": "culture", "star": true}, {"id": 5, "name": "プラハの歴史地区", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1992年", "page": "P256", "primary": "黄金のプラハ・カール4世の神聖ローマ帝国の首都", "kw": "ヴルタヴァ川（モルダウ川）の街／プラハ城とヴィシェフラト城／ボヘミア王カルル1世がカール4世として即位し神聖ローマ帝国の首都に／黄金のプラハ", "note": "「黄金のプラハ」と呼ばれた中欧のモデル都市。カール4世の時代に神聖ローマ帝国の首都として大きく発展した。", "cat": "culture", "star": false}, {"id": 6, "name": "リトミシュル城", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1999年", "page": "P258", "primary": "作曲家スメタナの生家がある城", "kw": "ルネサンス様式の城／ペルンシュテイン家の居城／北イタリアの建築家が建設／城内のビール醸造所が「わが祖国」の作曲家スメタナの生家", "note": "ルネサンス様式の城で、城内のビール醸造所は連作交響詩「わが祖国」を作曲したスメタナの生家として知られる。", "cat": "culture", "star": false}, {"id": 7, "name": "ブルノのトゥーゲントハート邸", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・2001年", "page": "P295", "primary": "ミース・ファン・デル・ローエのモダニズム住宅", "kw": "ドイツ人建築家ミース・ファン・デル・ローエが設計／1930年の個人邸宅／総ガラス張りの壁面と下階に引き込める可動窓／機能美を追求", "note": "建築家ミース・ファン・デル・ローエが設計したモダニズム住宅の傑作。総ガラス張りの開放的な空間が特徴。", "cat": "culture", "star": false}, {"id": 8, "name": "フランク・ロイド・ライトの20世紀の建築", "region": "北中米", "meta": "アメリカ・文化遺産・2019年", "page": "P299", "primary": "落水荘・有機的建築", "kw": "建築家フランク・ロイド・ライトの8つの建築／落水荘やグッゲンハイム美術館／自然と調和する「有機的建築」／ヨーロッパの近代建築運動に影響", "note": "落水荘やグッゲンハイム美術館などライトの8建築。自然と調和する「有機的建築」の概念を示し、近代建築に影響を与えた。", "cat": "culture", "star": false}, {"id": 9, "name": "テル・アビーブの近代都市ホワイト・シティ", "region": "中東", "meta": "イスラエル・文化遺産・2003年", "page": "P298", "primary": "バウハウスの白いモダニズム住居群", "kw": "イギリス委任統治下で発展／ゲデス卿の都市計画／バウハウスなどで学んだ建築家が設計／モダニズム建築を気候に適合させた白い建物群", "note": "ユダヤ人移民の増加で築かれた白い住居群。バウハウスで学んだ建築家がモダニズム建築を気候に合わせて設計した。", "cat": "culture", "star": false}, {"id": 10, "name": "サン・アントニオ・ミッションズ", "region": "北中米", "meta": "アメリカ・文化遺産・2015年", "page": "P144", "primary": "フランシスコ会の伝道所群", "kw": "テキサス州南部／フランシスコ会宣教師が18世紀初頭に設立／先住民をキリスト教に改宗・スペイン語や農業技術を教える／農地や牧場、窯も", "note": "フランシスコ会が18世紀に設立した伝道所群。先住民を改宗させ本国に忠実な共同体を築くための施設だった。", "cat": "culture", "star": false}, {"id": 11, "name": "ブラジリア", "region": "南米", "meta": "ブラジル・文化遺産・1987年", "page": "P298", "primary": "ニーマイヤーが設計した新首都・三権広場", "kw": "1960年に築かれた新首都／ルシオ・コスタの都市計画／建築家オスカー・ニーマイヤー／いばらの冠の形のブラジリア大聖堂／三権広場", "note": "1960年に建設されたブラジルの新首都。ニーマイヤーが斬新な近代建築を設計し、三権広場や大聖堂が集まる。", "cat": "culture", "star": true}, {"id": 12, "name": "リオ・デ・ジャネイロ：山と海に囲まれたカリオカの景観", "region": "南米", "meta": "ブラジル・文化遺産・2012年", "page": "P259", "primary": "コルコヴァードのキリスト像・サンバとボサノヴァ", "kw": "急峻な山と海岸に挟まれた都市景観／金の輸出港として繁栄／1960年まで首都／コルコヴァードのキリスト像／サンバやボサノヴァに影響", "note": "山と海に挟まれた独特の都市景観。コルコヴァードの丘のキリスト像で知られ、サンバやボサノヴァを育んだ。", "cat": "culture", "star": false}, {"id": 13, "name": "ファン・ネレ工場", "region": "ヨーロッパ", "meta": "オランダ・文化遺産・2014年", "page": "P279", "primary": "ガラスと鉄の理想の工場・カーテンウォール", "kw": "1920年代のロッテルダム近郊／紅茶・コーヒー・たばこの加工工場／ガラスと鉄のカーテンウォール／快適な労働環境の「理想の工場」／モダニズムと機能主義の象徴", "note": "ガラス張りの近代工場建築の象徴。快適な労働環境をもつ「理想の工場」で、戦間期のモダニズムと機能主義を体現する。", "cat": "culture", "star": false}, {"id": 14, "name": "ストーンヘンジ、エイヴベリーの巨石遺跡と関連遺跡群", "region": "ヨーロッパ", "meta": "英国・文化遺産・1986年", "page": "P192", "primary": "先史時代の環状列石・サルセン石とブルーストーン", "kw": "紀元前3100〜前1100年頃に3期に分けて建設／サルセン石とブルーストーンの環状列石／北30kmのエイヴベリーはヨーロッパ最大級の環状列石／100個のメンヒル", "note": "先史時代の大規模な環状列石。2種類の石で築かれ、北のエイヴベリーはヨーロッパ最大級の環状列石をもつ。", "cat": "culture", "star": true}, {"id": 15, "name": "ギョベクリ・テペ", "region": "中東", "meta": "トルコ・文化遺産・2018年", "page": "P193", "primary": "世界最古級の巨石神殿・T字型石柱", "kw": "紀元前9600〜前8200年の先土器新石器時代／狩猟採集民が築いた巨石構造物／円形の囲いとT字型の石柱／野生動物のレリーフ／祭祀や儀礼に使用", "note": "狩猟採集民が築いた世界最古級の巨石構造物。T字型の石柱に野生動物が彫られ、祭祀に使われたと考えられる。", "cat": "culture", "star": true}, {"id": 16, "name": "ヒッタイトの首都ハットゥシャ", "region": "中東", "meta": "トルコ・文化遺産・1986年", "page": "P198", "primary": "製鉄技術のヒッタイト王国の首都・獅子の門", "kw": "紀元前17〜前13世紀のヒッタイト王国の首都／優れた製鉄技術の騎馬民族／古代オリエント三大強国／二重の城壁と獅子の門／ヤズルカヤ神殿", "note": "製鉄技術で知られるヒッタイト王国の首都。二重の城壁や獅子の門、神々のレリーフが刻まれたヤズルカヤ神殿が残る。", "cat": "culture", "star": false}]}, {"id": "p26", "title": "㉖ 7/8 テーマ:無形文化・伝統・嗜好品", "cards": [{"id": 1, "name": "ブルー・アンド・ジョン・クロウ山脈", "region": "北中米", "meta": "ジャマイカ・複合遺産・2015年", "page": "P169", "primary": "逃亡奴隷マルーンの隠れ里・無形文化遺産", "kw": "熱帯山岳雨林／先住民タイノ族やアフリカ系奴隷マルーンが逃れた地／マルーンの集落や山道／宗教儀式や伝統医学が「ムーア・タウンのマルーンの遺産」として無形文化遺産", "note": "逃亡奴隷マルーンが集団生活を営んだ熱帯山岳雨林。彼らの無形の文化は別途UNESCO無形文化遺産に登録されている。", "cat": "mixed", "star": false}, {"id": 2, "name": "バリの文化的景観：バリ・ヒンドゥー哲学トリ・ヒタ・カラナを表す水利システム「スバック」", "region": "アジア", "meta": "インドネシア・文化遺産・2012年", "page": "P173", "primary": "水利システム・スバック・トリ・ヒタ・カラナ", "kw": "寺院に集めた水を平等に分ける水利システム「スバック」／バリ・ヒンドゥーの哲学トリ・ヒタ・カラナ／11世紀以来寺院が水路を管理／約1,200の水管理共同体", "note": "寺院が水を平等に分配する水利システム「スバック」による棚田の景観。バリ・ヒンドゥーの哲学を反映している。", "cat": "culture", "star": false}, {"id": 3, "name": "キンデルダイク・エルスハウトの風車群", "region": "ヨーロッパ", "meta": "オランダ・文化遺産・1997年", "page": "P168", "primary": "排水用の風車群・国土の27%が海抜0m以下", "kw": "18世紀の排水用風車群／国名ネーデルラント＝低地／国土の約27%が海抜0m以下／19基の排水用風車／グランドセーラー式・スモック式・中空柱型の3種", "note": "低地の排水のため築かれた19基の風車群。水害と闘ってきたオランダの土地排水の歴史を象徴する。", "cat": "culture", "star": false}, {"id": 4, "name": "ワディ・ラム保護地域", "region": "中東", "meta": "ヨルダン・複合遺産・2011年", "page": "P172", "primary": "砂漠の岩のアーチ・ベドウィンの文化", "kw": "砂丘や自然の岩のアーチ、そびえる崖／岩面彫刻や碑文／過去1万2,000年の人間の土地利用／遊牧民ベドウィンの文化的空間は無形文化遺産", "note": "砂漠特有の雄大な景観をもつ保護地域。岩面彫刻が残り、遊牧民ベドウィンの文化的空間は無形文化遺産に登録されている。", "cat": "mixed", "star": false}, {"id": 5, "name": "アル・アインの文化的遺跡群(ハフィート、ヒリ、ビダ・ビント・サウードとオアシス群)", "region": "中東", "meta": "UAE・文化遺産・2011年", "page": "P172", "primary": "アラブ最古級の灌漑アフラージュ", "kw": "狩猟採集から農業への定住化を伝える／円形の墓や日干しレンガの建造物／ヒリの鉄器時代の灌漑アフラージュはアラブ地域最古級／アフラージュの知識は無形文化遺産", "note": "定住化への移行を伝える遺跡群。ヒリで発見された灌漑施設アフラージュはアラブ地域最古級で、その知識は無形文化遺産。", "cat": "culture", "star": false}, {"id": 6, "name": "フィリピンのコルディリェーラの棚田群", "region": "アジア", "meta": "フィリピン・文化遺産・1995年", "page": "P173", "primary": "イフガオ族の棚田・詠唱ハドハド", "kw": "ルソン島北部／イフガオ族が2,000年かけて口承で継承／標高1,000〜2,000mの斜面／ほとんど人力の作業／詠唱ハドハドは無形文化遺産", "note": "イフガオ族が2,000年にわたり口承で継承してきた棚田群。作業のほとんどが人力で、詠唱ハドハドは無形文化遺産。", "cat": "culture", "star": false}, {"id": 7, "name": "ベルギーとフランスの鐘楼群", "region": "ヨーロッパ", "meta": "ベルギー・フランス・文化遺産・1999年", "page": "P171", "primary": "自治権の象徴の鐘楼56基・カリヨン", "kw": "フランドル地方などの56の鐘楼／11〜17世紀建設／都市が自治権を獲得し自由と繁栄の象徴として建てた／カリヨンの文化は無形文化遺産／見張り塔や牢獄も兼ねた", "note": "都市の自治権の象徴として建てられた56の鐘楼。中世の自治権力の誕生を体現し、カリヨンの文化は無形文化遺産。", "cat": "culture", "star": false}, {"id": 8, "name": "アルト・ドウロのワイン生産地域", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・2001年", "page": "P276", "primary": "ポートワインのふるさと・2,000年のブドウ栽培", "kw": "ドウロ川上流／2,000年の歴史をもつワイン生産地／ポートワインのふるさと／夏は暑く冬は寒い乾燥地帯／伝統的なワイン製造施設と生活風景の文化的景観", "note": "ポートワインの生産地。2,000年のブドウ栽培の歴史をもち、ワイン製造施設と住民の生活が融合した文化的景観。", "cat": "culture", "star": false}, {"id": 9, "name": "インドの山岳鉄道群", "region": "アジア", "meta": "インド・文化遺産・1999年", "page": "P278", "primary": "現役の3つの山岳鉄道・ダージリン・ヒマラヤ鉄道", "kw": "英国統治下で建設された3つの現役山岳鉄道／紅茶輸出や避暑地への移動／ダージリン・ヒマラヤ鉄道／ニルギリ鉄道／カールカ・シムラー鉄道", "note": "英国統治下に建設された3つの現役山岳鉄道。紅茶の輸送や避暑地への移動を目的とし、いずれも今も使われている。", "cat": "culture", "star": false}, {"id": 10, "name": "紅河ハニ族棚田群の文化的景観", "region": "アジア", "meta": "中国・文化遺産・2013年", "page": "P244", "primary": "世界最大規模の棚田・1,300年の赤米作り", "kw": "紅河沿いの急斜面／世界最大規模の棚田群／少数民族ハニ族／森林や水系を利用した独自の灌漑／1,300年にわたり赤米を栽培", "note": "ハニ族が急斜面に築いた世界最大規模の棚田群。独自の灌漑システムで1,300年にわたり赤米を作り続けてきた。", "cat": "culture", "star": false}, {"id": 11, "name": "ホラショヴィツェの歴史的集落", "region": "ヨーロッパ", "meta": "チェコ・文化遺産・1998年", "page": "P247", "primary": "南ボヘミア・バロックの民家が並ぶ農村", "kw": "南ボヘミア州／中世から続く伝統的な農村／18〜19世紀の民家／村の中心の礼拝堂／並木道に規則正しく並ぶ民家", "note": "中世から続く伝統的な農村。18〜19世紀の民家が広場を囲んで規則正しく並ぶ、変わらぬ景観が残る。", "cat": "culture", "star": false}, {"id": 12, "name": "頤和園：北京の夏の離宮と皇帝庭園", "region": "アジア", "meta": "中国・文化遺産・1998年", "page": "P206", "primary": "中国最大の現存皇室庭園・西太后が復元", "kw": "中国最大の現存皇室庭園／乾隆帝が離宮を整備／西湖を模した人造湖と人造山／アロー戦争で英仏連合軍が破壊／西太后が海軍経費を流用して復元", "note": "清の乾隆帝が整備した中国最大の皇室庭園。アロー戦争で破壊されたが、西太后が海軍の経費を流用して復元した。", "cat": "culture", "star": false}, {"id": 13, "name": "青銅器時代のサンマルラハデンマキ墓群", "region": "ヨーロッパ", "meta": "フィンランド・文化遺産・1999年", "page": "P233", "primary": "フィンランド最大の青銅器時代の石積み墓", "kw": "フィンランド最大の青銅器時代の遺跡群／花こう岩を積み上げた33基の墓／フルート長石塚／四角形の「教会の床」", "note": "フィンランド最大の青銅器時代の墓群。花こう岩を積み上げた33基の墓が残り、独特な形状の石塚で知られる。", "cat": "culture", "star": false}, {"id": 14, "name": "チェルヴェテリとタルクィニアのエトルリア古代古墳群", "region": "ヨーロッパ", "meta": "イタリア・文化遺産・2004年", "page": "P234", "primary": "エトルリア人の墳墓・区画整理された墓地", "kw": "紀元前9〜前1世紀の古代エトルリア人の墳墓／バンディタッチャ墓地は都市のように区画整理／タルクィニアで約6,000の墳墓／死の祭祀や神話を伝える", "note": "古代エトルリア人が築いた大規模な墳墓群。都市のように整然と区画された墓地で、彼らの暮らしや神話を伝える。", "cat": "culture", "star": false}, {"id": 15, "name": "クロンボー城", "region": "ヨーロッパ", "meta": "デンマーク・文化遺産・2000年", "page": "P249", "primary": "「ハムレット」のエルシノア城のモデル", "kw": "エアスン海峡の岬／デンマーク王エーリク7世の砦をフレゼリク2世がルネサンス様式に改築／1629年焼失→クリスチャン4世が再建／シェイクスピア「ハムレット」の舞台", "note": "海峡に面したルネサンス様式の城。シェイクスピアの戯曲「ハムレット」の舞台エルシノア城のモデルとして知られる。", "cat": "culture", "star": false}, {"id": 16, "name": "フィリピンのバロック様式の教会群", "region": "アジア", "meta": "フィリピン・文化遺産・1993年", "page": "P422", "primary": "地震のバロック・堅牢な4つの教会", "kw": "スペイン植民地時代のバロック様式教会／最古のマニラのサン・アグスティン教会など4寺院／台風・地震対策で天井を低く／堅牢な石造り「地震のバロック」", "note": "スペイン植民地時代に築かれた4つのバロック教会。台風や地震に耐えるよう工夫された堅牢な造りは「地震のバロック」と呼ばれる。", "cat": "culture", "star": false}]}, {"id": "p27", "title": "㉗ 7/8 テーマ:自然遺産と海賊・大航海の要塞", "cards": [{"id": 1, "name": "グレート・バリア・リーフ", "region": "オセアニア", "meta": "オーストラリア・自然遺産・1981年", "page": "P399", "primary": "世界最大のサンゴ礁・白化現象", "kw": "全長約2,300kmの世界最大のサンゴ礁／1,500種の魚／ジュゴンやウミガメ／気候変動や港湾開発でサンゴが半減・大規模な白化現象／危機遺産入りがたびたび審議", "note": "全長約2,300kmの世界最大のサンゴ礁。気候変動でサンゴが半減し白化現象が続き、危機遺産入りがたびたび審議されている。", "cat": "park", "star": true}, {"id": 2, "name": "シャーク湾", "region": "オセアニア", "meta": "オーストラリア・自然遺産・1991年", "page": "P386", "primary": "ストロマトライト・世界最大の海草藻場", "kw": "世界最大の海草藻場／ジュゴンの最大の生息地／ハメリン・プールのストロマトライト（19億年前に光合成を始めた原核生物の子孫）／今も成長", "note": "世界最大の海草藻場とジュゴンの生息地。ハメリン・プールには地球の大気をつくった原核生物の子孫ストロマトライトが群生する。", "cat": "park", "star": true}, {"id": 3, "name": "黄山", "region": "アジア", "meta": "中国・複合遺産・1990年", "page": "P317", "primary": "黄山四絶・奇松と雲海の道教仏教の聖地", "kw": "69の峰／黄帝が仙人になった伝説／道教や仏教の聖地／詩人や画家が題材に／黄山四絶（奇松・怪石・雲海・温泉）", "note": "69の峰からなる山岳地帯。道教・仏教の聖地で芸術の題材ともなり、奇松・怪石・雲海・温泉の「黄山四絶」で知られる。", "cat": "mixed", "star": true}, {"id": 4, "name": "トンガリロ国立公園", "region": "オセアニア", "meta": "ニュージーランド・複合遺産・1990年", "page": "P241", "primary": "3つの活火山・マオリの聖地", "kw": "タウポ火山帯／トンガリロ山・ナウルホエ山・ルアペフ山の3つの活火山／先住民マオリの聖地／文化的つながり", "note": "3つの活火山がそびえる国立公園。先住民マオリの聖地で、彼らとの文化的つながりが評価された複合遺産。", "cat": "mixed", "star": false}, {"id": 5, "name": "武陵源：歴史的・景観的重要地区", "region": "アジア", "meta": "中国・自然遺産・1992年", "page": "P265", "primary": "3,000本超の石英砂岩の柱・映画アバターのモデル", "kw": "高さ100〜400mの石英砂岩の柱が3,000以上／かつて海だった砂岩層の風化・浸食／映画「アバター」の異界のモデル／チュウゴクオオサンショウウオ", "note": "石英砂岩の柱が3,000本以上林立する山岳地帯。独特の景観は映画「アバター」の異界のモデルにもなった。", "cat": "park", "star": false}, {"id": 6, "name": "ジャイアンツ・コーズウェイとその海岸", "region": "ヨーロッパ", "meta": "英国・自然遺産・1986年", "page": "P312", "primary": "巨人伝説の玄武岩の石柱群・登録基準(vii)", "kw": "アイルランド島北端／約6,000万年前の火山活動／正六角形の玄武岩の石柱約4万本が8km／巨人がつくったという伝説／自然美の登録基準(vii)", "note": "火山活動でできた約4万本の正六角形の玄武岩の石柱が連なる海岸。巨人伝説に由来し、自然美が評価された。", "cat": "park", "star": true}, {"id": 7, "name": "パリのセーヌ河岸", "region": "ヨーロッパ", "meta": "フランス・文化遺産・1991年", "page": "P414", "primary": "ノートル・ダム大聖堂の火災・シテ島", "kw": "セーヌ河岸の2,000年の歴史／シテ島のノートル・ダム大聖堂／サント・シャペル／ルーヴル宮／2019年のノートル・ダム大聖堂の火災が世界に衝撃", "note": "セーヌ河岸に並ぶパリの歴史的建築群。シテ島のノートル・ダム大聖堂は2019年の火災で世界に衝撃を与えた。", "cat": "culture", "star": true}, {"id": 8, "name": "デルフィの考古遺跡", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・1987年", "page": "P314", "primary": "アポロン神殿・ピュティア競技会", "kw": "パルナッソス山中／太陽神アポロンを祀る神殿／中央に黄金のアポロン像／古代ギリシャ四大競技会のピュティア競技会／5,000人収容の円形劇場", "note": "太陽神アポロンを祀る神殿を中心とする遺跡。四大競技会のひとつピュティア競技会が開かれた古代ギリシャの聖地。", "cat": "culture", "star": false}, {"id": 9, "name": "ミケーネとティリンスの考古遺跡", "region": "ヨーロッパ", "meta": "ギリシャ・文化遺産・1999年", "page": "P249", "primary": "シュリーマンの発掘・アガメムノンの黄金の仮面", "kw": "シュリーマンの発掘で有名に／ホメロスの「イリアス」の一節を信じて発掘／トロイア戦争でギリシャ軍を率いたアガメムノンの居城／黄金の仮面", "note": "シュリーマンが「イリアス」を信じて発掘した遺跡。アガメムノンの居城とされ、黄金の仮面など大量の黄金細工が出土した。", "cat": "culture", "star": false}, {"id": 10, "name": "ヘラクレスの塔", "region": "ヨーロッパ", "meta": "スペイン・文化遺産・2009年", "page": "P313", "primary": "現役で稼働する世界最古の灯台", "kw": "ガリシア地方／現役で稼働する世界最古の灯台／土台にローマ時代の部分／英雄ヘラクレスが巨人ゲリオンを倒し首を埋めた伝説", "note": "ローマ時代を起源とする、現役で稼働する世界最古の灯台。英雄ヘラクレスの巨人退治の伝説が残る。", "cat": "culture", "star": false}, {"id": 11, "name": "ソルテア", "region": "ヨーロッパ", "meta": "英国・文化遺産・2001年", "page": "P217", "primary": "タイタス・ソルト卿の理想の労働者の街", "kw": "政治家兼工場主タイタス・ソルト卿が建設／大英帝国の基幹産業の毛織物工場／博愛的なパターナリズムで労働者を保護／産業革命後の都市計画の模範", "note": "工場主ソルト卿が労働者保護のため築いた毛織物工場の街。経済発展と人道への配慮が調和した都市計画の模範とされる。", "cat": "culture", "star": false}, {"id": 12, "name": "ガーナのベナン湾沿いの城塞群", "region": "アフリカ", "meta": "ガーナ・文化遺産・1979年", "page": "P218", "primary": "黄金海岸の城塞・奴隷貿易の拠点", "kw": "ベナン湾沿い約500kmに点在／黄金海岸（ゴールドコースト）の金の産地／15世紀のポルトガル人以降ヨーロッパ諸国が進出／象牙や奴隷の交易所／奴隷の収容所", "note": "金の産地「黄金海岸」に築かれた城塞群。奴隷貿易を含む交易の拠点で、内部に奴隷の収容所や監獄が残る。", "cat": "culture", "star": false}, {"id": 13, "name": "アンティグアの海軍造船所と関連考古遺跡群", "region": "北中米", "meta": "アンティグア・バーブーダ・文化遺産・2016年", "page": "P219", "primary": "英国海軍の造船所・ハリケーンの天然シェルター", "kw": "ジョージアン様式の海軍造船所／入り組んだ湾がハリケーンの天然シェルター／サトウキビ利権を守る英国海軍の拠点／アフリカ人奴隷労働者が建設", "note": "英国海軍の造船所。入り組んだ湾がハリケーンを和らげる天然のシェルターとなり、造船所に適した立地だった。", "cat": "culture", "star": false}, {"id": 14, "name": "パナマのカリブ海側の要塞群：ポルトベロとサン・ロレンツォ", "region": "北中米", "meta": "パナマ・文化遺産・1980年", "page": "P271", "primary": "金の中継地を守る要塞・ヘンリー・モーガンの襲撃", "kw": "カリブ海側の要塞群／アメリカ大陸の金をスペイン本国へ送る中継地／私掠船長ヘンリー・モーガンらの襲撃で破壊と修復／アントネッリ設計のサン・ロレンツォ要塞／2012年危機遺産", "note": "スペインが金の中継地を守るため築いた要塞群。私掠船長モーガンらの襲撃を受けた。2012年危機遺産登録。", "cat": "culture", "star": false}, {"id": 15, "name": "アゾレス諸島の港町アングラ・ド・エロイズモ", "region": "ヨーロッパ", "meta": "ポルトガル・文化遺産・1983年", "page": "P272", "primary": "大西洋航路の中継港・要塞の港町", "kw": "15〜19世紀の大西洋航路の中継港／列強や海賊への備えで大規模な要塞／サン・セバスチャン要塞／1980年の地震で被害／風向きを考慮した斜めの街路", "note": "大西洋航路の中継港として発展した港町。海賊への備えで要塞が築かれ、風向きを考慮した斜めの街路が特徴。", "cat": "culture", "star": false}, {"id": 16, "name": "イビサ島の生物多様性と文化", "region": "ヨーロッパ", "meta": "スペイン・複合遺産・1999年", "page": "P272", "primary": "フェニキアの遺跡と海草ポシドニア", "kw": "フェニキア人が築いた海上貿易の島／サ・カレタの集落跡やプッチ・プダス・ムリンスの墓地／旧市街ダルト・ビラの城壁／固有種の海草ポシドニア・オセアニカ", "note": "フェニキア人の遺跡が残る島。海賊対策の城壁をもつ旧市街と、固有種の海草が育む豊かな海洋生態系を併せもつ複合遺産。", "cat": "mixed", "star": false}, {"id": 17, "name": "バミューダ諸島：歴史的都市セント・ジョージと関連要塞群", "region": "北中米", "meta": "英国・文化遺産・2000年", "page": "P219", "primary": "英国最初期の植民都市・西半球最古の英国国教会", "kw": "北大西洋のイギリス領／1612年建設のイギリス最初期の植民都市／今も残る往時の街路／西半球最古の英国国教会の教会セント・ピーターズ教会", "note": "1612年に築かれたイギリス最初期の植民都市。往時の街路が残り、西半球最古の英国国教会の教会がある。", "cat": "culture", "star": false}]}];
var COUNTS = [10, 20, 30, 50];
var selNotes = {}; var selCount = 20;
var drill = null;

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

PAGES.forEach(function(p){ selNotes[p.id] = true; });
function renderSetup(){
  $('noteChips').innerHTML = PAGES.map(function(p){
    return '<span class="chip'+(selNotes[p.id]?' on':'')+'" onclick="toggleNote(\''+p.id+'\')">'+esc(p.title)+' <small>('+p.cards.length+')</small></span>';
  }).join('');
  $('cntChips').innerHTML = COUNTS.map(function(c){
    return '<span class="chip'+(selCount===c?' on':'')+'" onclick="setCount('+c+')">'+c+'問</span>';
  }).join('') + '<span class="chip'+(selCount===9999?' on':'')+'" onclick="setCount(9999)">全問</span>';
}
function toggleNote(id){ selNotes[id]=!selNotes[id]; renderSetup(); }
function toggleAll(v){ PAGES.forEach(function(p){ selNotes[p.id]=v; }); renderSetup(); }
function setCount(c){ selCount=c; renderSetup(); }

function tokensOf(name){
  var t = name.split(/[・（）()：:「」\s／\/－\-]+/).filter(function(x){ return x.length>=3; });
  t.push(name); return t;
}
function maskedSegs(card){
  var toks = tokensOf(card.name);
  return card.kw.split('／').filter(function(s){
    return s.length>0 && !toks.some(function(t){ return s.indexOf(t)>=0; });
  });
}
function countryOf(card){
  var p = card.meta.split('・');
  return p.length>=3 ? p.slice(0, p.length-2).join('・') : p[0];
}
// 単語カードのkw欄から「選択肢用キーワード」を作る。
// ・遺産名を含むキーワードは除外（答えがバレる）
// ・他のカードにも出てくる汎用キーワード（例: 1978年最初の登録12件）より、
//   そのカード固有のキーワードを優先する
function choiceSegs(card, pool){
  if(card._cs !== undefined) return card._cs;
  var segs = maskedSegs(card);
  if(segs.length === 0){ card._cs = null; return null; }
  var uniq = segs.filter(function(s){
    return !pool.some(function(c){ return c !== card && c.kw.indexOf(s) >= 0; });
  });
  var use = uniq.slice(0, 2);
  if(use.length < 2){
    segs.forEach(function(s){ if(use.length < 2 && use.indexOf(s) < 0) use.push(s); });
  }
  card._cs = use.join('／');
  return card._cs;
}
function pickDistractors(card, pool, n, keyFn){
  var used = {}; used[keyFn(card)] = true;
  var cands = shuffle(pool.filter(function(c){ return c!==card; }).slice());
  // 同地域を優先
  cands.sort(function(a,b){
    return (b.region===card.region?1:0) - (a.region===card.region?1:0);
  });
  var out = [];
  for(var i=0;i<cands.length && out.length<n;i++){
    var k = keyFn(cands[i]);
    if(!k || used[k]) continue;
    used[k]=true; out.push(cands[i]);
  }
  return out;
}
function explOf(card){
  return '<b>'+esc(card.name)+'</b>（'+esc(card.meta)+'・<span class="pg">'+esc(card.page)+'</span>）<br>'+esc(card.note);
}
function buildQuestion(card, pool){
  var segs = maskedSegs(card);
  var r = Math.random();
  var nameKey = function(c){ return c.name; };
  if(r < 0.25){
    // B) 遺産名 → 正しいキーワード（単語カードのkw欄）を選ぶ
    var myTxt = choiceSegs(card, pool);
    if(myTxt){
      var ds = pickDistractors(card, pool, 3, function(c){ return choiceSegs(c, pool); });
      if(ds.length===3){
        var opts = shuffle([{t:myTxt, ok:true}].concat(ds.map(function(c){ return {t:choiceSegs(c, pool), ok:false}; })));
        return { type:'キーワードを選ぶ', stem:'『'+card.name+'』のキーワードとして正しいものはどれか。', opts:opts, expl:explOf(card) };
      }
    }
  } else if(r < 0.40){
    // C) 遺産名 → 国名を選ぶ
    var ctry = countryOf(card);
    if(ctry && card.name.indexOf(ctry)<0){
      var ds2 = pickDistractors(card, pool, 3, countryOf);
      if(ds2.length===3){
        var opts2 = shuffle([{t:ctry, ok:true}].concat(ds2.map(function(c){ return {t:countryOf(c), ok:false}; })));
        return { type:'国を選ぶ', stem:'『'+card.name+'』が位置する国として正しいものはどれか。', opts:opts2, expl:explOf(card) };
      }
    }
  }
  // A) 説明・キーワード → 遺産名（デフォルト）
  var useSegs = segs.length>0 ? shuffle(segs.slice()).slice(0,3) : [card.primary];
  var ds3 = pickDistractors(card, pool, 3, nameKey);
  var opts3 = shuffle([{t:card.name, ok:true}].concat(ds3.map(function(c){ return {t:c.name, ok:false}; })));
  return { type:'遺産名を選ぶ',
    stem:'次のキーワードに当てはまる遺産として正しいものはどれか。<span class="kwbox">'+esc(useSegs.join('　／　'))+'</span>',
    opts:opts3, expl:explOf(card) };
}

function startDrill(cardsOverride){
  var cards = cardsOverride;
  if(!cards){
    cards = [];
    PAGES.forEach(function(p){ if(selNotes[p.id]) cards = cards.concat(p.cards); });
    if(cards.length < 4){ $('setupMsg').textContent = 'ノートを選んでください（最低4件必要です）'; return; }
    cards = shuffle(cards.slice()).slice(0, selCount);
  }
  var pool = [];
  PAGES.forEach(function(p){ pool = pool.concat(p.cards); });
  drill = { qs: cards.map(function(c){ var q = buildQuestion(c, pool); q.card = c; return q; }),
            i:0, score:0, wrong:[], srcCards:cards };
  $('setup').classList.add('hidden'); $('result').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  renderQ();
}
function renderQ(){
  var q = drill.qs[drill.i];
  $('qPos').textContent = '第 '+(drill.i+1)+' 問 / '+drill.qs.length;
  $('qScore').textContent = '正解 '+drill.score;
  $('qType').textContent = q.type;
  $('qStem').innerHTML = q.stem;
  $('qOpts').innerHTML = q.opts.map(function(o,idx){
    return '<button class="opt" onclick="answer('+idx+')">'+esc(o.t)+'</button>';
  }).join('');
  $('qExpl').classList.add('hidden');
  $('nextBtn').classList.add('hidden');
}
function answer(idx){
  var q = drill.qs[drill.i];
  var btns = $('qOpts').querySelectorAll('.opt');
  q.opts.forEach(function(o,i){
    btns[i].disabled = true;
    if(o.ok) btns[i].classList.add('correct');
    else if(i===idx) btns[i].classList.add('wrong');
  });
  if(q.opts[idx].ok){ drill.score++; $('qScore').textContent='正解 '+drill.score; }
  else drill.wrong.push(q.card);
  $('qExpl').innerHTML = q.expl;
  $('qExpl').classList.remove('hidden');
  $('nextBtn').classList.remove('hidden');
  $('nextBtn').textContent = drill.i+1 >= drill.qs.length ? '結果を見る →' : '次の問題 →';
}
function nextQ(){
  drill.i++;
  if(drill.i >= drill.qs.length){ showResult(); return; }
  renderQ();
}
function showResult(){
  $('quiz').classList.add('hidden');
  $('result').classList.remove('hidden');
  var n = drill.qs.length;
  var pct = Math.round(drill.score / n * 100);
  $('rScore').textContent = drill.score + ' / ' + n;
  $('rSub').textContent = '正答率 ' + pct + '%' + (pct>=70 ? '　合格ライン(70%)クリア！' : '　合格ラインまであと' + (Math.ceil(n*0.7)-drill.score) + '問');
  $('retryWrongBtn').style.display = drill.wrong.length ? '' : 'none';
  $('wrongLabel').style.display = drill.wrong.length ? '' : 'none';
  $('wrongList').innerHTML = drill.wrong.map(function(c){
    return '<div class="wrong-item"><b>'+esc(c.name)+'</b><span>'+esc(c.meta)+'・'+esc(c.page)+'　'+esc(c.primary)+'</span></div>';
  }).join('');
}
function retryWrong(){ if(drill.wrong.length) startDrill(shuffle(drill.wrong.slice())); }
function retrySame(){ startDrill(shuffle(drill.srcCards.slice())); }
function backToSetup(){ $('result').classList.add('hidden'); $('quiz').classList.add('hidden'); $('setup').classList.remove('hidden'); }
function quitDrill(){ backToSetup(); }

renderSetup();
</script>
